<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO GAME CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.06);
            --glass-active: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-border-active: rgba(255, 255, 255, 0.25);
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --blur-intensity: 40px;
        }

        body.no-blur { --blur-intensity: 0px; }
        body.no-blur .bg-blur { filter: brightness(0.2); }
        body.pure-dark .bg-blur { display: none; }
        body.pure-dark { background-color: #050507; }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #0a0a0c;
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background-color 0.5s var(--bezier);
        }

        .bg-blur {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-color: #0a0a0c;
            filter: blur(var(--blur-intensity)) brightness(0.4);
            transform: scale(1.1);
            transition: background-image 0.8s var(--bezier), filter 0.3s;
            opacity: 0;
            animation: fadeInBg 1.5s var(--bezier) forwards;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 20%, #0a0a0c 95%);
        }

        /* --- ANIMACIONES DE ENTRADA AL INICIAR --- */
        @keyframes fadeInBg {
            to { opacity: 1; }
        }

        @keyframes introTop {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes introLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes introBottom {
            from { opacity: 0; transform: translate(-50%, 30px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TOP BAR --- */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 50px;
            z-index: 10;
            opacity: 0;
            animation: introTop 1s var(--bezier) 0.2s forwards;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .brand span {
            font-weight: 200;
            color: var(--text-muted);
        }

        .live-clock-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 8px 24px;
            border-radius: 30px;
        }

        #liveClock {
            font-size: 1.3rem;
            font-weight: 200;
            letter-spacing: 0.5px;
        }

        #liveDate {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10%;
            z-index: 5;
            position: relative;
        }

        .game-info-display {
            margin-bottom: 35px;
            max-width: 600px;
            opacity: 0;
            animation: introLeft 1.2s var(--bezier) 0.4s forwards;
        }

        .game-genre {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .game-title {
            font-size: 3.5rem;
            font-weight: 200;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .game-description {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
            font-weight: 400;
        }

        /* --- CARRUSEL HORIZONTAL --- */
        .carousel-wrapper {
            width: 100%;
            overflow-x: auto;
            padding-right: 50px;
            scrollbar-width: none;
            opacity: 0;
            animation: introLeft 1.2s var(--bezier) 0.6s forwards;
        }
        .carousel-wrapper::-webkit-scrollbar { display: none; }

        .carousel-container {
            display: flex;
            gap: 20px;
            padding: 10px 0 40px 0;
            transition: transform 0.4s var(--bezier);
        }

        /* --- SISTEMA DE ALERTA --- */
        .error-card {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 24px 30px;
            background: rgba(255, 59, 48, 0.08);
            border: 1px solid rgba(255, 59, 48, 0.25);
            border-radius: 24px;
            color: #ff453a;
            max-width: 550px;
            backdrop-filter: blur(20px);
            animation: fadeIn 0.5s var(--bezier) both;
        }
        .error-card span { font-size: 1rem; font-weight: 500; line-height: 1.4; }
        .error-card small { color: rgba(255, 255, 255, 0.7); font-family: monospace; font-size: 0.85rem; background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }

        .game-card {
            min-width: 160px;
            max-width: 160px;
            height: 220px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(25px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            cursor: pointer;
            position: relative;
            transition: all 0.4s var(--bezier);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--glass-border-active);
            background: var(--glass-active);
        }

        .game-card.active {
            min-width: 190px;
            max-width: 190px;
            height: 250px;
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            border-color: #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: translateY(-10px);
        }

        .game-card .card-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .game-card.active .card-icon { background: rgba(0, 0, 0, 0.05); }
        .game-card .card-title { font-size: 1.1rem; font-weight: 400; line-height: 1.2; }

        /* --- CONTROLES INFERIORES --- */
        .bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 100;
            opacity: 0;
            animation: introBottom 1.2s var(--bezier) 0.8s forwards;
        }

        .search-container {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            padding: 0 24px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.4s var(--bezier);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 200px;
            height: 48px;
        }

        .search-container:focus-within {
            width: 350px;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .search-input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            width: 100%;
        }
        .search-input::placeholder { color: var(--text-muted); }

        .action-btn {
            width: 48px;
            height: 48px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:hover, .action-btn.active { background: #fff; color: #000; }

        .settings-popup {
            position: absolute;
            bottom: 65px;
            right: 0;
            width: 250px;
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(15px) scale(0.95);
            pointer-events: none;
            transition: all 0.3s var(--bezier);
        }
        .settings-popup.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }

        .toggle-switch { position: relative; display: inline-block; width: 42px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: rgba(255,255,255,0.15); transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s var(--bezier); border-radius: 50%; }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(18px); }
    </style>

    <script>
        window.hasCenterError = false;
        function showLauncherError(message) {
            window.hasCenterError = true;
            document.addEventListener("DOMContentLoaded", () => {
                const mainContent = document.querySelector('.main-content');
                if (mainContent) {
                    mainContent.innerHTML = `
                        <div class="error-card">
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <i data-lucide="alert-circle" style="width: 26px; height: 26px;"></i>
                                <span>Error crítico detectado en la base de datos de juegos o scripts de configuración.</span>
                            </div>
                            <small>${message}</small>
                        </div>
                    `;
                    if (window.lucide) lucide.createIcons();
                }
            });
        }
        window.onerror = function(msg, url, line) {
            showLauncherError(`${msg} (Línea ${line})`);
            return false;
        };
    </script>
</head>
<body>

    <div class="bg-blur" id="bgBlur"></div>
    <div class="bg-overlay"></div>

    <div class="top-bar">
        <div class="brand">NEO<span>GAME CENTER</span></div>
        <div class="live-clock-container">
            <div id="liveClock">00:00:00</div>
            <div id="liveDate">Cargando fecha...</div>
        </div>
    </div>

    <div class="main-content">
        <div class="game-info-display" id="infoDisplay">
            <div class="game-genre" id="displayGenre">-</div>
            <div class="game-title" id="displayTitle">-</div>
            <div class="game-description" id="displayDesc">-</div>
        </div>

        <div class="carousel-wrapper" id="carouselWrapper">
            <div class="carousel-container" id="carousel"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="search-container">
            <i data-lucide="search" style="width: 18px; opacity: 0.7;"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar juego... (Ctrl+K)" autocomplete="off">
        </div>
        
        <div style="position: relative;">
            <div class="action-btn" id="settingsBtn">
                <i data-lucide="sliders-horizontal" style="width: 18px;"></i>
            </div>
            
            <div class="settings-popup" id="settingsPopup">
                <h4 style="font-weight: 500; font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 4px; color: #fff;">Ajustes de UI</h4>
                <div class="setting-row" style="color: #fff;">
                    <span>Desactivar Blur</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="blurToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row" style="color: #fff;">
                    <span>Fondo Negro Puro</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="darkToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <script>
        const games = [
            { 
                name: 'CYBER SORT // Neon Flux', 
                genre: 'Puzzle / Lógica', 
                desc: 'El clásico juego de separar colores en tubos, pero con una estética cyberpunk brutal y tres modos de dificultad.', 
                icon: 'test-tubes',
                bg: 'https://images.stockcake.com/public/b/8/0/b8055ebf-9ebf-4572-9ecb-92044da285cd_large/neon-laboratory-future-stockcake.jpg',
                url: 'Games/cybersort.html'
            },
            { 
                name: 'NEON BLAST // Cyber-Minimal', 
                genre: 'Puzzle / Arcade', 
                desc: 'Encaja bloques para limpiar filas y columnas en un rompecabezas minimalista lleno de efectos visuales y sonido sintético.', 
                icon: 'shapes',
                bg: 'https://thumbs.dreamstime.com/b/neon-light-brick-walls-not-plastered-background-texture-lighting-effect-red-blue-vertical-empty-basement-wall-190816285.jpg',
                url: 'Games/neon-blast.html'
            },
            { 
                name: 'NEON MATCH // Modifiers Edition', 
                genre: 'Match-3 / Arcade', 
                desc: 'Conecta tres o más figuras geométricas de neón y revienta el tablero encadenando combos, bombas y láseres.', 
                icon: 'zap',
                bg: 'https://img.magnific.com/vector-gratis/coleccion-marcos-neon_23-2149088156.jpg',
                url: 'Games/neon-match.html'
            },
            { 
                name: 'NEON CORP // Megacorp Network', 
                genre: 'Incremental / Clicker', 
                desc: 'Toca el núcleo para ganar dinero, compra activos tecnológicos y automatiza tu camino hasta crear un monopolio billonario.', 
                icon: 'building-2',
                bg: 'https://frutigeraeroarchive.org/images/introduction/asadal.jpg',
                url: 'Games/neon-corp.html' // Asignado por patrón al no estar en la captura de pantalla
            },
            { 
                name: 'ZERO SUM // Minimal Puzzle', 
                genre: 'Puzzle / Estrategia', 
                desc: 'Un adictivo juego al estilo 2048 donde sumas números positivos y negativos para aniquilarlos y mantener el tablero bajo control.', 
                icon: 'infinity',
                bg: 'https://c4.wallpaperflare.com/wallpaper/591/462/361/background-black-sign-plus-wallpaper-preview.jpg',
                url: 'Games/zero-sum.html'
            }
        ];
        
        let activeIndex = 0;

        function renderCarousel(filteredGames = games) {
            if(window.hasCenterError) return;
            const carousel = document.getElementById('carousel');
            
            if (filteredGames.length === 0) {
                carousel.innerHTML = `<div style="color:var(--text-muted); padding: 20px 0; font-size:1.1rem;">No se encontraron juegos coincidentes.</div>`;
                return;
            }

            carousel.innerHTML = filteredGames.map((game, i) => {
                const realIndex = games.findIndex(g => g.name === game.name);
                const isAct = realIndex === activeIndex;
                return `
                    <div class="game-card ${isAct ? 'active' : ''}" 
                         data-index="${realIndex}" 
                         onclick="handleCardClick(${realIndex}, this)"
                         ondblclick="handleCardDblClick(${realIndex})">
                        <div class="card-icon">
                            <i data-lucide="${game.icon}" style="width:20px;"></i>
                        </div>
                        <div class="card-title">${game.name}</div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
            
            const safeGame = games[activeIndex] || filteredGames[0];
            if(safeGame) updateMainDisplay(safeGame);
        }

        function handleCardClick(index, element) {
            activeIndex = index;
            document.querySelectorAll('.game-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            updateMainDisplay(games[index]);
        }

        function handleCardDblClick(index) {
            const game = games[index];
            if (game && game.url) {
                window.open(game.url, '_blank');
            }
        }

        function updateMainDisplay(game) {
            const dTitle = document.getElementById('displayTitle');
            const dGenre = document.getElementById('displayGenre');
            const dDesc = document.getElementById('displayDesc');
            const bgBlur = document.getElementById('bgBlur');

            dTitle.style.animation = 'none';
            dTitle.offsetHeight; 
            dTitle.innerText = game.name;
            dTitle.style.animation = 'fadeIn 0.4s var(--bezier)';

            dGenre.innerText = game.genre;
            dDesc.innerText = game.desc;
            bgBlur.style.backgroundImage = `url('${game.bg}')`;
        }

        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            const filtered = games.filter(g => g.name.toLowerCase().includes(val) || g.genre.toLowerCase().includes(val));
            
            if(filtered.length > 0) {
                const indexInFilter = filtered.findIndex(g => g.name === games[activeIndex].name);
                if(indexInFilter === -1) {
                    activeIndex = games.findIndex(g => g.name === filtered[0].name);
                }
            }
            renderCarousel(filtered);
        });

        function startLiveClock() {
            const clockEl = document.getElementById('liveClock');
            const dateEl = document.getElementById('liveDate');

            function update() {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                dateEl.innerText = now.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
            }
            update();
            setInterval(update, 1000);
        }

        window.onkeydown = (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
            }
        };

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPopup = document.getElementById('settingsPopup');
        
        settingsBtn.onclick = (e) => {
            e.stopPropagation();
            settingsPopup.classList.toggle('show');
            settingsBtn.classList.toggle('active');
        };

        document.addEventListener('click', (e) => {
            if(!settingsPopup.contains(e.target) && e.target !== settingsBtn) {
                settingsPopup.remove('show');
                settingsBtn.classList.remove('active');
            }
        });

        const blurToggle = document.getElementById('blurToggle');
        const darkToggle = document.getElementById('darkToggle');

        blurToggle.addEventListener('change', () => {
            document.body.classList.toggle('no-blur', blurToggle.checked);
        });

        darkToggle.addEventListener('change', () => {
            document.body.classList.toggle('pure-dark', darkToggle.checked);
        });

        window.onload = () => {
            if(!window.hasCenterError) {
                renderCarousel();
                startLiveClock();
            }
        };
    </script>
</body>
</html>
