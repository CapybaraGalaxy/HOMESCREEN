<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucide Pro Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #111111;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --text-muted: #888888;
            --bezier: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            padding: 50px 20px;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            font-weight: 600;
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-muted);
            margin-top: 10px;
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* --- BUSCADOR --- */
        .search-area {
            max-width: 500px;
            margin: 30px auto 0;
            position: relative;
        }

        #iconSearch {
            width: 100%;
            padding: 16px 24px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.4s var(--bezier);
            text-align: center;
        }

        #iconSearch:focus {
            background: rgba(255,255,255,0.07);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
            transform: scale(1.02);
        }

        /* --- CONTADOR --- */
        #counter {
            margin-top: 15px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- GRID --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }

        .grid-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .icon-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.5s var(--bezier);
            animation: appear 0.6s var(--bezier) both;
        }

        .icon-card i {
            width: 28px;
            height: 28px;
            stroke-width: 1.5px;
            transition: transform 0.5s var(--bezier);
        }

        .icon-card span {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 400;
            transition: color 0.3s;
        }

        /* --- HOVERS --- */
        .icon-card:hover {
            background: #fff;
            border-color: #fff;
            transform: translateY(-8px);
        }

        .icon-card:hover i {
            color: #000;
            transform: scale(1.2);
        }

        .icon-card:hover span {
            color: #000;
        }

        .icon-card:active {
            transform: scale(0.92);
        }

        /* --- NOTIFICACIÓN --- */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #fff;
            color: #000;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: transform 0.6s var(--bezier);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* --- SCROLLBAR --- */
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-track { background: transparent; }
        .main-content::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        .main-content::-webkit-scrollbar-thumb:hover { background: #333; }

        @keyframes appear {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Lucide Explorer</h1>
        <p class="subtitle">Encuentra el ícono perfecto para tu interfaz</p>
        <div class="search-area">
            <input type="text" id="iconSearch" placeholder="Escribe para filtrar íconos..." spellcheck="false">
            <div id="counter">Cargando biblioteca...</div>
        </div>
    </header>

    <div class="main-content">
        <div class="grid-container" id="iconGrid"></div>
    </div>

    <div id="toast" class="toast">Nombre copiado al portapapeles</div>

    <script>
        let allIcons = [];
        const grid = document.getElementById('iconGrid');
        const search = document.getElementById('iconSearch');
        const counter = document.getElementById('counter');
        const toast = document.getElementById('toast');

        function init() {
            // Extraer todos los íconos cargados en el objeto lucide.icons
            allIcons = Object.keys(lucide.icons);
            counter.innerText = `${allIcons.length} íconos disponibles`;
            renderIcons(allIcons);
        }

        function renderIcons(list) {
            // Usamos un fragmento o una cadena larga para optimizar el DOM
            grid.innerHTML = list.map((name, i) => `
                <div class="icon-card" onclick="copyName('${name}')" style="animation-delay: ${Math.min(i * 0.01, 1)}s">
                    <i data-lucide="${name}"></i>
                    <span>${name}</span>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        function copyName(name) {
            navigator.clipboard.writeText(name);
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        search.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            const filtered = allIcons.filter(name => name.toLowerCase().includes(val));
            renderIcons(filtered);
            counter.innerText = `${filtered.length} íconos encontrados`;
        });

        // Esperar a que Lucide esté listo
        window.onload = init;
    </script>
</body>
</html>
