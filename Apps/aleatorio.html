<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ruleta Aleatoria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #121212;
            --surface-hover: #1c1c1e;
            --glass: rgba(15, 15, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --blur-val: 30px;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --accent-danger: #FF453A;
            --accent-success: #34C759;
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.no-blur {
            --blur-val: 0px !important;
        }
        body.no-blur .app-container.backgrounded {
            filter: none !important;
            opacity: 0.3;
        }
        body.no-blur .modal-sheet, 
        body.no-blur .fab-container,
        body.no-blur .engine-container,
        body.no-blur .btn-icon {
            backdrop-filter: none !important;
            background: #121212 !important;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            height: 100dvh;
            padding: env(safe-area-inset-top) 24px calc(env(safe-area-inset-bottom) + 16px) 24px;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            transition: transform 0.4s var(--bezier), filter 0.4s var(--bezier), opacity 0.3s ease;
            will-change: transform, filter;
        }

        .app-container.backgrounded {
            transform: scale(0.97);
            filter: blur(10px);
            pointer-events: none;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0 12px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-icon-badge {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0) 80%);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title-area h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .title-area span {
            font-size: 12px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--blur-val));
            width: 38px;
            height: 38px;
            border-radius: 10px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s var(--bezier);
        }

        .btn-icon:hover { background: var(--surface-hover); }

        .folders-scroll-area {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 16px 0 12px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }
        .folders-scroll-area::-webkit-scrollbar { display: none; }

        .pill {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s var(--bezier);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pill.active {
            background: var(--text-main);
            color: var(--bg);
            border-color: var(--text-main);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            padding-bottom: 80px;
            scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }

        .mode-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: var(--surface);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: all 0.2s var(--bezier);
        }

        .mode-btn.active {
            background: var(--glass);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }

        .engine-container {
            flex: 1;
            min-height: 240px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(var(--blur-val));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .wheel-wrapper {
            position: relative;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 6px solid var(--surface-hover);
            box-shadow: 0 0 0 1px var(--glass-border);
            transition: transform 4s cubic-bezier(0.1, 0.9, 0.2, 1);
            will-change: transform;
        }

        .wheel-marker {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid var(--text-main);
            z-index: 10;
        }

        canvas#wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #121212;
        }

        .jackpot-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 20px;
            background: transparent;
        }

        .jackpot-reel {
            flex: 1;
            height: 120px;
            background: #121212;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .jackpot-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            will-change: top;
        }

        .jackpot-cell {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            padding: 10px;
            color: var(--text-main);
            word-break: break-word;
        }

        .bracket-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 20px;
        }

        .bracket-card {
            width: 100%;
            max-width: 320px;
            background: var(--surface);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s var(--spring);
            font-weight: 500;
        }

        .bracket-card:hover {
            background: var(--surface-hover);
            transform: scale(1.02);
        }

        .vs-divider {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        .trigger-bar {
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }

        .btn-trigger {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            padding: 14px 40px;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,255,255,0.15);
            transition: transform 0.2s var(--spring);
        }

        .fab-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 400px;
            height: 54px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(40px);
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 99;
        }

        .search-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            padding-left: 12px;
            height: 100%;
        }

        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .search-input-wrapper input::placeholder { color: var(--text-muted); }

        .fab-actions { display: flex; gap: 4px; }

        .fab-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .fab-btn.accent { background: var(--text-main); color: var(--bg); }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: transparent;
            pointer-events: none;
            display: flex;
            justify-content: flex-end;
        }

        .modal-sheet {
            width: 100%;
            max-width: 460px;
            height: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(var(--blur-val));
            border-left: 1px solid var(--glass-border);
            padding: calc(env(safe-area-inset-top) + 24px) 24px 24px 24px;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.4s var(--bezier);
            pointer-events: auto;
        }

        .modal-overlay.active .modal-sheet { transform: translateX(0); }
        .modal-overlay.active { pointer-events: auto; }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-header h2 { font-size: 20px; font-weight: 600; }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal-body::-webkit-scrollbar { display: none; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 12px; font-weight: 500; color: var(--text-muted); }

        .input-control {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--surface-hover);
            transition: .3s;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s var(--bezier);
            border-radius: 50%;
        }

        input:checked + .toggle-slider { background-color: var(--accent-success); }
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        .color-picker-wrapper { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; }
        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
            transition: transform 0.2s var(--spring);
        }
        .color-dot.selected { transform: scale(1.1); border-color: var(--text-main); }

        .items-list-manage { display: flex; flex-direction: column; gap: 8px; }
        .manage-item-row {
            display: grid;
            grid-template-columns: 1fr auto 40px;
            gap: 8px;
            align-items: center;
            background: var(--surface);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .manage-item-row input { background: transparent; border: none; color: var(--text-main); font-size: 14px; outline: none; }

        .advanced-weight-box { display: none; }
        .advanced-weight-box.visible { display: block; }

        /* Pantalla Completa de Ganador Elevada de Prioridad (Z-INDEX SUPERIOR AL CONFETTI DEL NAV) */
        .fullscreen-winner-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.96);
            z-index: 999999; /* Asegura que se sitúe por encima del render de Canvas-Confetti estándar */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 40px;
            text-align: center;
        }
        .fullscreen-winner-overlay.active { opacity: 1; pointer-events: auto; }
        .winner-title { font-size: 13px; font-weight: 700; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
        .winner-name { font-size: 42px; font-weight: 700; color: var(--text-main); word-break: break-word; max-width: 600px; line-height: 1.2; }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .error-shake { animation: errorShake 0.3s ease-in-out; border-color: var(--accent-danger) !important; }

        .footer-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; padding-top: 16px; }
        .btn-prime { background: var(--text-main); color: var(--bg); border: none; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-sec { background: var(--surface); color: var(--text-main); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }

        /* OPTIMIZACIÓN UX/UI AVANZADA PARA LANDSCAPE (PANTALLAS HORIZONTALES) */
        @media(min-width: 600px) { 
            .main-content { display: grid; grid-template-rows: auto 1fr auto; } 
        }

        @media (orientation: landscape) and (max-height: 520px) {
            .app-container {
                padding: 4px 16px;
            }
            header {
                padding: 8px 0 6px 0;
            }
            .folders-scroll-area {
                padding: 6px 0 4px 0;
            }
            .main-content {
                flex-direction: row;
                gap: 16px;
                padding-bottom: 50px;
                align-items: center;
            }
            .mode-selector {
                grid-template-columns: 1fr;
                width: 140px;
                gap: 4px;
            }
            .mode-btn {
                padding: 6px;
                flex-direction: row;
                justify-content: flex-start;
                gap: 8px;
            }
            .engine-container {
                flex: 1;
                min-height: 180px;
                height: 100%;
                border-radius: 16px;
            }
            .wheel-wrapper {
                width: 170px;
                height: 170px;
            }
            .trigger-bar {
                flex-direction: column;
                justify-content: center;
            }
            .btn-trigger {
                padding: 12px 24px;
                font-size: 13px;
            }
            .fab-container {
                bottom: 8px;
                height: 44px;
                max-width: 320px;
            }
            .fab-btn {
                width: 30px;
                height: 30px;
            }
            .winner-name {
                font-size: 28px;
            }
            .fullscreen-winner-overlay {
                gap: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="main-view">
        <header>
            <div class="header-left">
                <div class="app-icon-badge"><i data-lucide="layers" size="20"></i></div>
                <div class="title-area">
                    <h1 id="list-title">Selector aleatorio - Cargando...</h1>
                    <span id="items-counter">0 opciones</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" onclick="openModal('modal-share')" title="Datos Ecosistema"><i data-lucide="share-2" size="18"></i></button>
                <button class="btn-icon" onclick="openModal('modal-manage')" title="Configurar Lista"><i data-lucide="sliders" size="18"></i></button>
            </div>
        </header>

        <div class="folders-scroll-area" id="lists-pills-container"></div>

        <main class="main-content">
            <div class="mode-selector">
                <button class="mode-btn active" id="btn-mode-wheel" onclick="setMode('wheel')">
                    <i data-lucide="pie-chart" size="16"></i><span>Ruleta</span>
                </button>
                <button class="mode-btn" id="btn-mode-jackpot" onclick="setMode('jackpot')">
                    <i data-lucide="help-circle" size="16"></i><span>Jackpot</span>
                </button>
                <button class="mode-btn" id="btn-mode-bracket" onclick="setMode('bracket')">
                    <i data-lucide="git-branch" size="16"></i><span>Torneo</span>
                </button>
            </div>

            <div class="engine-container" id="game-engine-viewport"></div>

            <div class="trigger-bar">
                <button class="btn-trigger" id="main-action-trigger-btn" onclick="executeSelection()">ELEGIR DESTINO</button>
            </div>
        </main>
    </div>

    <div class="fab-container">
        <div class="search-input-wrapper">
            <input type="text" id="fab-quick-search" placeholder="Añadir opción rápido a lista actual..." onkeydown="handleQuickAdd(event, this)">
        </div>
        <div class="fab-actions">
            <button class="fab-btn accent" onclick="createNewListContext()" title="Nueva Lista"><i data-lucide="plus" size="18"></i></button>
        </div>
    </div>

    <div class="fullscreen-winner-overlay" id="winner-screen">
        <div class="winner-title">Elemento Seleccionado</div>
        <div class="winner-name" id="winner-display-name">Ninguno</div>
        <div style="display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; justify-content: center; z-index: 1000001;">
            <button class="btn-sec" style="padding: 14px 24px;" onclick="hideWinnerScreen()">Cerrar</button>
            <button class="btn-sec" id="winner-hide-option-btn" style="padding: 14px 24px; color: var(--accent-danger);" onclick="hideCurrentOptionFromList()">Ocultar esta opción</button>
            <button class="btn-prime" style="padding: 14px 28px;" onclick="rerollSelection()">Volver a elegir</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-manage" onclick="closeOverlayOnClick(event, 'modal-manage')">
        <div class="modal-sheet">
            <div class="modal-header">
                <h2>Ajustes y Lista</h2>
                <button class="btn-icon" onclick="closeActiveModal('modal-manage')"><i data-lucide="x" size="18"></i></button>
            </div>
            <div class="modal-body">
                <div class="toggle-container">
                    <div>
                        <p style="font-size:14px; font-weight:600;">Desactivar Desenfoque (Blur)</p>
                        <p style="font-size:11px; color:var(--text-muted);">Optimiza el rendimiento si la app se siente lenta.</p>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="perf-toggle-blur" onchange="handleBlurToggle(this)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="form-group">
                    <label>Nombre de la Lista</label>
                    <input type="text" id="manage-list-name" class="input-control">
                </div>
                <div class="form-group">
                    <label>Color Base del Tema</label>
                    <div class="color-picker-wrapper" id="theme-color-picker"></div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label style="font-size:12px; font-weight:500; color:var(--text-muted);">Elementos de la lista</label>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-sec" style="padding: 4px 8px; font-size:11px;" onclick="toggleAdvancedWeights()">Ver Pesos</button>
                        <button class="btn-sec" style="padding: 4px 8px; font-size:11px;" onclick="addManageRow('',1, true)">+ Añadir</button>
                    </div>
                </div>
                <div class="items-list-manage" id="manage-items-container"></div>
                <div class="footer-buttons">
                    <button class="btn-sec" style="color:var(--accent-danger);" onclick="deleteCurrentList()">Eliminar Lista</button>
                    <button class="btn-prime" onclick="saveListConfiguration()">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-share" onclick="closeOverlayOnClick(event, 'modal-share')">
        <div class="modal-sheet">
            <div class="modal-header">
                <h2>Sincronización Ecosistema</h2>
                <button class="btn-icon" onclick="closeActiveModal('modal-share')"><i data-lucide="x" size="18"></i></button>
            </div>
            <div class="modal-body">
                <textarea id="share-json-area" class="input-control" style="height: 200px; font-family:monospace; font-size:11px; resize:none;"></textarea>
                <button class="btn-prime" onclick="copyShareJson()">Copiar Datos</button>
                <button class="btn-sec" onclick="importJsonData()">Importar Datos</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULTS = ['#0A84FF', '#BF5AF2', '#30D158', '#FF9F0A', '#FF453A', '#64D2FF'];
        let appData = { activeListId: "", currentMode: "wheel", disableBlur: false, lists: {} };
        let audioCtx = null;
        let wheelRotation = 0, isSpinning = false;
        let bracketRoundItems = [], bracketWinners = [];
        let activeModalsStack = [];
        let currentWinnerName = "";

        window.onload = function() {
            const local = localStorage.getItem('NEO_CHOOSE_PURE_DATA');
            if (local) {
                try { 
                    appData = JSON.parse(local); 
                    if(appData.disableBlur === undefined) appData.disableBlur = false;
                } catch(e) { createInitialEmptyState(); }
            } else {
                createInitialEmptyState();
            }
            
            applyPerformanceSettings();
            buildColorPicker();
            renderApp();
        };

        function createInitialEmptyState() {
            const uid = "l_" + Date.now();
            appData.lists = {};
            appData.lists[uid] = { 
                id: uid, 
                name: "Opciones Diarias", 
                color: "#0A84FF", 
                items: [
                    { name: "Almorzar ensalada saludable", weight: 1, visible: true }, 
                    { name: "Pedir pizza artesanal", weight: 1, visible: true },
                    { name: "Cocinar pasta italiana", weight: 1, visible: true }
                ] 
            };
            appData.activeListId = uid;
            appData.disableBlur = false;
            saveData();
        }

        function saveData() { localStorage.setItem('NEO_CHOOSE_PURE_DATA', JSON.stringify(appData)); }

        function applyPerformanceSettings() {
            if(appData.disableBlur) {
                document.body.classList.add('no-blur');
            } else {
                document.body.classList.remove('no-blur');
            }
            const toggle = document.getElementById('perf-toggle-blur');
            if(toggle) toggle.checked = appData.disableBlur;
        }

        function handleBlurToggle(checkbox) {
            appData.disableBlur = checkbox.checked;
            saveData();
            applyPerformanceSettings();
        }

        function renderApp() {
            renderPills();
            updateHeader();
            renderEngine();
            lucide.createIcons();
        }

        function updateHeader() {
            const currentList = appData.lists[appData.activeListId];
            if(!currentList) {
                document.getElementById('list-title').innerText = "Selector aleatorio - Sin Listas";
                document.getElementById('items-counter').innerText = "0 opciones";
                return;
            }
            // Formato de cabecera limpio solicitado
            document.getElementById('list-title').innerText = `Selector aleatorio - ${currentList.name}`;
            const validItems = currentList.items.filter(i => i.visible !== false);
            document.getElementById('items-counter').innerText = `${validItems.length} activas`;
        }

        function renderPills() {
            const container = document.getElementById('lists-pills-container');
            container.innerHTML = "";
            Object.values(appData.lists).forEach(list => {
                const isSelected = list.id === appData.activeListId;
                const pill = document.createElement('div');
                pill.className = `pill ${isSelected ? 'active' : ''}`;
                if(isSelected) { 
                    pill.style.backgroundColor = list.color; 
                    pill.style.borderColor = list.color; 
                    pill.style.color = '#000'; 
                }
                pill.innerHTML = `<i data-lucide="tag" size="12"></i> ${list.name}`;
                pill.onclick = () => { 
                    appData.activeListId = list.id; 
                    if(appData.currentMode === 'bracket') initBracket(); 
                    saveData(); 
                    renderApp(); 
                };
                container.appendChild(pill);
            });
        }

        function setMode(mode) {
            appData.currentMode = mode;
            ['wheel', 'jackpot', 'bracket'].forEach(m => document.getElementById(`btn-mode-${m}`).classList.remove('active'));
            document.getElementById(`btn-mode-${mode}`).classList.add('active');
            if(mode === 'bracket') initBracket();
            saveData();
            renderEngine();
            lucide.createIcons();
        }

        function generateMonochromeShades(hexBase, count) {
            let shades = [];
            let rgb = hexToRgb(hexBase) || {r:10, g:132, b:255};
            for (let i = 0; i < count; i++) {
                let factor = 0.4 + (i / (count - 1 || 1)) * 0.5; 
                let r = Math.min(255, Math.floor(rgb.r * factor));
                let g = Math.min(255, Math.floor(rgb.g * factor));
                let b = Math.min(255, Math.floor(rgb.b * factor));
                shades.push(`rgb(${r}, ${g}, ${b})`);
            }
            return shades;
        }

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        function renderEngine() {
            const view = document.getElementById('game-engine-viewport');
            view.innerHTML = "";
            const currentList = appData.lists[appData.activeListId];
            if(!currentList) return;
            const items = currentList.items.filter(i => i.visible !== false);

            if(items.length === 0) {
                view.innerHTML = `<p style="color:var(--text-muted); font-size:13px; text-align:center; padding:20px;">Usa el panel inferior para añadir elementos de inmediato.</p>`;
                return;
            }

            if(appData.currentMode === 'wheel') {
                view.innerHTML = `<div class="wheel-marker"></div><div class="wheel-wrapper" id="wheelEle"><canvas id="wheelCanvas" width="500" height="500"></canvas></div>`;
                drawWheel(items, currentList.color);
            } else if (appData.currentMode === 'jackpot') {
                view.innerHTML = `<div class="jackpot-wrapper"><div class="jackpot-reel"><div class="jackpot-container" id="r1"></div></div><div class="jackpot-reel"><div class="jackpot-container" id="r2"></div></div><div class="jackpot-reel"><div class="jackpot-container" id="r3"></div></div></div>`;
                buildJackpot(items);
            } else if (appData.currentMode === 'bracket') {
                buildBracket();
            }
        }

        function drawWheel(items, baseColor) {
            const canvas = document.getElementById('wheelCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const totalWeight = items.reduce((a, b) => a + b.weight, 0);
            let startAngle = 0;
            const shades = generateMonochromeShades(baseColor, items.length);

            items.forEach((item, idx) => {
                const sliceAngle = (item.weight / totalWeight) * 2 * Math.PI;
                ctx.fillStyle = shades[idx];
                ctx.beginPath(); ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, startAngle, startAngle + sliceAngle);
                ctx.closePath(); ctx.fill();

                ctx.save(); ctx.translate(250, 250); ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "#FFFFFF";
                ctx.font = "600 15px 'Outfit', sans-serif";
                let name = item.name; if(name.length > 16) name = name.substring(0,14)+'...';
                ctx.fillText(name, 220, 5); ctx.restore();
                startAngle += sliceAngle;
            });
        }

        function buildJackpot(items) {
            for(let r=1; r<=3; r++) {
                const el = document.getElementById(`r${r}`);
                if(!el) continue;
                const set = [...items, ...items, ...items, ...items, ...items];
                set.forEach(item => {
                    const c = document.createElement('div'); c.className = "jackpot-cell"; c.innerText = item.name;
                    el.appendChild(c);
                });
            }
        }

        function initBracket() {
            const currentList = appData.lists[appData.activeListId];
            if(!currentList) return;
            bracketRoundItems = currentList.items.filter(i => i.visible !== false).map(i => i.name);
            bracketWinners = [];
        }

        function buildBracket() {
            const view = document.getElementById('game-engine-viewport');
            if(bracketRoundItems.length === 0 && bracketWinners.length === 1) {
                view.innerHTML = `<div style="text-align:center; padding: 20px;"><p class="winner-title" style="margin-bottom:8px;">Ganador Absoluto</p><h2 style="font-size:24px; color:var(--accent-success);">${bracketWinners[0]}</h2><button class="btn-sec" style="margin-top:16px; font-size:12px; padding:8px 16px;" onclick="initBracket(); buildBracket();">Reiniciar Torneo</button></div>`;
                return;
            }
            if(bracketRoundItems.length === 0 && bracketWinners.length > 0) { bracketRoundItems = [...bracketWinners]; bracketWinners = []; }
            if(bracketRoundItems.length === 1) {
                view.innerHTML = `<div style="text-align:center; padding: 20px;"><p class="winner-title" style="margin-bottom:8px;">Ganador Absoluto</p><h2 style="font-size:24px; color:var(--accent-success);">${bracketRoundItems[0]}</h2><button class="btn-sec" style="margin-top:16px; font-size:12px; padding:8px 16px;" onclick="initBracket(); buildBracket();">Reiniciar Torneo</button></div>`;
                return;
            }
            const o1 = bracketRoundItems[0], o2 = bracketRoundItems[1];
            view.innerHTML = `<div class="bracket-wrapper"><div class="bracket-card" onclick="stepBracket(0)">${o1}</div><div class="vs-divider">VS</div><div class="bracket-card" onclick="stepBracket(1)">${o2}</div></div>`;
        }

        function stepBracket(winIdx) {
            safeAudioTick();
            bracketWinners.push(bracketRoundItems[winIdx]);
            bracketRoundItems.splice(0,2);
            buildBracket();
        }

        function safeAudioTick() {
            try {
                if(!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
                if(audioCtx.state === 'suspended') { audioCtx.resume(); }
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.03);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.04);
            } catch(e) {}
        }

        function executeSelection() {
            if(isSpinning) return;
            const currentList = appData.lists[appData.activeListId];
            if(!currentList) return;
            const items = currentList.items.filter(i => i.visible !== false);
            if(items.length === 0) return;

            if(appData.currentMode === 'wheel') {
                isSpinning = true;
                const totalWeight = items.reduce((a, b) => a + b.weight, 0);
                let rnd = Math.random() * totalWeight; let sel = 0;
                for(let i=0; i<items.length; i++) { rnd -= items[i].weight; if(rnd <= 0) { sel = i; break; } }
                
                let cumulativeAngle = 0;
                for(let i=0; i<sel; i++) { cumulativeAngle += (items[i].weight / totalWeight) * 360; }
                let sliceAngle = (items[sel].weight / totalWeight) * 360;
                let middleAngle = cumulativeAngle + (sliceAngle / 2);

                wheelRotation += (4 * 360) + (360 - middleAngle) + 90;
                document.getElementById('wheelEle').style.transform = `rotate(${wheelRotation}deg)`;

                let ticks = 15;
                let tInt = setInterval(() => { safeAudioTick(); ticks--; if(ticks<=0) clearInterval(tInt); }, 200);

                setTimeout(() => { isSpinning = false; launchWinner(items[sel].name); }, 4000);
            } else if (appData.currentMode === 'jackpot') {
                isSpinning = true;
                let winIdx = Math.floor(Math.random() * items.length);
                for(let r=1; r<=3; r++) {
                    const container = document.getElementById(`r${r}`);
                    if(!container) continue;
                    const targetTop = -((winIdx + items.length * 2) * 120);
                    container.style.transition = `top ${1.2 + r * 0.3}s cubic-bezier(0.1, 0.8, 0.2, 1)`;
                    container.style.top = `${targetTop}px`;
                    setTimeout(() => { safeAudioTick(); }, r * 300);
                }
                setTimeout(() => { isSpinning = false; launchWinner(items[winIdx].name); }, 2500);
            } else if (appData.currentMode === 'bracket') {
                executeSelectionBracketRandom();
            }
        }

        function executeSelectionBracketRandom() {
            if(bracketRoundItems.length >= 2) {
                const rng = Math.floor(Math.random() * 2);
                stepBracket(rng);
            }
        }

        function launchWinner(name) {
            currentWinnerName = name;
            document.getElementById('winner-display-name').innerText = name;
            document.getElementById('winner-screen').classList.add('active');

            // SOLUCIÓN FIX CONFETTI: Disparar ráfagas consecutivas con zIndex máximo explícito para que pinte SOBRE la capa overlay activa.
            const confettiConfig = { particleCount: 60, spread: 60, origin: { y: 0.6 }, zIndex: 9999999 };
            confetti(confettiConfig);
            setTimeout(() => confetti(confettiConfig), 200);

            const currentList = appData.lists[appData.activeListId];
            const visibleCount = currentList.items.filter(i => i.visible !== false).length;
            document.getElementById('winner-hide-option-btn').style.display = visibleCount <= 1 ? 'none' : 'block';
        }

        function hideWinnerScreen() { 
            document.getElementById('winner-screen').classList.remove('active'); 
            renderEngine(); 
        }

        function rerollSelection() { 
            hideWinnerScreen(); 
            setTimeout(() => { executeSelection(); }, 250); 
        }

        function hideCurrentOptionFromList() {
            const currentList = appData.lists[appData.activeListId];
            if(!currentList) return;
            const index = currentList.items.findIndex(i => i.name === currentWinnerName && i.visible !== false);
            if(index !== -1) {
                currentList.items[index].visible = false;
                saveData();
                updateHeader();
            }
            hideWinnerScreen();
            renderApp();
        }

        function handleQuickAdd(e, input) {
            if(e.key === 'Enter' && input.value.trim().length > 0) {
                const currentList = appData.lists[appData.activeListId];
                if(!currentList) return;
                currentList.items.push({ name: input.value.trim(), weight: 1, visible: true });
                input.value = "";
                saveData();
                renderApp();
                safeAudioTick();
            }
        }

        function createNewListContext() {
            const uid = "l_" + Date.now();
            appData.lists[uid] = { id: uid, name: "Nueva Lista", color: DEFAULTS[Math.floor(Math.random()*DEFAULTS.length)], items: [] };
            appData.activeListId = uid;
            saveData();
            renderApp();
            openModal('modal-manage');
        }

        function buildColorPicker() {
            const wrapper = document.getElementById('theme-color-picker');
            wrapper.innerHTML = "";
            DEFAULTS.forEach(c => {
                const dot = document.createElement('div'); dot.className = "color-dot"; dot.style.backgroundColor = c;
                dot.onclick = () => {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
                    dot.classList.add('selected');
                };
                wrapper.appendChild(dot);
            });
        }

        function populateManageModal() {
            const currentList = appData.lists[appData.activeListId];
            if(!currentList) return;
            document.getElementById('manage-list-name').value = currentList.name;
            const container = document.getElementById('manage-items-container');
            container.innerHTML = "";
            
            currentList.items.forEach(i => addManageRow(i.name, i.weight, i.visible));
            
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.classList.remove('selected');
                if(dot.style.backgroundColor === currentList.color || hexToRgb(currentList.color) === hexToRgb(dot.style.backgroundColor)) {
                    dot.classList.add('selected');
                }
            });
            document.getElementById('perf-toggle-blur').checked = appData.disableBlur || false;
        }

        function addManageRow(name="", weight=1, visible=true) {
            const container = document.getElementById('manage-items-container');
            const row = document.createElement('div'); row.className = "manage-item-row";
            if(!visible) row.style.opacity = '0.4';
            
            const showWeights = container.classList.contains('show-w') ? 'visible' : '';

            row.innerHTML = `
                <input type="text" value="${name}" class="m-name-in" placeholder="Nombre de la opción...">
                <div class="advanced-weight-box ${showWeights}">
                    <input type="number" value="${weight}" min="1" max="50" style="width:55px; text-align:center; background:rgba(0,0,0,0.3); border:1px solid var(--glass-border); color:#fff; border-radius:6px; padding:2px;" class="m-weight-in">
                </div>
                <button class="fab-btn" style="color:${visible?'var(--text-muted)':'var(--accent-success)'};" onclick="toggleRowVisibility(this)"><i data-lucide="${visible?'eye':'eye-off'}" size="14"></i></button>
            `;
            container.appendChild(row);
            lucide.createIcons();
        }

        function toggleRowVisibility(btn) {
            const row = btn.parentElement;
            if(row.style.opacity === '0.4') {
                row.style.opacity = '1';
                btn.style.color = 'var(--text-muted)';
            } else {
                row.style.opacity = '0.4';
                btn.style.color = 'var(--accent-success)';
            }
        }

        function toggleAdvancedWeights() {
            const container = document.getElementById('manage-items-container');
            container.classList.toggle('show-w');
            document.querySelectorAll('.advanced-weight-box').forEach(b => b.classList.toggle('visible'));
        }

        function saveListConfiguration() {
            const currentList = appData.lists[appData.activeListId];
            if(!currentList) return;
            const name = document.getElementById('manage-list-name').value.trim();
            if(!name) return;

            const selectedDot = document.querySelector('.color-dot.selected');
            if(selectedDot) currentList.color = selectedDot.style.backgroundColor;

            currentList.name = name;
            const rows = document.querySelectorAll('.manage-item-row');
            let newItems = [];
            rows.forEach(r => {
                const n = r.querySelector('.m-name-in').value.trim();
                const w = parseInt(r.querySelector('.m-weight-in').value) || 1;
                const vis = r.style.opacity !== '0.4';
                if(n) newItems.push({ name: n, weight: w, visible: vis });
            });

            currentList.items = newItems;
            saveData();
            renderApp();
            closeActiveModal('modal-manage');
        }

        function deleteCurrentList() {
            delete appData.lists[appData.activeListId];
            const remaining = Object.keys(appData.lists);
            if(remaining.length === 0) { createInitialEmptyState(); } else { appData.activeListId = remaining[0]; }
            saveData();
            renderApp();
            closeActiveModal('modal-manage');
        }

        function openModal(id) {
            document.getElementById('main-view').classList.add('backgrounded');
            document.getElementById(id).classList.add('active');
            activeModalsStack.push(id);
            window.history.pushState({ modalId: id }, "");
            if(id === 'modal-manage') populateManageModal();
            if(id === 'modal-share') document.getElementById('share-json-area').value = JSON.stringify(appData, null, 2);
        }

        function closeActiveModal(id) { if(activeModalsStack.includes(id)) window.history.back(); }
        function closeOverlayOnClick(e, id) { if (e.target.id === id) closeActiveModal(id); }

        window.addEventListener('popstate', () => {
            if(activeModalsStack.length > 0) {
                const id = activeModalsStack.pop();
                document.getElementById(id).classList.remove('active');
                if(activeModalsStack.length === 0) document.getElementById('main-view').classList.remove('backgrounded');
            }
        });

        function copyShareJson() {
            const a = document.getElementById('share-json-area'); a.select(); document.execCommand('copy');
        }

        function importJsonData() {
            try {
                const d = JSON.parse(document.getElementById('share-json-area').value);
                if(d.lists && d.activeListId) { 
                    appData = d; 
                    saveData(); 
                    applyPerformanceSettings();
                    renderApp(); 
                    closeActiveModal('modal-share'); 
                }
            } catch(e) { 
                const area = document.getElementById('share-json-area');
                area.classList.add('error-shake'); 
                setTimeout(()=>area.classList.remove('error-shake'), 300); 
            }
        }
    </script>
</body>
</html>
