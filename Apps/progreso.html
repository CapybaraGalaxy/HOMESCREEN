<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Progress Tracker Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root {
    --bg: #000000;
    --surface: #121212;
    --surface-hover: #1e1e1e;
    --text: #ffffff;
    --muted: #888888;
    --border: rgba(255, 255, 255, 0.1);
    --accent: #ffffff;
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --gentle: cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100dvh;
  }

  /* --- PANTALLAS --- */
  .screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    transition: transform 0.5s var(--gentle), opacity 0.5s var(--gentle);
  }

  #home { transform: translateX(0); z-index: 1; }
  #home.hidden { transform: translateX(-20%); opacity: 0; pointer-events: none; }

  #view { transform: translateX(100%); z-index: 2; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
  #view.active { transform: translateX(0); }

  /* --- CABECERAS --- */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 24px 12px;
  }
  .header h1 { font-size: 1.25rem; font-weight: 500; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
  
  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .icon-btn:active { transform: scale(0.9); }

  /* --- HOME --- */
  .dashboard {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  .progress-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
    animation: fadeInDown 0.8s var(--spring);
  }

  .huge-percent {
    font-size: 6rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.05em;
    font-variant-numeric: tabular-nums;
  }

  .input-glass {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 10px 20px;
    gap: 12px;
    transition: border-color 0.3s;
  }
  .input-glass:focus-within { border-color: var(--accent); }

  .input-glass input {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 1.6rem;
    font-family: inherit;
    font-weight: 600;
    width: 70px;
    text-align: center;
    outline: none;
  }

  /* --- GRID ANIMADO --- */
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .mode-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: slideUp 0.6s var(--spring) both;
  }
  .mode-card.full { grid-column: 1 / -1; flex-direction: row; align-items: center; justify-content: space-between; }
  .mode-card:active { transform: scale(0.96); background: var(--surface-hover); }

  /* --- VISUALIZACIONES (ESTADOS) --- */
  .view-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    animation: scaleIn 0.5s var(--spring);
  }

  .svg-path { 
    transition: stroke-dashoffset 0.8s var(--spring); 
  }

  .orbit-dot-wrap { 
    transition: transform 0.8s var(--spring); 
  }

  /* Animaciones */
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Estilos específicos de gráficos */
  .thermo-wrap { width: 40px; height: 300px; background: var(--surface); border-radius: 20px; padding: 4px; border: 1px solid var(--border); }
  .thermo-fill { width: 100%; border-radius: 16px; background: linear-gradient(to top, #444, #fff); transition: height 0.8s var(--spring); position: relative; }
  .thermo-fill::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 20px; background: white; filter: blur(10px); opacity: 0.5; }

  .block { opacity: 0.2; transform: scale(0.8); transition: all 0.4s var(--spring); }
  .block.active { opacity: 1; transform: scale(1); background: white; }

</style>
</head>
<body>

<div id="app">
  <section id="home" class="screen">
    <div class="header">
      <h1><i data-lucide="layers"></i> Tracker</h1>
      <div class="icon-btn"><i data-lucide="settings" size="18"></i></div>
    </div>

    <div class="dashboard">
      <div class="progress-hero">
        <div class="huge-percent" id="home-percent">0%</div>
        <div class="input-glass">
          <input id="current" type="number" inputmode="numeric" value="0" />
          <span style="opacity: 0.3; font-size: 1.5rem">/</span>
          <input id="total" type="number" inputmode="numeric" value="100" />
        </div>
      </div>

      <div>
        <h2 style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px;">Vistas</h2>
        <div class="mode-grid">
          <button class="mode-card" data-mode="rings" style="animation-delay: 0.1s">
            <i data-lucide="circle-dot" color="#fff"></i>
            <div><h3 style="font-size: 1rem;">Rings</h3><p style="font-size: 0.75rem; color: var(--muted);">Anillos concéntricos</p></div>
          </button>
          <button class="mode-card" data-mode="arc" style="animation-delay: 0.2s">
            <i data-lucide="gauge" color="#fff"></i>
            <div><h3 style="font-size: 1rem;">Arc</h3><p style="font-size: 0.75rem; color: var(--muted);">Indicador curvo</p></div>
          </button>
          <button class="mode-card" data-mode="thermo" style="animation-delay: 0.3s">
            <i data-lucide="bar-chart-2" color="#fff"></i>
            <div><h3 style="font-size: 1rem;">Vertical</h3><p style="font-size: 0.75rem; color: var(--muted);">Termómetro luz</p></div>
          </button>
          <button class="mode-card" data-mode="grid" style="animation-delay: 0.4s">
            <i data-lucide="layout-grid" color="#fff"></i>
            <div><h3 style="font-size: 1rem;">Grid</h3><p style="font-size: 0.75rem; color: var(--muted);">Matriz de celdas</p></div>
          </button>
          <button class="mode-card full" data-mode="orbit" style="animation-delay: 0.5s">
            <div style="display: flex; gap: 16px; align-items: center;">
              <i data-lucide="orbit" size="28"></i>
              <div><h3 style="font-size: 1rem;">Orbit Mode</h3><p style="font-size: 0.75rem; color: var(--muted);">Movimiento satelital 360</p></div>
            </div>
            <i data-lucide="chevron-right" color="#444"></i>
          </button>
        </div>
      </div>
    </div>
  </section>

  <section id="view" class="screen">
    <div class="header">
      <button class="icon-btn" id="btn-back"><i data-lucide="chevron-left"></i></button>
      <h1 id="view-title">Vista</h1>
      <div style="width: 40px"></div>
    </div>
    
    <div class="view-container" id="view-canvas"></div>
    
    <div style="padding: 40px; text-align: center;">
        <div id="view-percent" style="font-size: 3rem; font-weight: 700;">0%</div>
    </div>
  </section>
</div>

<script>
  lucide.createIcons();

  let progress = 0;
  let displayedProgress = 0;
  let currentMode = 'rings';
  
  const elCurrent = document.getElementById('current');
  const elTotal = document.getElementById('total');
  const elHomePercent = document.getElementById('home-percent');
  const elViewPercent = document.getElementById('view-percent');
  const canvas = document.getElementById('view-canvas');

  // --- CONTADOR ANIMADO ---
  function animateValue(start, end, duration, element) {
    let startTimestamp = null;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progressRatio = Math.min((timestamp - startTimestamp) / duration, 1);
      const val = Math.floor(progressRatio * (end - start) + start);
      element.innerText = `${val}%`;
      if (progressRatio < 1) {
        window.requestAnimationFrame(step);
      }
    };
    window.requestAnimationFrame(step);
  }

  // --- NAVEGACIÓN ---
  history.replaceState({ screen: 'home' }, '');

  function openView(mode) {
    currentMode = mode;
    document.getElementById('view-title').innerText = mode.toUpperCase();
    renderCanvas();
    history.pushState({ screen: 'view', mode: mode }, '', `#${mode}`);
    document.getElementById('home').classList.add('hidden');
    document.getElementById('view').classList.add('active');
  }

  function closeView() {
    document.getElementById('home').classList.remove('hidden');
    document.getElementById('view').classList.remove('active');
  }

  window.addEventListener('popstate', (e) => {
    e.state && e.state.screen === 'view' ? openView(e.state.mode) : closeView();
  });

  document.getElementById('btn-back').addEventListener('click', () => history.back());
  document.querySelectorAll('.mode-card').forEach(card => {
    card.addEventListener('click', () => openView(card.dataset.mode));
  });

  // --- LÓGICA ---
  function update() {
    let curr = parseFloat(elCurrent.value) || 0;
    let tot = parseFloat(elTotal.value) || 100;
    let newProgress = Math.round((Math.min(Math.max(curr, 0), tot) / tot) * 100);
    
    if (newProgress !== progress) {
      animateValue(progress, newProgress, 600, elHomePercent);
      animateValue(progress, newProgress, 600, elViewPercent);
      progress = newProgress;
      renderCanvas();
    }
  }

  elCurrent.addEventListener('input', update);
  elTotal.addEventListener('input', update);

  function renderCanvas() {
    const p = progress / 100;
    canvas.innerHTML = ''; // Limpiar

    if (currentMode === 'rings') {
      const r = 90, c = 2 * Math.PI * r;
      canvas.innerHTML = `
        <svg viewBox="0 0 220 220" width="220" height="220">
          <circle cx="110" cy="110" r="${r}" fill="none" stroke="var(--surface)" stroke-width="15" />
          <circle class="svg-path" cx="110" cy="110" r="${r}" fill="none" stroke="#fff" stroke-width="15" 
                  stroke-dasharray="${c}" stroke-dashoffset="${c - (p * c)}" stroke-linecap="round" 
                  style="transform: rotate(-90deg); transform-origin: center;" />
        </svg>`;
    } 
    else if (currentMode === 'arc') {
      const r = 100, c = Math.PI * r;
      canvas.innerHTML = `
        <svg viewBox="0 0 240 140" width="240" height="140">
          <path d="M 20,120 A 100,100 0 0,1 220,120" fill="none" stroke="var(--surface)" stroke-width="20" stroke-linecap="round" />
          <path class="svg-path" d="M 20,120 A 100,100 0 0,1 220,120" fill="none" stroke="#fff" stroke-width="20" 
                stroke-dasharray="${c}" stroke-dashoffset="${c - (p * c)}" stroke-linecap="round" />
        </svg>`;
    }
    else if (currentMode === 'thermo') {
      canvas.innerHTML = `<div class="thermo-wrap"><div class="thermo-fill" style="height: ${progress}%"></div></div>`;
    }
    else if (currentMode === 'grid') {
      let html = '<div style="display:grid; grid-template-columns: repeat(5,1fr); gap:10px; width:200px;">';
      for(let i=0; i<25; i++) html += `<div class="block ${i < (progress/4) ? 'active' : ''}" style="aspect-ratio:1; border-radius:6px; background:var(--surface);"></div>`;
      canvas.innerHTML = html + '</div>';
    }
    else if (currentMode === 'orbit') {
      canvas.innerHTML = `
        <div style="position:relative; width:200px; height:200px; border:1px solid var(--border); border-radius:50%;">
          <div class="orbit-dot-wrap" style="position:absolute; inset:0; transform: rotate(${p*360}deg)">
            <div style="position:absolute; top:-10px; left:calc(50% - 10px); width:20px; height:20px; background:#fff; border-radius:50%; box-shadow: 0 0 20px #fff;"></div>
          </div>
          <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.5rem; opacity:0.2;">ORBIT</div>
        </div>`;
    }
  }

  update(); // Initial load
</script>
</body>
</html>
