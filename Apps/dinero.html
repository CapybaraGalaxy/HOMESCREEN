<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de dinero</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(28, 28, 30, 0.7);
            --glass-bright: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --accent: #34C759;
            --danger: #FF453A;
            --bezier: cubic-bezier(0.2, 0.8, 0.2, 1);
            
            --c-bronze: linear-gradient(135deg, #CD7F32, #7B4A21);
            --c-gold: linear-gradient(135deg, #FFD700, #B8860B);
            --c-euro1: radial-gradient(circle, #C0C0C0 45%, #FFD700 50%);
            --c-euro2: radial-gradient(circle, #FFD700 45%, #C0C0C0 50%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0; padding: env(safe-area-inset-top) 20px 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .main-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(40px);
            padding: 40px 20px;
            border-radius: 48px;
            width: 100%; max-width: 400px;
            text-align: center; margin-bottom: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: cardEntry 0.8s var(--bezier);
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .amount { 
            font-size: 5rem; font-weight: 200; margin: 15px 0; 
            letter-spacing: -3px; color: var(--text-main);
            transition: transform 0.2s var(--bezier), color 0.4s var(--bezier);
        }

        .top-bar { 
            display: flex; gap: 12px; margin-bottom: 20px; 
            width: 100%; max-width: 400px; justify-content: center;
        }
        
        .btn-pill {
            background: var(--glass-bright); border: 1px solid var(--glass-border);
            color: white; padding: 12px 20px; border-radius: 100px;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: 0.9rem; font-weight: 400; transition: all 0.3s var(--bezier);
        }
        .btn-pill:active { transform: scale(0.9) translateY(2px); background: rgba(255,255,255,0.15); }
        .btn-pill:disabled { opacity: 0.2; transform: scale(1); }

        .slider-container {
            display: flex; position: relative; width: 100%; max-width: 400px;
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 100px; padding: 4px; margin-bottom: 24px;
        }
        .slider-btn {
            flex: 1; padding: 12px; border: none; background: none; color: var(--text-muted);
            font-family: inherit; font-weight: 600; cursor: pointer; z-index: 1; 
            transition: color 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .slider-btn.active { color: white; }
        .slider-indicator {
            position: absolute; top: 4px; bottom: 4px; left: 4px; width: calc(50% - 4px);
            background: var(--accent); border-radius: 100px; 
            transition: left 0.4s var(--bezier), background 0.4s var(--bezier); z-index: 0;
        }
        
        .slider-container.sub-mode .slider-indicator { left: 50%; background: var(--danger); }
        .slider-container.view-mode .slider-indicator { background: var(--glass-bright); border: 1px solid var(--glass-border); }
        .slider-container.view-mode.visual-active .slider-indicator { left: 50%; }

        .money-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; width: 100%; max-width: 400px;
        }

        .money-btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: 0.4s var(--bezier);
            animation: gridEntry 0.6s var(--bezier) both;
            position: relative;
        }

        @keyframes gridEntry {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .money-btn:active { transform: scale(0.8); background: var(--glass-bright); border-color: var(--accent); }
        body.subtracting .money-btn:active { border-color: var(--danger); }

        .shape { 
            width: 44px; height: 44px; border-radius: 50%; margin-bottom: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); position: relative;
        }
        .s-c { background: var(--c-bronze); }
        .s-g { background: var(--c-gold); }
        .s-1e { background: var(--c-euro1); }
        .s-2e { background: var(--c-euro2); }
        .s-b { 
            width: 60px; height: 35px; border-radius: 6px; 
            position: relative; overflow: hidden;
        }
        .s-b::after {
            content: ''; position: absolute; inset: 4px; border: 1px solid rgba(255,255,255,0.2); border-radius: 2px;
        }
        
        .val-lab { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); }

        #breakdown-panel {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(25px);
            z-index: 1000; display: none; flex-direction: column; align-items: center;
            padding: 60px 24px; overflow-y: auto;
        }

        #breakdown-content { width: 100%; max-width: 400px; margin-top: 20px; }

        .breakdown-list { display: flex; flex-direction: column; gap: 12px; }
        .breakdown-row {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass-bright); padding: 16px 24px;
            border-radius: 24px; border: 1px solid var(--glass-border);
            animation: rowEntry 0.4s var(--bezier) both;
        }
        @keyframes rowEntry {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .item-qty { font-size: 1.4rem; font-weight: 600; color: var(--accent); }
        .item-val { font-size: 1rem; color: var(--text-muted); margin-left: 10px; }

        .breakdown-visual { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .visual-item {
            background: var(--glass-bright); padding: 20px; border-radius: 24px;
            border: 1px solid var(--glass-border); display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            animation: gridEntry 0.4s var(--bezier) both; min-width: 90px;
        }
        .visual-badge {
            position: absolute; top: -10px; right: -10px; background: white; color: black;
            font-weight: 700; font-size: 0.9rem; height: 28px; min-width: 28px;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            padding: 0 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 10;
        }

        .activity-log {
            width: 100%; height: 40px; display: flex; align-items: center; 
            justify-content: center; gap: 8px; margin-top: 15px; overflow: hidden;
        }
        .log-tag {
            padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
            animation: tagPop 0.4s var(--bezier); color: white;
        }
        @keyframes tagPop {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .error-shake { animation: shake 0.3s var(--bezier); color: var(--danger) !important; }

    </style>
</head>
<body>

    <div class="main-card">
        <span style="color: var(--text-muted); font-size: 0.75rem; letter-spacing: 3px; font-weight: 600;">CARTERA TOTAL</span>
        <h1 class="amount" id="display">0.00€</h1>
        <div id="activity" class="activity-log"></div>
    </div>

    <div class="top-bar">
        <button class="btn-pill" id="undo" onclick="undo()" disabled><i data-lucide="undo-2" size="18"></i></button>
        <button class="btn-pill" onclick="toggleBreakdown()"><i data-lucide="layout-list" size="18"></i> Desglose</button>
        <button class="btn-pill" onclick="resetAll()" style="color: var(--danger)"><i data-lucide="trash-2" size="18"></i></button>
    </div>

    <div class="slider-container" id="op-slider">
        <div class="slider-indicator"></div>
        <button class="slider-btn active" id="btn-add-mode" onclick="setOpMode(true)"><i data-lucide="plus" size="18"></i> Sumar</button>
        <button class="slider-btn" id="btn-sub-mode" onclick="setOpMode(false)"><i data-lucide="minus" size="18"></i> Restar</button>
    </div>

    <div class="money-grid">
        <div class="money-btn" style="animation-delay: 0.05s" onclick="handleMoneyClick(0.01)"><div class="shape s-c"></div><span class="val-lab">1¢</span></div>
        <div class="money-btn" style="animation-delay: 0.1s" onclick="handleMoneyClick(0.02)"><div class="shape s-c"></div><span class="val-lab">2¢</span></div>
        <div class="money-btn" style="animation-delay: 0.15s" onclick="handleMoneyClick(0.05)"><div class="shape s-c"></div><span class="val-lab">5¢</span></div>
        <div class="money-btn" style="animation-delay: 0.2s" onclick="handleMoneyClick(0.10)"><div class="shape s-g"></div><span class="val-lab">10¢</span></div>
        <div class="money-btn" style="animation-delay: 0.25s" onclick="handleMoneyClick(0.20)"><div class="shape s-g"></div><span class="val-lab">20¢</span></div>
        <div class="money-btn" style="animation-delay: 0.3s" onclick="handleMoneyClick(0.50)"><div class="shape s-g"></div><span class="val-lab">50¢</span></div>
        <div class="money-btn" style="animation-delay: 0.35s" onclick="handleMoneyClick(1)"><div class="shape s-1e"></div><span class="val-lab">1€</span></div>
        <div class="money-btn" style="animation-delay: 0.4s" onclick="handleMoneyClick(2)"><div class="shape s-2e"></div><span class="val-lab">2€</span></div>
        <div class="money-btn" style="grid-column: span 2; animation-delay: 0.45s" onclick="handleMoneyClick(5)">
            <div class="shape s-b" style="background:#5d7bb5"></div><span class="val-lab">5€</span>
        </div>
        <div class="money-btn" style="grid-column: span 2; animation-delay: 0.5s" onclick="handleMoneyClick(10)">
            <div class="shape s-b" style="background:#d65a5a"></div><span class="val-lab">10€</span>
        </div>
        <div class="money-btn" style="grid-column: span 2; animation-delay: 0.55s" onclick="handleMoneyClick(20)">
            <div class="shape s-b" style="background:#6bb198"></div><span class="val-lab">20€</span>
        </div>
        <div class="money-btn" style="grid-column: span 2; animation-delay: 0.6s" onclick="handleMoneyClick(50)">
            <div class="shape s-b" style="background:#f4a460"></div><span class="val-lab">50€</span>
        </div>
    </div>

    <div id="breakdown-panel">
        <h2 style="font-weight: 200; font-size: 2.5rem; margin-bottom: 5px;">Detalles</h2>
        <p style="color: var(--text-muted); margin-bottom: 24px;">Inventario de cartera</p>
        
        <div class="slider-container view-mode" id="view-slider" style="max-width: 250px;">
            <div class="slider-indicator"></div>
            <button class="slider-btn active" id="btn-view-list" onclick="setViewMode('list')"><i data-lucide="list" size="18"></i></button>
            <button class="slider-btn" id="btn-view-visual" onclick="setViewMode('visual')"><i data-lucide="grid-2x2" size="18"></i></button>
        </div>

        <div id="breakdown-content"></div>

        <button class="btn-pill" onclick="toggleBreakdown()" style="margin-top: 40px; padding: 15px 40px; background: white; color: black; font-weight: 600;">
            Cerrar
        </button>
    </div>

    <script>
        let total = 0;
        let history = [];
        let counts = { 
            0.01:0, 0.02:0, 0.05:0, 0.1:0, 0.2:0, 0.5:0, 1:0, 2:0, 5:0, 10:0, 20:0, 50:0 
        };

        let isAdding = true; 
        let currentViewMode = 'list';

        const shapeStyles = {
            0.01: { c: 's-c', bg: '' }, 0.02: { c: 's-c', bg: '' }, 0.05: { c: 's-c', bg: '' },
            0.1: { c: 's-g', bg: '' }, 0.2: { c: 's-g', bg: '' }, 0.5: { c: 's-g', bg: '' },
            1: { c: 's-1e', bg: '' }, 2: { c: 's-2e', bg: '' },
            5: { c: 's-b', bg: '#5d7bb5' }, 10: { c: 's-b', bg: '#d65a5a' },
            20: { c: 's-b', bg: '#6bb198' }, 50: { c: 's-b', bg: '#f4a460' }
        };

        const display = document.getElementById('display');
        lucide.createIcons();

        function setOpMode(addMode) {
            isAdding = addMode;
            const slider = document.getElementById('op-slider');
            if(addMode) {
                slider.classList.remove('sub-mode');
                document.getElementById('btn-add-mode').classList.add('active');
                document.getElementById('btn-sub-mode').classList.remove('active');
                document.body.classList.remove('subtracting');
            } else {
                slider.classList.add('sub-mode');
                document.getElementById('btn-add-mode').classList.remove('active');
                document.getElementById('btn-sub-mode').classList.add('active');
                document.body.classList.add('subtracting');
            }
        }

        function setViewMode(mode) {
            currentViewMode = mode;
            const slider = document.getElementById('view-slider');
            if(mode === 'list') {
                slider.classList.remove('visual-active');
                document.getElementById('btn-view-list').classList.add('active');
                document.getElementById('btn-view-visual').classList.remove('active');
            } else {
                slider.classList.add('visual-active');
                document.getElementById('btn-view-list').classList.remove('active');
                document.getElementById('btn-view-visual').classList.add('active');
            }
            renderBreakdown(); 
        }

        // --- MOTOR DE CAMBIO Y DEDUCCIONES INTELIGENTE ---
        function exactSubsetDP(amountCents, tempCounts, denoms) {
            let coins = [];
            for (let d of denoms) {
                if (tempCounts[d] > 0) {
                    let dCents = Math.round(d * 100);
                    for(let i=0; i<tempCounts[d]; i++) coins.push(dCents);
                }
            }
            if (coins.length > 500) return null; // Prevención de sobrecarga
            
            let dp = new Array(amountCents + 1).fill(-1);
            dp[0] = 0; 
            
            for (let i = 0; i < coins.length; i++) {
                let coin = coins[i];
                for (let j = amountCents; j >= coin; j--) {
                    if (dp[j - coin] !== -1 && dp[j] === -1) dp[j] = i; 
                }
            }
            
            if (dp[amountCents] === -1) return null; 
            
            let changes = {};
            let currentSum = amountCents;
            while (currentSum > 0) {
                let coinIndex = dp[currentSum];
                if (coinIndex === -1) break;
                let coinValCents = coins[coinIndex];
                let matchedDenom = denoms.find(d => Math.round(d*100) === coinValCents);
                changes[matchedDenom] = (changes[matchedDenom] || 0) - 1;
                currentSum -= coinValCents;
            }
            return changes;
        }

        function calculateSmartDeduction(amount) {
            let changes = {};
            let amountCents = Math.round(amount * 100);
            let denoms = Object.keys(counts).map(Number).sort((a,b)=>b-a);
            
            // 1. Pago exacto
            if (counts[amount] > 0) {
                changes[amount] = -1;
                return changes;
            }
            
            // 2. Combinación exacta (Ej: 2+2+1 para pagar 5)
            let dpSubset = exactSubsetDP(amountCents, counts, denoms);
            if (dpSubset) return dpSubset;
            
            // 3. Pagar con billete mayor y recibir cambio
            let largerBills = denoms.filter(d => Math.round(d*100) > amountCents && counts[d] > 0).sort((a,b)=>a-b);
            if (largerBills.length > 0) {
                let bill = largerBills[0];
                changes[bill] = -1;
                let changeCents = Math.round(bill*100) - amountCents;
                
                for (let d of denoms) {
                    let dCents = Math.round(d * 100);
                    while (changeCents >= dCents) {
                        changes[d] = (changes[d] || 0) + 1;
                        changeCents -= dCents;
                    }
                }
                return changes;
            }
            
            // 4. Pagar con varios billetes pequeños y recibir cambio (Ej: dar 2+2+2 para pagar 5)
            let currentPoolCents = 0;
            let poolChanges = {};
            for (let d of denoms.slice().reverse()) { // Menor a mayor para no gastar billetes grandes
                if (counts[d] > 0) {
                    let dCents = Math.round(d * 100);
                    for (let i=0; i<counts[d]; i++) {
                        currentPoolCents += dCents;
                        poolChanges[d] = (poolChanges[d] || 0) - 1;
                        
                        if (currentPoolCents > amountCents) {
                            let returnChangeCents = currentPoolCents - amountCents;
                            for (let cd of denoms) {
                                let cdCents = Math.round(cd * 100);
                                while (returnChangeCents >= cdCents) {
                                    poolChanges[cd] = (poolChanges[cd] || 0) + 1;
                                    returnChangeCents -= cdCents;
                                }
                            }
                            return poolChanges;
                        }
                    }
                }
            }
            
            // 5. Fallback (Crear deuda en ese billete)
            changes[amount] = -1;
            return changes;
        }

        function handleMoneyClick(val) {
            let stateChanges = {};
            let changeTotal = isAdding ? val : -val;
            
            if (isAdding) {
                counts[val]++;
                stateChanges[val] = 1;
            } else {
                stateChanges = calculateSmartDeduction(val);
                for (let k in stateChanges) counts[k] += stateChanges[k];
            }
            
            history.push({ val: changeTotal, changes: stateChanges });
            
            update(total + changeTotal);
            addToActivity(changeTotal);
            triggerFeedback();
        }

        function undo() {
            if (history.length > 0) {
                let last = history.pop();
                for (let k in last.changes) counts[k] -= last.changes[k]; // Reversión exacta
                
                update(total - last.val);
                document.getElementById('activity').innerHTML = ""; 
                if (document.getElementById('breakdown-panel').style.display === 'flex') {
                    renderBreakdown();
                }
            }
        }

        function update(newVal) {
            animateValue(total, newVal, 400);
            total = newVal; 
            document.getElementById('undo').disabled = history.length === 0;
        }

        function addToActivity(change) {
            const log = document.getElementById('activity');
            const absVal = Math.abs(change);
            const text = absVal >= 1 ? absVal + '€' : (absVal*100).toFixed(0) + '¢';
            const sign = change > 0 ? '+' : '-';
            const color = change > 0 ? 'var(--accent)' : 'var(--danger)';
            log.innerHTML = `<div class="log-tag" style="background: ${color};">${sign}${text}</div>`;
        }

        function triggerFeedback() {
            display.style.transform = "scale(1.1)";
            setTimeout(() => display.style.transform = "scale(1)", 100);
        }

        function triggerError() {
            display.classList.add('error-shake');
            setTimeout(() => display.classList.remove('error-shake'), 300);
        }

        function toggleBreakdown() {
            const panel = document.getElementById('breakdown-panel');
            if (panel.style.display !== 'flex') {
                renderBreakdown();
                panel.style.display = 'flex';
            } else {
                panel.style.display = 'none';
            }
        }

        function renderBreakdown() {
            const container = document.getElementById('breakdown-content');
            container.innerHTML = '';
            
            const sortedKeys = Object.keys(counts).map(Number).sort((a,b) => b-a);
            let hasItems = false;

            const wrapper = document.createElement('div');
            wrapper.className = currentViewMode === 'list' ? 'breakdown-list' : 'breakdown-visual';

            sortedKeys.forEach((val, index) => {
                if (counts[val] !== 0) { 
                    hasItems = true;
                    let strVal = val >= 1 ? val + '€' : (val*100).toFixed(0) + '¢';
                    let isNeg = counts[val] < 0; // Detector de deuda
                    let itemTotal = (counts[val] * val).toFixed(2);
                    
                    if (currentViewMode === 'list') {
                        const row = document.createElement('div');
                        row.className = 'breakdown-row';
                        if(isNeg) row.style.border = '1px solid rgba(255, 69, 58, 0.4)';
                        row.style.animationDelay = `${index * 0.05}s`;
                        
                        row.innerHTML = `
                            <div style="display: flex; align-items: center;">
                                <div class="item-qty" style="color: ${isNeg ? 'var(--danger)' : 'var(--accent)'}">${counts[val]}x</div>
                                <div class="item-val">${strVal}</div>
                            </div>
                            <div style="font-weight: 600; opacity: 0.8; color: ${isNeg ? 'var(--danger)' : 'white'}">${itemTotal}€</div>
                        `;
                        wrapper.appendChild(row);
                    } else {
                        const item = document.createElement('div');
                        item.className = 'visual-item';
                        if(isNeg) item.style.border = '1px solid rgba(255, 69, 58, 0.4)';
                        item.style.animationDelay = `${index * 0.05}s`;
                        const st = shapeStyles[val];
                        
                        let filterStyle = isNeg ? 'filter: grayscale(1) opacity(0.5);' : '';
                        
                        item.innerHTML = `
                            <div class="visual-badge" style="${isNeg ? 'background: var(--danger); color: white;' : ''}">${counts[val]}</div>
                            <div class="shape ${st.c}" style="${st.bg ? `background:${st.bg};` : ''} ${filterStyle}"></div>
                            <div style="font-size: 0.8rem; font-weight: 600; color: ${isNeg ? 'var(--danger)' : 'var(--text-muted)'}; margin-top: 5px;">${strVal}</div>
                        `;
                        wrapper.appendChild(item);
                    }
                }
            });
            
            if (!hasItems) {
                container.innerHTML = '<p style="text-align:center; color:var(--text-muted); opacity:0.5; margin-top: 20px;">Carpeta vacía</p>';
            } else {
                container.appendChild(wrapper);
            }
        }

        function animateValue(start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeProgress = progress * (2 - progress);
                const current = start + (end - start) * easeProgress;
                
                display.innerText = current.toFixed(2) + '€';
                display.style.color = current < 0 ? 'var(--danger)' : 'var(--text-main)';
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    display.innerText = end.toFixed(2) + '€';
                    display.style.color = end < 0 ? 'var(--danger)' : 'var(--text-main)';
                }
            };
            window.requestAnimationFrame(step);
        }

        function resetAll() {
            total = 0;
            history = [];
            for (let k in counts) counts[k] = 0;
            update(0);
            document.getElementById('activity').innerHTML = "";
            if (document.getElementById('breakdown-panel').style.display === 'flex') renderBreakdown();
        }

    </script>
</body>
</html>
