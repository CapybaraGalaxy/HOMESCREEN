<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Countdown Pro Master Ultra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #121212;
            --surface-elevated: #1a1a1c;
            --surface-hover: #1f1f22;
            
            --glass: rgba(20, 20, 20, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-glow: rgba(255, 255, 255, 0.03);
            --blur-val: 30px;

            --text-main: #FFFFFF;
            --text-muted: #8E8E93;

            --accent-danger: #FF453A;
            --accent-success: #34C759;
            --accent-blue: #0A84FF;

            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            font-variant-numeric: tabular-nums;
        }

        /* Contenedor adaptado a PC Completo */
        .app-container {
            width: 100%; max-width: 100%; margin: 0 auto; height: 100dvh;
            display: flex; flex-direction: column; position: relative;
            background: var(--bg);
            transition: transform 0.5s var(--bezier), filter 0.5s var(--bezier);
        }

        .backgrounded {
            transform: scale(0.98) translateY(4px);
            filter: blur(8px) brightness(0.6);
            pointer-events: none;
        }

        header { padding: env(safe-area-inset-top, 28px) 24px 0 24px; flex-shrink: 0; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .app-title-group { display: flex; align-items: center; gap: 14px; }
        
        .app-icon-badge {
            width: 42px; height: 42px; border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
        }

        h1 { font-size: 1.3rem; font-weight: 500; letter-spacing: -0.02em; }
        .total-counter { font-size: 0.9rem; color: var(--text-muted); font-weight: 400; }

        .categories-scroll-wrapper {
            position: relative; width: 100%; margin-bottom: 16px; transition: mask-image 0.3s;
        }
        .categories-scroll-wrapper.has-overflow {
            mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
        }

        .folders-scroll-area {
            display: flex; gap: 10px; overflow-x: auto; padding: 6px 12px 14px 12px;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .folders-scroll-area::-webkit-scrollbar { display: none; }

        .pill {
            padding: 10px 18px; border-radius: 100px;
            background: var(--surface); border: 1px solid var(--glass-border);
            color: var(--text-muted); font-size: 0.9rem; font-weight: 500;
            white-space: nowrap; cursor: pointer; transition: all 0.25s var(--bezier);
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
        }
        .pill:hover { background: var(--surface-hover); color: var(--text-main); }
        .pill.active { background: var(--text-main); color: var(--bg); border-color: var(--text-main); box-shadow: 0 8px 16px rgba(255,255,255,0.1); }
        .pill.edit-pill { background: transparent; border: 1px dashed var(--glass-border); }

        /* Grid Expandido para PC */
        .main-content {
            flex: 1; overflow-y: auto;
            padding: 12px 24px calc(env(safe-area-inset-bottom, 24px) + 110px) 24px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px; align-content: flex-start; scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }

        .zero-state {
            grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; padding: 80px 20px; color: var(--text-muted);
            border: 1px dashed var(--glass-border); border-radius: 24px; background: rgba(255,255,255,0.01);
        }
        .zero-state h3 { color: var(--text-main); font-size: 1.15rem; font-weight: 500; margin: 16px 0 6px 0; }

        /* Tarjetas */
        .card {
            background: var(--surface); border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 24px; cursor: pointer; position: relative; overflow: hidden;
            display: flex; flex-direction: column; gap: 18px;
            transition: transform 0.35s var(--spring), background 0.3s var(--bezier), border-color 0.3s;
            animation: slideUpFade 0.5s var(--spring) forwards; opacity: 0; transform: translateY(24px);
        }
        .card:hover { background: var(--surface-elevated); border-color: rgba(255,255,255,0.15); transform: translateY(-4px); }
        .card:active { transform: scale(0.97); }
        .card.completed { border-color: rgba(52, 199, 89, 0.25); }

        .card-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .card-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px;
            background: var(--glass-glow); border: 1px solid var(--glass-border);
            border-radius: 100px; font-size: 0.8rem; color: var(--text-muted);
        }
        .card-title { font-size: 1.05rem; font-weight: 500; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; text-align: right; }

        .countdown-display { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
        .days-main { display: flex; align-items: baseline; gap: 4px; }
        .days-main .num { font-size: 4.2rem; font-weight: 700; line-height: 0.8; letter-spacing: -0.04em; }
        .days-main .label, .time-sub .label { font-size: 0.95rem; font-weight: 600; color: var(--text-main); }
        .days-main.completed-text .num { color: var(--accent-success); font-size: 2rem; }

        .time-sub { display: flex; flex-direction: column; gap: 2px; text-align: right; }
        .time-sub div { display: flex; align-items: baseline; justify-content: flex-end; gap: 4px; }
        .time-sub .num { font-size: 1.35rem; font-weight: 600; line-height: 1; }
        .time-sub .label { font-size: 0.8rem; color: var(--text-muted); }

        /* FAB Dock */
        .fab-dock {
            position: fixed; bottom: calc(env(safe-area-inset-bottom, 16px) + 24px); left: 50%;
            transform: translateX(-50%); display: flex; align-items: center; gap: 14px; z-index: 50;
        }

        .fab-search {
            display: flex; align-items: center; justify-content: center;
            background: var(--glass); backdrop-filter: blur(var(--blur-val)); -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--glass-border); border-radius: 100px;
            width: 54px; height: 54px; transition: all 0.4s var(--spring); overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6); cursor: pointer; position: relative;
        }
        .fab-search.expanded { width: 260px; justify-content: flex-start; padding-left: 18px; cursor: text; }
        .fab-search i { color: var(--text-main); flex-shrink: 0; position: absolute; transition: transform 0.3s, left 0.4s var(--spring); }
        .fab-search.expanded i { position: relative; }
        .fab-search input {
            background: transparent; border: none; color: var(--text-main); font-family: inherit;
            font-size: 1rem; width: 100%; margin-left: 10px; outline: none; opacity: 0;
            pointer-events: none; transition: opacity 0.2s; position: absolute; left: 38px;
        }
        .fab-search.expanded input { opacity: 1; pointer-events: all; position: relative; left: 0; }

        .fab-add {
            width: 54px; height: 54px; border-radius: 50%; background: var(--text-main); color: var(--bg);
            border: none; display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 12px 30px rgba(255,255,255,0.12); transition: transform 0.3s var(--spring);
        }
        .fab-add:hover { transform: scale(1.05); }

        /* Capas Base de Modales */
        .modal-backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.4s var(--bezier);
        }
        .modal-backdrop.active { opacity: 1; pointer-events: all; }

        /* Estructuración Estratégica de Capas (Z-Index) */
        .modal {
            position: fixed; background: var(--surface);
            display: flex; flex-direction: column;
            top: 0; left: 0; width: 100%; height: 100%;
            transition: transform 0.45s var(--bezier), opacity 0.35s var(--bezier), top 0.45s var(--bezier), left 0.45s var(--bezier), width 0.45s var(--bezier), height 0.45s var(--bezier);
        }
        
        /* Modales Específicos */
        #modal-view { z-index: 200; transform: translateY(100%); } /* Detalle base */
        #modal-add  { z-index: 300; transform: translateY(100%); } /* Formulario queda POR ENCIMA de detalle */
        #modal-cats { z-index: 400; transform: translateY(100%); } /* Categorías arriba del todo */

        #modal-view.active, #modal-add.active, #modal-cats.active { transform: translateY(0); }

        @media (min-width: 650px) {
            .modal {
                top: 50% !important; left: 50% !important; width: 540px !important; height: auto !important; max-height: 85vh !important;
                transform: translate(-50%, -35%) scale(0.9) !important; border-radius: 28px;
                border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.8);
                opacity: 0; pointer-events: none;
            }
            .modal.active { transform: translate(-50%, -50%) scale(1) !important; opacity: 1; pointer-events: all; }
            
            /* Animación Inteligente de Origen Focalizado para el Detalle */
            #modal-view.custom-origin {
                transition: none;
                transform: scale(0.1) translate(0,0);
                opacity: 0;
            }
            #modal-view.custom-origin.active {
                transition: transform 0.5s var(--spring), opacity 0.35s var(--bezier);
                transform: translate(-50%, -50%) scale(1) !important;
                opacity: 1;
            }
        }

        .modal-header { padding: 24px 24px 18px 24px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); flex-shrink: 0; }
        .modal-content { padding: 24px; flex: 1; overflow-y: auto; scrollbar-width: none; }
        .modal-content::-webkit-scrollbar { display: none; }

        .btn-icon {
            background: rgba(255,255,255,0.03); border: 1px solid transparent; color: var(--text-main);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            padding: 8px; border-radius: 50%; transition: all 0.2s;
        }
        .btn-icon:hover { background: var(--surface-hover); border-color: var(--glass-border); }

        /* Formularios */
        .form-group { margin-bottom: 20px; }
        .form-group.flex-row { display: flex; align-items: center; justify-content: space-between; }
        .form-group label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        .form-group.flex-row label { margin-bottom: 0; font-size: 1rem; color: var(--text-main); }

        .form-input {
            width: 100%; background: var(--bg); border: 1px solid var(--glass-border);
            border-radius: 14px; padding: 16px; color: var(--text-main);
            font-family: inherit; font-size: 1rem; transition: all 0.3s var(--bezier); outline: none;
        }
        .form-input:focus { border-color: var(--text-main); background: var(--surface-hover); }

        /* Switches */
        .switch { position: relative; display: inline-block; width: 48px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--bg); transition: .3s; border-radius: 34px; border: 1px solid var(--glass-border); }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: var(--text-muted); transition: transform 0.3s var(--spring); border-radius: 50%; }
        input:checked + .slider { background-color: var(--text-main); border-color: var(--text-main); }
        input:checked + .slider:before { transform: translateX(22px); background-color: var(--bg); }

        /* Selector Custom */
        .custom-select-container { position: relative; width: 100%; }
        .custom-select-trigger {
            width: 100%; background: var(--bg); border: 1px solid var(--glass-border);
            border-radius: 14px; padding: 16px; color: var(--text-main);
            font-family: inherit; font-size: 1rem; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: all 0.3s;
        }
        .custom-select-trigger:hover { border-color: rgba(255,255,255,0.2); }
        .custom-select-trigger .content { display: flex; align-items: center; gap: 10px; }
        
        .custom-dropdown {
            position: absolute; top: calc(100% + 6px); left: 0; width: 100%;
            background: var(--surface-elevated); border: 1px solid var(--glass-border);
            border-radius: 14px; overflow: hidden; z-index: 100;
            opacity: 0; pointer-events: none; transform: translateY(-8px);
            transition: all 0.3s var(--spring); box-shadow: 0 16px 32px rgba(0,0,0,0.5);
            max-height: 200px; overflow-y: auto; scrollbar-width: none;
        }
        .custom-select-container.open .custom-dropdown { opacity: 1; pointer-events: all; transform: translateY(0); }
        
        .dropdown-item { padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.2s; }
        .dropdown-item:hover { background: rgba(255,255,255,0.05); }

        .smart-icon-box { display: flex; gap: 10px; align-items: stretch; }
        .icon-preview-square {
            width: 54px; background: var(--bg); border: 1px solid var(--glass-border);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: border-color 0.3s; color: var(--text-muted);
        }
        .icon-preview-square.valid { border-color: var(--accent-success); color: var(--accent-success); }

        .btn-primary {
            width: 100%; padding: 16px; border-radius: 14px; background: var(--text-main); color: var(--bg);
            font-family: inherit; font-size: 1rem; font-weight: 600; border: none; cursor: pointer;
            margin-top: 8px; transition: all 0.2s;
        }
        .btn-primary:active { transform: scale(0.97); }

        /* Puntos Gráfico */
        .visualizer-card { background: var(--surface); border: 1px solid var(--glass-border); border-radius: 20px; padding: 22px; margin-bottom: 20px; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem; color: var(--text-muted); }
        .progress-bar-container { height: 6px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-bottom: 12px; border: 1px solid var(--glass-border); }
        .progress-fill { height: 100%; background: var(--text-main); border-radius: 4px; width: 0%; transition: width 0.8s var(--spring); }
        .scale-info { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; text-align: right; }
        .dots-grid { display: flex; flex-wrap: wrap; gap: 4px; max-height: 120px; overflow-y: auto; scrollbar-width: none; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--glass-border); }
        .dot.passed { background: var(--text-main); box-shadow: 0 0 6px rgba(255,255,255,0.3); }

        .cat-list-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border: 1px solid var(--glass-border); border-radius: 14px; margin-bottom: 10px; }
        .cat-list-actions { display: flex; align-items: center; gap: 8px; }

        /* Toasts */
        .toast-container {
            position: fixed; top: calc(env(safe-area-inset-top, 16px) + 12px); right: 24px;
            z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }
        .toast {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); padding: 14px 20px; border-radius: 16px;
            color: var(--text-main); font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.5); transform: translateY(-20px); opacity: 0;
            animation: toastIn 0.4s var(--spring) forwards, toastOut 0.3s ease 2.7s forwards;
        }
        @keyframes toastIn { to { transform: translateY(0); opacity: 1; } }
        @keyframes toastOut { to { transform: translateY(-10px); opacity: 0; } }

        .error-shake { animation: shake 0.35s var(--bezier); border-color: var(--accent-danger) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }
        #preview-container { margin-bottom: 20px; pointer-events: none; }
    </style>
</head>
<body>

    <div class="toast-container" id="toast-container"></div>

    <div class="app-container" id="main-view">
        <header>
            <div class="header-top">
                <div class="app-title-group">
                    <div class="app-icon-badge">
                        <i data-lucide="clock-4" size="20"></i>
                    </div>
                    <h1>Cuenta Atrás</h1>
                </div>
                <div class="total-counter" id="total-count">0 activos</div>
            </div>
            <div class="categories-scroll-wrapper" id="scroll-wrapper">
                <div class="folders-scroll-area" id="categories-container"></div>
            </div>
        </header>

        <main class="main-content" id="events-grid"></main>

        <div class="fab-dock">
            <div class="fab-search" id="fab-search" onclick="toggleSearch(event)">
                <i data-lucide="search" id="search-icon"></i>
                <input type="text" id="search-input" placeholder="Buscar evento..." oninput="filterEvents()" onblur="closeSearch()">
            </div>
            <button class="fab-add" onclick="openModal('modal-add')" aria-label="Crear Evento">
                <i data-lucide="plus" size="24"></i>
            </button>
        </div>
    </div>

    <div class="modal-backdrop" id="modal-backdrop" onclick="closeTopModal()"></div>

    <div class="modal" id="modal-add">
        <div class="modal-header">
            <button class="btn-icon" onclick="closeTopModal()"><i data-lucide="x"></i></button>
            <h2 style="font-size: 1.2rem; font-weight: 500;" id="form-title">Nuevo Evento</h2>
        </div>
        <div class="modal-content">
            <div id="preview-container"></div>
            <div class="form-group">
                <label for="input-title">Título del Evento</label>
                <input type="text" id="input-title" class="form-input" placeholder="Escribe aquí el título del evento" oninput="updatePreviewTextOnly()">
            </div>
            <div class="form-group flex-row">
                <label>Día completo (Sin hora)</label>
                <label class="switch">
                    <input type="checkbox" id="input-allday" onchange="toggleAllDayField()">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="form-group">
                <label for="input-date">Fecha</label>
                <input type="datetime-local" id="input-date" class="form-input" oninput="updatePreviewTextOnly()">
            </div>
            <div class="form-group">
                <label>Categoría</label>
                <div class="custom-select-container" id="category-select-container">
                    <div class="custom-select-trigger" onclick="toggleCategoryDropdown(event)">
                        <div class="content" id="selected-category-display">
                            <i data-lucide="calendar" size="18"></i> <span>General</span>
                        </div>
                        <i data-lucide="chevron-down" size="16" style="color: var(--text-muted);"></i>
                    </div>
                    <div class="custom-dropdown" id="category-dropdown-list"></div>
                </div>
                <input type="hidden" id="input-category-hidden" value="calendar|General">
            </div>
            <button class="btn-primary" id="btn-submit-form" onclick="saveEventForm()">Confirmar Evento</button>
        </div>
    </div>

    <div class="modal" id="modal-cats">
        <div class="modal-header">
            <button class="btn-icon" onclick="closeTopModal()"><i data-lucide="arrow-left"></i></button>
            <h2 style="font-size: 1.2rem; font-weight: 500;">Categorías</h2>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <label>Crear nueva categoría</label>
                <div class="smart-icon-box">
                    <div class="icon-preview-square" id="new-cat-preview-box">
                        <i data-lucide="folder" id="new-cat-icon-render" size="22"></i>
                    </div>
                    <input type="text" id="new-cat-icon" class="form-input" placeholder="Icono Lucide (ej: rocket)" oninput="validateIconLive()" style="flex: 0.6;">
                    <input type="text" id="new-cat-name" class="form-input" placeholder="Nombre..." style="flex: 1;">
                </div>
                <button class="btn-primary" style="margin-top: 14px;" onclick="saveNewCategory()">Añadir Categoría</button>
            </div>
            <div style="margin-top: 24px;">
                <label style="display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px;">Tus Categorías</label>
                <div id="cats-list-container"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-view">
        <div class="modal-header">
            <button class="btn-icon" onclick="closeTopModal()"><i data-lucide="arrow-left"></i></button>
            <h2 style="font-size: 1.2rem; font-weight: 500;" id="view-title">Detalle</h2>
            <div style="margin-left: auto; display:flex; gap:8px;">
                <button class="btn-icon" onclick="prepareEdit()" aria-label="Editar"><i data-lucide="pencil" size="18"></i></button>
                <button class="btn-icon" style="color: var(--accent-danger);" onclick="deleteCurrentEvent()" aria-label="Eliminar"><i data-lucide="trash-2" size="18"></i></button>
            </div>
        </div>
        <div class="modal-content">
            <div class="visualizer-card">
                <div class="progress-header">
                    <span>Progreso Consumido</span>
                    <span id="view-percentage">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="view-progress-fill"></div>
                </div>
                <div class="scale-info" id="view-scale">-</div>
                <div class="dots-grid" id="view-dots"></div>
            </div>
            <div id="view-live-card"></div>
        </div>
    </div>

    <script>
        const appData = {
            events: [],
            categories: [],
            defaultCategories: [
                { id: 'all', label: 'Todos', icon: 'layers', visible: true },
                { id: 'calendar', label: 'General', icon: 'calendar', visible: true }
            ],
            currentFilter: 'all',
            searchQuery: '',
            currentViewId: null,
            editingId: null
        };

        let modalStack = [];

        window.onload = () => {
            const storedEvents = localStorage.getItem('neoCountdownEventsV3');
            const storedCats = localStorage.getItem('neoCountdownCatsV3');
            const storedDefaults = localStorage.getItem('neoCountdownDefaultsV3');
            
            if (storedEvents) appData.events = JSON.parse(storedEvents);
            if (storedCats) appData.categories = JSON.parse(storedCats);
            else appData.categories = [
                { id: 'cat_1', label: 'Estudios', icon: 'book-open', visible: true },
                { id: 'cat_2', label: 'Viajes', icon: 'plane', visible: true },
                { id: 'cat_3', label: 'Trabajo', icon: 'briefcase', visible: true }
            ];

            if (storedDefaults) {
                const parsed = JSON.parse(storedDefaults);
                appData.defaultCategories.forEach(dc => {
                    if(parsed[dc.id] !== undefined) dc.visible = parsed[dc.id];
                });
            }

            renderApp();
            setInterval(updateTickers, 1000);
            updateTickers();
            setupKeyboardNavigation();
        };

        function saveData() {
            localStorage.setItem('neoCountdownEventsV3', JSON.stringify(appData.events));
            localStorage.setItem('neoCountdownCatsV3', JSON.stringify(appData.categories));
            
            const defState = {};
            appData.defaultCategories.forEach(dc => defState[dc.id] = dc.visible);
            localStorage.setItem('neoCountdownDefaultsV3', JSON.stringify(defState));
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            let icon = type === 'error' ? 'alert-circle' : 'check-circle';
            toast.innerHTML = `<i data-lucide="${icon}" size="16" style="color: ${type === 'error' ? 'var(--accent-danger)' : 'var(--accent-success)'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });
            setTimeout(() => toast.remove(), 3000);
        }

        // --- MANEJO DE MODALES E INTELIGENCIA DE ORIGEN ANIMACIÓN ---
        function openModal(modalId, eventId = null, clickEvent = null) {
            const modalEl = document.getElementById(modalId);
            
            if (modalId === 'modal-view' && eventId) {
                appData.currentViewId = eventId;
                
                // Si viene de un clic físico en PC calcula el origen óptico para la animación
                if (window.innerWidth >= 650 && clickEvent) {
                    modalEl.classList.add('custom-origin');
                    modalEl.style.top = `${clickEvent.clientY}px`;
                    modalEl.style.left = `${clickEvent.clientX}px`;
                } else {
                    modalEl.classList.remove('custom-origin');
                }
                renderVisualizer();
            }

            if (modalId === 'modal-add' && !appData.editingId) {
                document.getElementById('form-title').textContent = 'Nuevo Evento';
                document.getElementById('btn-submit-form').textContent = 'Crear Contador';
                document.getElementById('input-title').value = '';
                document.getElementById('input-date').value = '';
                document.getElementById('input-allday').checked = false;
                // Configurar GENERAL por defecto de manera limpia
                document.getElementById('input-category-hidden').value = 'calendar|General';
                document.getElementById('selected-category-display').innerHTML = `<i data-lucide="calendar" size="18"></i> <span>General</span>`;
                toggleAllDayField();
                buildCustomCategoryDropdown();
                initPreviewCard();
            }

            document.getElementById('main-view').classList.add('backgrounded');
            document.getElementById('modal-backdrop').classList.add('active');
            
            // Forzar un reflow antes de activar para asegurar la transición de escala nativa
            void modalEl.offsetWidth;
            modalEl.classList.add('active');
            
            modalStack.push(modalId);
            window.history.pushState({ activeModal: modalId }, "");
            lucide.createIcons();
        }

        function closeTopModal() {
            if (modalStack.length > 0) window.history.back();
        }

        window.addEventListener('popstate', () => {
            if (modalStack.length > 0) {
                const closingId = modalStack.pop();
                document.getElementById(closingId).classList.remove('active');
                
                if (closingId === 'modal-add') {
                    appData.editingId = null;
                    document.getElementById('category-select-container').classList.remove('open');
                }

                if (modalStack.length === 0) {
                    document.getElementById('main-view').classList.remove('backgrounded');
                    document.getElementById('modal-backdrop').classList.remove('active');
                    appData.currentViewId = null;
                }
            }
        });

        function checkCategoryScrollOverflow() {
            const container = document.getElementById('categories-container');
            const wrapper = document.getElementById('scroll-wrapper');
            if (container && wrapper) {
                if (container.scrollWidth > container.clientWidth) {
                    wrapper.classList.add('has-overflow');
                } else {
                    wrapper.classList.remove('has-overflow');
                }
            }
        }

        // --- BUSCADOR ---
        function toggleSearch(e) {
            const container = document.getElementById('fab-search');
            const input = document.getElementById('search-input');
            if (!container.classList.contains('expanded')) {
                container.classList.add('expanded');
                input.focus();
                e.stopPropagation();
            }
        }
        function closeSearch() {
            const container = document.getElementById('fab-search');
            const input = document.getElementById('search-input');
            if (input.value === '') container.classList.remove('expanded');
        }
        function filterEvents() {
            const input = document.getElementById('search-input');
            appData.searchQuery = input.value.toLowerCase();
            renderApp();
        }
        function setFilter(catId) {
            appData.currentFilter = catId;
            renderApp();
        }

        function toggleAllDayField() {
            const dateInput = document.getElementById('input-date');
            const isAllDay = document.getElementById('input-allday').checked;
            dateInput.type = isAllDay ? 'date' : 'datetime-local';
        }

        // --- DROPDOWN CATEGORÍAS ---
        function toggleCategoryDropdown(e) {
            e.stopPropagation();
            document.getElementById('category-select-container').classList.toggle('open');
        }
        document.addEventListener('click', () => {
            const sc = document.getElementById('category-select-container');
            if(sc) sc.classList.remove('open');
        });

        function buildCustomCategoryDropdown() {
            const allCats = [...appData.defaultCategories.filter(c=>c.id!=='all' && c.visible), ...appData.categories.filter(c=>c.visible!==false)];
            const list = document.getElementById('category-dropdown-list');
            list.innerHTML = allCats.map(c => `
                <div class="dropdown-item" onclick="selectCustomCategory('${c.icon}', '${c.label}')">
                    <i data-lucide="${c.icon}" size="16"></i> <span>${c.label}</span>
                </div>
            `).join('');
            lucide.createIcons({ root: list });
        }

        function selectCustomCategory(icon, label) {
            document.getElementById('input-category-hidden').value = `${icon}|${label}`;
            document.getElementById('selected-category-display').innerHTML = `<i data-lucide="${icon}" size="18"></i> <span style="color:var(--text-main); font-weight:500;">${label}</span>`;
            updatePreviewTextOnly();
        }

        function validateIconLive() {
            const input = document.getElementById('new-cat-icon').value.trim().toLowerCase();
            const box = document.getElementById('new-cat-preview-box');
            const target = input === '' ? 'folder' : input;
            box.innerHTML = `<i data-lucide="${target}" size="22"></i>`;
            lucide.createIcons({ root: box });
            setTimeout(() => {
                if (box.querySelector('svg') && input !== '') box.classList.add('valid');
                else box.classList.remove('valid');
            }, 15);
        }

        function saveNewCategory() {
            const name = document.getElementById('new-cat-name');
            const icon = document.getElementById('new-cat-icon');
            const box = document.getElementById('new-cat-preview-box');

            if(!name.value.trim()) return triggerShake('new-cat-name');

            const finalIcon = box.classList.contains('valid') ? icon.value.trim().toLowerCase() : 'folder';
            appData.categories.push({ id: 'cat_' + Date.now(), label: name.value.trim(), icon: finalIcon, visible: true });
            saveData();
            
            name.value = ''; icon.value = ''; validateIconLive();
            showToast('Categoría añadida con éxito');
            renderCategoriesManager(); renderApp();
        }

        function toggleCategoryVisibility(id, isDefault) {
            if(isDefault) {
                const dc = appData.defaultCategories.find(c => c.id === id);
                if(dc) dc.visible = !dc.visible;
            } else {
                const cat = appData.categories.find(c => c.id === id);
                if(cat) cat.visible = (cat.visible === undefined) ? false : !cat.visible;
            }
            saveData();
            renderCategoriesManager();
            renderApp();
            showToast('Visibilidad actualizada');
        }

        function renderCategoriesManager() {
            const container = document.getElementById('cats-list-container');
            const defaultsHTML = appData.defaultCategories.map(c => {
                const isVisible = c.visible !== false;
                return `
                    <div class="cat-list-item" style="opacity: ${isVisible ? 1 : 0.5};">
                        <div style="display:flex; align-items:center; gap:12px;"><i data-lucide="${c.icon}" size="18"></i><span>${c.label} (Sistema)</span></div>
                        <div class="cat-list-actions">
                            <button class="btn-icon" onclick="toggleCategoryVisibility('${c.id}', true)"><i data-lucide="${isVisible ? 'eye' : 'eye-off'}" size="18"></i></button>
                        </div>
                    </div>
                `;
            }).join('');

            const customHTML = appData.categories.map(c => {
                const isVisible = c.visible !== false;
                return `
                    <div class="cat-list-item" style="opacity: ${isVisible ? 1 : 0.5};">
                        <div style="display:flex; align-items:center; gap:12px;"><i data-lucide="${c.icon}" size="18"></i><span>${c.label}</span></div>
                        <div class="cat-list-actions">
                            <button class="btn-icon" onclick="toggleCategoryVisibility('${c.id}', false)"><i data-lucide="${isVisible ? 'eye' : 'eye-off'}" size="18"></i></button>
                            <button class="btn-icon" style="color:var(--accent-danger);" onclick="deleteCategory('${c.id}')"><i data-lucide="trash-2" size="18"></i></button>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = defaultsHTML + customHTML;
            lucide.createIcons({ root: container });
        }

        function deleteCategory(id) {
            appData.categories = appData.categories.filter(c => c.id !== id);
            appData.events.forEach(e => {
                if(!appData.categories.find(c => c.label === e.categoryLabel) && e.categoryLabel !== 'General') {
                    e.category = 'calendar'; e.categoryLabel = 'General';
                }
            });
            saveData(); renderCategoriesManager(); renderApp();
            showToast('Categoría eliminada', 'info');
        }

        // --- RENDERIZADO PRINCIPAL ---
        function renderApp() {
            const catContainer = document.getElementById('categories-container');
            const activePills = [
                ...appData.defaultCategories.filter(c => c.visible), 
                ...appData.categories.filter(c => c.visible !== false)
            ];
            
            catContainer.innerHTML = activePills.map(cat => `
                <div class="pill ${appData.currentFilter === cat.id ? 'active' : ''}" onclick="setFilter('${cat.id}')">
                    <i data-lucide="${cat.icon}" size="14"></i> ${cat.label}
                </div>
            `).join('') + `<div class="pill edit-pill" onclick="openModal('modal-cats')" title="Gestionar carpetas y categorías"><i data-lucide="settings-2" size="14"></i></div>`;

            let filtered = appData.events;
            const currentPill = [...appData.defaultCategories, ...appData.categories].find(c => c.id === appData.currentFilter);
            
            if (appData.currentFilter !== 'all' && currentPill) {
                filtered = filtered.filter(e => e.categoryLabel === currentPill.label);
            }
            if (appData.searchQuery) {
                filtered = filtered.filter(e => e.title.toLowerCase().includes(appData.searchQuery));
            }

            document.getElementById('total-count').textContent = `${filtered.length} activos`;

            const grid = document.getElementById('events-grid');
            if (appData.events.length === 0) {
                grid.innerHTML = `<div class="zero-state"><i data-lucide="calendar" size="38"></i><h3>Sin eventos activos</h3><p>Toca el botón + inferior para empezar.</p></div>`;
            } else if (filtered.length === 0) {
                if (appData.searchQuery) {
                    grid.innerHTML = `<div class="zero-state"><h3>No se han encontrado resultados para '${appData.searchQuery}'</h3><p>Prueba con otros términos de búsqueda.</p></div>`;
                } else {
                    grid.innerHTML = `<div class="zero-state"><h3>No hay eventos en esta categoría</h3><p>Crea un contador asignándole esta sección.</p></div>`;
                }
            } else {
                const sorted = [...filtered].sort((a,b) => a.targetAt - b.targetAt);
                grid.innerHTML = sorted.map((e, idx) => generateCardHTML(e, false, idx)).join('');
            }

            lucide.createIcons();
            updateTickers();
            checkCategoryScrollOverflow();
        }

        function generateCardHTML(event, isPreview = false, index = 0) {
            const click = isPreview ? '' : `onclick="openModal('modal-view', '${event.id}', event)"`;
            const delay = isPreview ? '' : `style="animation-delay: ${Math.min(index * 0.04, 0.3)}s;"`;
            const completedClass = (event.targetAt - Date.now() <= 0) ? 'completed' : '';
            return `
                <div class="card ${completedClass}" ${click} ${delay} id="card_${event.id}">
                    <div class="card-header">
                        <div class="card-badge" id="${isPreview ? 'prev-badge' : ''}">
                            <i data-lucide="${event.category}" size="14"></i> <span id="${isPreview ? 'prev-cat-label' : ''}">${event.categoryLabel}</span>
                        </div>
                        <div class="card-title" id="${isPreview ? 'prev-title' : ''}">${event.title || 'Sin Título'}</div>
                    </div>
                    <div class="countdown-display" id="${isPreview ? 'display_preview' : `display_${event.id}`}">
                        <div style="color: var(--text-muted); font-size: 0.9rem;">...</div>
                    </div>
                </div>
            `;
        }

        function updateTickers() {
            const now = Date.now();
            appData.events.forEach(e => {
                const el = document.getElementById(`display_${e.id}`);
                if (el) el.innerHTML = calculateTimeHTML(e.targetAt, now, e.isAllDay);
            });

            if (modalStack.includes('modal-add')) {
                const dateVal = document.getElementById('input-date').value;
                const isAllDay = document.getElementById('input-allday').checked;
                const target = dateVal ? new Date(isAllDay ? dateVal + 'T00:00:00' : dateVal).getTime() : now;
                const pd = document.getElementById('display_preview');
                if (pd) pd.innerHTML = calculateTimeHTML(target, now, isAllDay);
            }

            if (appData.currentViewId && modalStack.includes('modal-view')) {
                const ev = appData.events.find(e => e.id === appData.currentViewId);
                if (ev) {
                    const vd = document.getElementById(`display_view_${ev.id}`);
                    if(vd) vd.innerHTML = calculateTimeHTML(ev.targetAt, now, ev.isAllDay);
                }
            }
        }

        function calculateTimeHTML(target, now, isAllDay) {
            const diff = target - now;
            if (diff <= 0) return `<div class="days-main completed-text"><span class="num">¡Objetivo Cumplido!</span></div>`;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (isAllDay) return `<div class="days-main"><span class="num">${d}</span><span class="label">Días rest.</span></div>`;

            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            return `
                <div class="days-main"><span class="num">${d}</span><span class="label">Días</span></div>
                <div class="time-sub">
                    <div><span class="num">${h}</span><span class="label">H</span></div>
                    <div><span class="num">${m}</span><span class="label">M</span></div>
                    <div><span class="num">${s}</span><span class="label">S</span></div>
                </div>
            `;
        }

        function initPreviewCard() {
            const dummy = { id: 'preview', title: 'Sin Título', category: 'calendar', categoryLabel: 'General', targetAt: Date.now(), isAllDay: false };
            document.getElementById('preview-container').innerHTML = generateCardHTML(dummy, true);
            lucide.createIcons({ root: document.getElementById('preview-container') });
        }

        function updatePreviewTextOnly() {
            if(!document.getElementById('card_preview')) initPreviewCard();
            const titleEl = document.getElementById('prev-title');
            const val = document.getElementById('input-title').value || 'Sin Título';
            if (titleEl && titleEl.textContent !== val) titleEl.textContent = val;

            const hidden = document.getElementById('input-category-hidden').value;
            if (hidden) {
                const [icon, label] = hidden.split('|');
                const lbl = document.getElementById('prev-cat-label');
                if (lbl && lbl.textContent !== label) {
                    const b = document.getElementById('prev-badge');
                    b.innerHTML = `<i data-lucide="${icon}" size="14"></i> <span id="prev-cat-label">${label}</span>`;
                    lucide.createIcons({ root: b });
                }
            }
        }

        function triggerShake(id) {
            const el = document.getElementById(id);
            el.classList.remove('error-shake'); void el.offsetWidth; el.classList.add('error-shake');
            showToast('Por favor, rellena este campo correctamente', 'error');
            setTimeout(() => el.classList.remove('error-shake'), 350);
        }

        function saveEventForm() {
            const title = document.getElementById('input-title');
            const date = document.getElementById('input-date');
            const hidden = document.getElementById('input-category-hidden').value;
            const isAllDay = document.getElementById('input-allday').checked;

            if (!title.value.trim()) return triggerShake('input-title');
            if (!date.value) return triggerShake('input-date');
            if (!hidden) return triggerShake('category-select-container');

            const targetTime = new Date(isAllDay ? date.value + 'T00:00:00' : date.value).getTime();
            const [icon, label] = hidden.split('|');

            if (appData.editingId) {
                const idx = appData.events.findIndex(e => e.id === appData.editingId);
                if (idx > -1) {
                    appData.events[idx] = { ...appData.events[idx], title: title.value.trim(), category: icon, categoryLabel: label, targetAt: targetTime, isAllDay };
                    showToast('Evento actualizado con éxito');
                }
            } else {
                appData.events.unshift({
                    id: 'evt_' + Date.now(),
                    title: title.value.trim(),
                    category: icon,
                    categoryLabel: label,
                    createdAt: Date.now(),
                    targetAt: targetTime,
                    isAllDay: isAllDay
                });
                showToast('Contador inicializado');
            }

            saveData(); renderApp(); closeTopModal();
            if (appData.currentViewId) renderVisualizer();
        }

        function renderVisualizer() {
            const event = appData.events.find(e => e.id === appData.currentViewId);
            if (!event) return;

            document.getElementById('view-title').textContent = event.title;
            document.getElementById('view-live-card').innerHTML = generateCardHTML({...event, id: 'view_' + event.id}, true);

            const now = Date.now();
            const totalMs = event.targetAt - event.createdAt;
            const passedMs = now - event.createdAt;
            
            let totalDays = Math.max(1, Math.ceil(totalMs / (1000 * 60 * 60 * 24)));
            let passedDays = Math.max(0, Math.floor(passedMs / (1000 * 60 * 60 * 24)));
            if (passedDays > totalDays) passedDays = totalDays;

            let percentage = totalMs > 0 ? (passedMs / totalMs) * 100 : 100;
            percentage = Math.min(Math.max(percentage, 0), 100);

            document.getElementById('view-percentage').textContent = `${percentage.toFixed(1)}%`;
            setTimeout(() => {
                const f = document.getElementById('view-progress-fill');
                if(f) f.style.width = `${percentage}%`;
            }, 50);

            const MAX_DOTS = 180;
            let daysPerDot = 1;
            if (totalDays > MAX_DOTS) daysPerDot = Math.ceil(totalDays / MAX_DOTS);

            document.getElementById('view-scale').innerHTML = daysPerDot === 1 ? "1 punto = 1 día" : `Escala reducida: <b>1 punto = ${daysPerDot} días</b>`;

            let dots = '';
            for(let i=0; i < Math.ceil(totalDays/daysPerDot); i++) {
                dots += `<div class="dot ${i < Math.floor(passedDays/daysPerDot) ? 'passed' : ''}"></div>`;
            }
            document.getElementById('view-dots').innerHTML = dots;

            lucide.createIcons({ root: document.getElementById('modal-view') });
            updateTickers();
        }

        function prepareEdit() {
            const event = appData.events.find(e => e.id === appData.currentViewId);
            if (!event) return;

            appData.editingId = event.id;
            document.getElementById('form-title').textContent = 'Editar Evento';
            document.getElementById('btn-submit-form').textContent = 'Guardar Cambios';
            
            document.getElementById('input-title').value = event.title;
            document.getElementById('input-allday').checked = event.isAllDay || false;
            toggleAllDayField();

            const d = new Date(event.targetAt);
            if (event.isAllDay) {
                document.getElementById('input-date').value = d.toISOString().split('T')[0];
            } else {
                document.getElementById('input-date').value = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
            }

            buildCustomCategoryDropdown();
            selectCustomCategory(event.category, event.categoryLabel);
            initPreviewCard();
            updatePreviewTextOnly();

            openModal('modal-add');
        }

        function deleteCurrentEvent() {
            if (appData.currentViewId) {
                appData.events = appData.events.filter(e => e.id !== appData.currentViewId);
                saveData(); 
                renderApp(); 
                
                // Cierre en cadena limpio del modal stack
                const stackSnapshot = [...modalStack];
                stackSnapshot.forEach(() => window.history.back());
                
                showToast('Evento eliminado permanentemente', 'info');
            }
        }

        // --- SISTEMA DE NAVEGACIÓN POR TECLADO PRO ---
        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (modalStack.length > 0) {
                        closeTopModal();
                    } else {
                        const searchContainer = document.getElementById('fab-search');
                        const input = document.getElementById('search-input');
                        if (searchContainer.classList.contains('expanded')) {
                            input.value = '';
                            appData.searchQuery = '';
                            renderApp();
                            searchContainer.classList.remove('expanded');
                        }
                    }
                }
                if (e.key === 'Enter') {
                    // Si el foco está dentro del modal de añadir, confirma automáticamente
                    if (modalStack.includes('modal-add') && document.activeElement.tagName === 'INPUT') {
                        e.preventDefault();
                        saveEventForm();
                    }
                }
            });
        }
    </script>
</body>
</html>
