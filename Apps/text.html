<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Neo-Glass Fancy Text Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #121212;
            --surface-hover: #1c1c1e;
            --glass: rgba(15, 15, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --blur-val: 30px;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --accent-danger: #FF453A;
            --accent-success: #34C759;
            --accent-blue: #0A84FF;
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100dvh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 900px;
            margin: 0 auto;
            padding: env(safe-area-inset-top) 24px calc(env(safe-area-inset-bottom) + 16px) 24px;
            transition: transform 0.5s var(--bezier), filter 0.5s var(--bezier);
        }

        .app-container.backgrounded {
            transform: scale(0.96);
            filter: blur(8px);
            pointer-events: none;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-icon-badge {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .brand-title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .counter-badge {
            font-size: 13px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            margin-left: 6px;
            animation: pulse-light 1.5s infinite ease-in-out;
        }

        .folders-scroll-area {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 16px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .folders-scroll-area::-webkit-scrollbar { display: none; }

        .pill-button {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s var(--bezier);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pill-button:hover, .pill-button.active {
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255,255,255,0.05);
        }

        .pill-button.active {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 90px;
            scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }

        .input-hero-box {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            transition: border-color 0.3s var(--bezier);
        }

        .input-hero-box:focus-within {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .input-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 600px) {
            .grid-layout {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .card-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            transition: transform 0.3s var(--bezier), background 0.3s var(--bezier);
            cursor: pointer;
            position: relative;
        }

        .card-item:hover {
            background: var(--surface-hover);
            transform: translateY(-2px);
        }

        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
        }

        .card-value {
            font-size: 18px;
            word-break: break-all;
            user-select: all;
            min-height: 26px;
        }

        .fab-search-container {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom) + 24px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: calc(100% - 48px);
            max-width: 400px;
            display: flex;
            justify-content: center;
        }

        .fab-search {
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 100px;
            padding: 6px 12px 6px 18px;
            display: flex;
            align-items: center;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: all 0.4s var(--spring);
        }

        .fab-search input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            flex: 1;
            padding-right: 10px;
        }

        .fab-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s var(--bezier);
        }

        .fab-btn:hover {
            color: var(--text-main);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s var(--bezier);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        @media (min-width: 600px) {
            .modal-overlay {
                align-items: center;
            }
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-sheet {
            background: #0d0d0d;
            border-top: 1px solid var(--glass-border);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.4s var(--bezier);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        @media (min-width: 600px) {
            .modal-sheet {
                border: 1px solid var(--glass-border);
                border-radius: 24px;
                transform: scale(0.9) translateY(30px);
                transition: transform 0.4s var(--spring);
            }
        }

        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }

        @media (min-width: 600px) {
            .modal-overlay.active .modal-sheet {
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s var(--bezier);
        }

        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .live-preview {
            background: rgba(255,255,255,0.02);
            border: 1px dashed var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            margin-top: 8px;
            font-size: 14px;
            min-height: 42px;
            display: flex;
            align-items: center;
            color: var(--text-muted);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s var(--bezier);
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--glass-border);
        }

        .btn-primary {
            background: var(--text-main);
            color: var(--bg);
        }

        .btn-secondary:hover { background: var(--surface-hover); }
        .btn-primary:hover { opacity: 0.9; }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(20,20,20,0.9);
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.4s var(--spring), opacity 0.3s var(--bezier);
        }

        .toast.active {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .error-shake {
            animation: shake 0.3s var(--bezier);
            border-color: var(--accent-danger) !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        @keyframes pulse-light {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .toast-success i { color: var(--accent-success); }
        .toast-error i { color: var(--accent-danger); }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            color: var(--text-muted);
            gap: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-container" id="main-view">
        <header>
            <div class="header-left">
                <div class="app-icon-badge">
                    <i data-lucide="layers"></i>
                </div>
                <div>
                    <h1 class="brand-title">Fancy Text</h1>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <span class="counter-badge" id="styles-count">0 Estilos</span>
                <button class="pill-button" onclick="openModal('customStyleModal')" style="padding: 6px 12px;"><i data-lucide="plus" size="16"></i></button>
            </div>
        </header>

        <div class="folders-scroll-area" id="category-pills">
            </div>

        <main class="main-content">
            <div class="input-hero-box">
                <textarea class="input-textarea" id="main-input" placeholder="Escribe algo increíble aquí..." oninput="handleInput(this)"></textarea>
            </div>

            <div class="grid-layout" id="output-grid">
                </div>
        </main>
    </div>

    <div class="fab-search-container">
        <div class="fab-search">
            <input type="text" id="search-input" placeholder="Buscar estilo..." oninput="handleSearch(this)">
            <button class="fab-btn" id="search-clear-btn" onclick="clearSearch()">
                <i data-lucide="search" size="18"></i>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="customStyleModal" onclick="closeModalOnOverlay(event, 'customStyleModal')">
        <div class="modal-sheet">
            <div class="modal-header">
                <h3 class="modal-title">Añadir Estilo Custom</h3>
                <button class="fab-btn" onclick="closeActiveModal('customStyleModal')"><i data-lucide="x" size="20"></i></button>
            </div>
            <div class="form-group" id="form-group-name">
                <label class="form-label">Nombre del Estilo</label>
                <input type="text" id="custom-name" class="form-input" placeholder="Ej. Subrayado Especial" oninput="previewCustomStyle()">
            </div>
            <div class="form-group" id="form-group-prefix">
                <label class="form-label">Prefijo / Adorno Izquierdo</label>
                <input type="text" id="custom-prefix" class="form-input" placeholder="Ej. ⚡" oninput="previewCustomStyle()">
            </div>
            <div class="form-group" id="form-group-suffix">
                <label class="form-label">Sufijo / Adorno Derecho</label>
                <input type="text" id="custom-suffix" class="form-input" placeholder="Ej. ⚡" oninput="previewCustomStyle()">
            </div>
            <label class="form-label">Vista Previa</label>
            <div class="live-preview" id="custom-preview-box">Escribe para previsualizar...</div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeActiveModal('customStyleModal')">Cancelar</button>
                <button class="btn btn-primary" onclick="saveCustomStyle()">Guardar Estilo</button>
            </div>
        </div>
    </div>

    <div class="toast" id="app-toast"></div>

        let appData = {
            currentCategory: 'all',
            searchQuery: '',
            inputValue: 'fancy text',
            customStyles: []

            { id: 'squares_filled', name: 'Cuadrados Rellenos', type: 'map', key: 'squares_filled' },
            { id: 'squares', name: 'Cuadrados', type: 'map', key: 'squares' },

            { id: 'fraktur_bold', name: 'Gótico Negrita', type: 'map', key: 'fraktur_bold' },
            { id: 'double_struck', name: 'Línea Doble', type: 'map', key: 'double_struck' },
            { id: 'small_caps', name: 'Mayúsculas Pequeñas', type: 'map', key: 'small_caps' },
            { id: 'circles', name: 'Círculos', type: 'map', key: 'circles' },
            { id: 'script', name: 'Itálica Manuscrita', type: 'map', key: 'script' },
            { id: 'script_bold', name: 'Manuscrita Negrita', type: 'map', key: 'script_bold' },
            { id: 'bold_sans', name: 'Sans Negrita', type: 'map', key: 'bold_sans' },
            { id: 'bold_serif', name: 'Serif Negrita', type: 'map', key: 'bold_serif' },
            { id: 'italic_bold_sans', name: 'Sans Itálica Negrita', type: 'map', key: 'italic_bold_sans' },

            { id: 'italic_serif', name: 'Serif Itálica', type: 'map', key: 'italic_serif' },
            { id: 'monospace', name: 'Monoespaciado', type: 'map', key: 'monospace' },
            { id: 'strike', name: 'Tachado', type: 'fn', fn: (t) => t.split('').map(c => c + '\u0336').join('') },
            { id: 'slash', name: 'Barra Diagonal', type: 'fn', fn: (t) => t.split('').map(c => c + '\u0338').join('') },
            { id: 'sparkle', name: 'Brillantes', type: 'fn', fn: (t) => t.split('').map(c => '҉' + c).join('') },

        window.onload = () => {
            if (localStorage.getItem('neo_fancy_data')) {
                appData.customStyles = JSON.parse(localStorage.getItem('neo_fancy_data'));
            }
            document.getElementById('main-input').value = appData.inputValue;
            renderApp();
            lucide.createIcons();
        };

        function saveData() {
            localStorage.setItem('neo_fancy_data', JSON.stringify(appData.customStyles));
        }

        function transformText(text, style) {
            if (!text) return 'Escribe algo...';
            if (style.type === 'map') {
                const map = alphabetMaps[style.key];
                return text.split('').map(char => map[char] || char).join('');
            } else if (style.type === 'fn') {
                return style.fn(text);
            } else if (style.type === 'custom') {
                return `${style.prefix}${text}${style.suffix}`;
            }
            return text;
        }

        function renderApp() {
            renderCategories();
            renderGrid();
            
            const totalStyles = defaultStyles.length + appData.customStyles.length;
            document.getElementById('styles-count').innerText = `${totalStyles} Estilos`;
        }

        function renderCategories() {
            const container = document.getElementById('category-pills');
            const categories = [
                { id: 'all', name: 'Todos', icon: 'layers' },
                { id: 'alphabets', name: 'Alfabetos', icon: 'type' },
                { id: 'decorations', name: 'Decoraciones', icon: 'sparkles' },
                { id: 'custom', name: 'Mis Estilos', icon: 'smile' }
            ];

            container.innerHTML = categories.map(cat => {
                const activeClass = appData.currentCategory === cat.id ? 'active' : '';
                return `
                    <button class="pill-button ${activeClass}" onclick="setCategory('${cat.id}')">
                        <i data-lucide="${cat.icon}" size="14"></i>
                        <span>${cat.name}</span>
                    </button>
                `;
            }).join('');
            lucide.createIcons();
        }

        function setCategory(catId) {
            appData.currentCategory = catId;
            renderCategories();
            renderGrid();
        }

        function handleInput(el) {
            appData.inputValue = el.value;
            renderGrid();
        }

        function handleSearch(el) {
            appData.searchQuery = el.value.toLowerCase();
            const btn = document.getElementById('search-clear-btn');
            if (appData.searchQuery) {
                btn.innerHTML = '<i data-lucide="x" size="18"></i>';
                btn.onclick = clearSearch;
            } else {
                btn.innerHTML = '<i data-lucide="search" size="18"></i>';
                btn.onclick = null;
            }
            lucide.createIcons();
            renderGrid();
        }

        function clearSearch() {
            const input = document.getElementById('search-input');
            input.value = '';
            appData.searchQuery = '';
            const btn = document.getElementById('search-clear-btn');
            btn.innerHTML = '<i data-lucide="search" size="18"></i>';
            btn.onclick = null;
            lucide.createIcons();
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('output-grid');
            grid.innerHTML = '';

            let stylesPool = [...defaultStyles, ...appData.customStyles];

            // Filtrado por categoría
            if (appData.currentCategory === 'alphabets') {
                stylesPool = stylesPool.filter(s => s.type === 'map');
            } else if (appData.currentCategory === 'decorations') {
                stylesPool = stylesPool.filter(s => s.type === 'fn');
            } else if (appData.currentCategory === 'custom') {
                stylesPool = stylesPool.filter(s => s.type === 'custom');
            }

            // Filtrado por búsqueda
            if (appData.searchQuery) {
                stylesPool = stylesPool.filter(s => s.name.toLowerCase().includes(appData.searchQuery));
            }

            if (stylesPool.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <i data-lucide="search-slash" size="32"></i>
                        <p>No se encontraron estilos para tu selección.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            stylesPool.forEach(style => {
                const transformed = transformText(appData.inputValue, style);
                const card = document.createElement('div');
                card.className = 'card-item';
                card.onclick = () => copyToClipboard(transformed);

                card.innerHTML = `
                    <div class="card-meta">
                        <span>${style.name}</span>
                        <i data-lucide="copy" size="14"></i>
                    </div>
                    <div class="card-value">${transformed}</div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('Copiado al portapapeles', 'success');
            }).catch(() => {
                showToast('Error al copiar', 'error');
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('app-toast');
            toast.className = `toast active toast-${type}`;
            toast.innerHTML = `
                <i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" size="16"></i>
                <span>${message}</span>
            `;
            lucide.createIcons();
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2500);
        }

        // Sistema de Navegación e Historial de Modales
        function openModal(modalId) {
            document.getElementById('main-view').classList.add('backgrounded');
            document.getElementById(modalId).classList.add('active');
            activeModalsStack.push(modalId);
            window.history.pushState({ modalId: modalId }, "");
        }

        function closeModalOnOverlay(e, modalId) {
            if (e.target.id === modalId) {
                closeActiveModal(modalId);
            }
        }

        function closeActiveModal(modalId) {
            if (activeModalsStack.includes(modalId)) {
                window.history.back();
            }
        }

        window.addEventListener('popstate', () => {
            if (activeModalsStack.length > 0) {
                const topModalId = activeModalsStack.pop();
                document.getElementById(topModalId).classList.remove('active');
                if (activeModalsStack.length === 0) {
                    document.getElementById('main-view').classList.remove('backgrounded');
                }
            }
        });

        // Formulario Reactivo Custom Styles
        function previewCustomStyle() {
            const prefix = document.getElementById('custom-prefix').value;
            const suffix = document.getElementById('custom-suffix').value;
            const previewBox = document.getElementById('custom-preview-box');
            const sampleText = appData.inputValue || 'Texto de Ejemplo';
            previewBox.innerText = `${prefix}${sampleText}${suffix}`;
        }

        function saveCustomStyle() {
            const nameInput = document.getElementById('custom-name');
            const prefixInput = document.getElementById('custom-prefix');
            const suffixInput = document.getElementById('custom-suffix');

            let hasError = false;

            if (!nameInput.value.trim()) {
                triggerShake('form-group-name');
                hasError = true;
            }
            if (!prefixInput.value.trim() && !suffixInput.value.trim()) {
                triggerShake('form-group-prefix');
                triggerShake('form-group-suffix');
                hasError = true;
            }

            if (hasError) return;

            const newStyle = {
                id: 'custom_' + Date.now(),
                name: nameInput.value.trim(),
                type: 'custom',
                prefix: prefixInput.value,
                suffix: suffixInput.value
            };

            appData.customStyles.push(newStyle);
            saveData();
            renderApp();
            closeActiveModal('customStyleModal');
            showToast('Estilo creado correctamente', 'success');

            // Reset campos
            nameInput.value = '';
            prefixInput.value = '';
            suffixInput.value = '';
            document.getElementById('custom-preview-box').innerText = 'Escribe para previsualizar...';
        }

        function triggerShake(elementId) {
            const el = document.getElementById(elementId);
            el.classList.add('error-shake');
            setTimeout(() => {
                el.classList.remove('error-shake');
            }, 300);
        }
    </script>
