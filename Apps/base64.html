<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Conversor a Base64 Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --surface: #121212;
            --surface-hover: #1c1c1e;
            
            --glass: rgba(15, 15, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --blur-val: 30px;

            --text-main: #FFFFFF;
            --text-muted: #8E8E93;

            --accent-danger: #FF453A;
            --accent-success: #34C759;
            --accent-blue: #0A84FF;

            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        .app-container {
            height: 100dvh;
            padding: env(safe-area-inset-top, 24px) 24px calc(env(safe-area-inset-bottom, 16px) + 16px) 24px;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: transform 0.5s var(--bezier), filter 0.5s var(--bezier);
        }

        .app-container.backgrounded {
            transform: scale(0.96);
            filter: blur(8px) brightness(0.5);
            pointer-events: none;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-icon-badge {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0) 70%);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(var(--blur-val));
            flex-shrink: 0;
        }

        .header-title-area h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .counter-badge {
            font-size: 12px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            transition: transform 0.3s var(--spring);
            display: inline-block;
        }

        .counter-badge.pulse {
            transform: scale(1.2);
            color: var(--accent-blue);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
            scrollbar-width: none;
        }

        .main-content::-webkit-scrollbar {
            display: none;
        }

        /* --- MEJORAS EN EL DROPZONE --- */
        .dropzone-container {
            background: var(--glass);
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s var(--bezier), background 0.3s var(--bezier), transform 0.2s var(--bezier);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
        }

        .dropzone-container:hover, .dropzone-container.dragover {
            border-color: var(--accent-blue);
            background: rgba(10, 132, 255, 0.08);
            transform: scale(1.01);
        }

        .dropzone-container input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
        }

        .format-icons-row {
            display: flex;
            gap: 12px;
            color: var(--text-muted);
            opacity: 0.8;
        }

        .format-icons-row i {
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .dropzone-container:hover .format-icons-row i {
            color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .dropzone-title {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .dropzone-title strong {
            color: var(--text-main);
            font-weight: 600;
        }
        
        .dropzone-subtitle {
            font-size: 12px;
            color: rgba(142, 142, 147, 0.7);
            max-width: 80%;
            line-height: 1.4;
        }

        /* --- CUADRÍCULA Y TARJETAS --- */
        .items-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 600px) {
            .items-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .item-card {
            background: var(--surface);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s var(--bezier), border-color 0.2s var(--bezier);
            position: relative;
            overflow: hidden;
        }

        .item-card:hover {
            background: var(--surface-hover);
            border-color: rgba(255,255,255,0.15);
        }

        .item-preview {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
            background: #1c1c1e;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .item-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }

        /* --- BARRAS DE PROGRESO --- */
        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-blue);
            width: 0%;
            border-radius: 4px;
            transition: width 0.1s linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .icon-spin {
            animation: spin 1s linear infinite;
            color: var(--accent-blue);
        }

        /* --- BOTONES DE ACCIÓN --- */
        .item-actions {
            display: flex;
            gap: 4px;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s var(--bezier), color 0.2s var(--bezier);
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text-main);
        }

        .action-btn.danger:hover {
            background: rgba(255, 69, 58, 0.15);
            color: var(--accent-danger);
        }

        /* --- MODAL Y OTROS ELEMENTOS --- */
        .search-fab-container {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 16px) + 20px);
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 48px);
            max-width: 400px;
            z-index: 999;
        }

        .search-bar {
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 100px;
            padding: 6px 6px 6px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: transparent;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
            transition: background 0.4s var(--bezier);
        }

        @media (min-width: 600px) {
            .modal-overlay { align-items: center; }
        }

        .modal-overlay.active {
            background: rgba(0, 0, 0, 0.4);
            pointer-events: auto;
        }

        .modal-sheet {
            width: 100%;
            background: #161618;
            border-top: 1px solid var(--glass-border);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.4s var(--bezier);
            max-height: 85dvh;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .modal-sheet {
                width: 500px;
                border: 1px solid var(--glass-border);
                border-radius: 24px;
                transform: scale(0.9) translateY(30px);
                opacity: 0;
                transition: transform 0.4s var(--bezier), opacity 0.4s var(--bezier);
            }
            .modal-overlay.active .modal-sheet {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }

        .modal-body {
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .textarea-output {
            background: #09090b;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            color: #34C759;
            font-family: monospace;
            font-size: 12px;
            resize: none;
            height: 140px;
            outline: none;
            word-break: break-all;
        }

        .btn-primary {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s var(--bezier);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #viewer-preview-container {
            width: 100%;
            min-height: 160px;
            max-height: 250px;
            background: #09090b;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-direction: column;
        }

        #viewer-preview-container audio { width: 90%; }
        #viewer-preview-container video { width: 100%; max-height: 250px; object-fit: contain; }
        #viewer-preview-container img { width: 100%; height: 100%; object-fit: contain; }

        /* --- TOAST NOTIFICATION --- */
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -20px);
            background: var(--accent-success);
            color: #000;
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s var(--bezier), transform 0.3s var(--spring);
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(52, 199, 89, 0.4);
        }

        .toast-notification.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
    </style>
</head>
<body>

    <div class="toast-notification" id="toast">
        <i data-lucide="check-circle-2" size="18"></i>
        <span>¡Código copiado al portapapeles!</span>
    </div>

    <div class="app-container" id="main-view">
        <header>
            <div class="header-brand">
                <div class="app-icon-badge">
                    <i data-lucide="layers" size="20" style="color: var(--text-main);"></i>
                </div>
                <div class="header-title-area">
                    <h1>Base64 Studio</h1>
                    <span class="counter-badge" id="global-counter">0 elementos</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="dropzone-container" id="dropzone">
                <input type="file" id="file-input" multiple>
                
                <div class="format-icons-row">
                    <i data-lucide="image" size="28"></i>
                    <i data-lucide="video" size="28"></i>
                    <i data-lucide="music" size="28"></i>
                    <i data-lucide="file-text" size="28"></i>
                    <i data-lucide="file-archive" size="28"></i>
                </div>

                <div class="dropzone-title">
                    Arrastra archivos aquí o <strong>explorar</strong>
                </div>

                <div class="dropzone-subtitle">
                    Soporta: JPG, PNG, GIF, MP4, MP3, PDF, DOCX, ZIP, TXT, y cualquier otro formato (Límite sugerido: < 50MB para mejor rendimiento).
                </div>
            </div>

            <div class="items-grid" id="items-container">
                </div>
        </main>
    </div>

    <div class="search-fab-container">
        <div class="search-bar">
            <i data-lucide="search" size="18" style="color: var(--text-muted);"></i>
            <input type="text" class="search-input" id="search-input" placeholder="Buscar archivos..." oninput="handleSearch()">
            <button class="action-btn" id="search-clear-btn" style="display: none;" onclick="clearSearch()">
                <i data-lucide="x" size="16"></i>
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="viewer-modal" onclick="closeActiveModalOnOverlay(event)">
        <div class="modal-sheet">
            <div class="modal-header">
                <h3 class="modal-title" id="viewer-title">Detalles</h3>
                <button class="action-btn" onclick="closeActiveModal('viewer-modal')">
                    <i data-lucide="x" size="18"></i>
                </button>
            </div>
            <div class="modal-body">
                <div id="viewer-preview-container"></div>
                
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-size: 13px; font-weight: 500; color: var(--text-muted);">Código Base64</label>
                    <textarea class="textarea-output" id="base64-output" readonly></textarea>
                </div>
                <button class="btn-primary" onclick="copyBase64Content()">
                    <i data-lucide="copy" size="16"></i> Copiar Código
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADOS Y DATOS ---
        let appData = { items: [], searchQuery: '' };
        let uploadingQueue = []; // Almacena archivos en proceso de lectura
        let activeModalsStack = [];

        // --- INICIALIZACIÓN ---
        window.onload = () => {
            lucide.createIcons();
            const savedData = localStorage.getItem('purebase64_data');
            if (savedData) {
                appData = JSON.parse(savedData);
                if (!Array.isArray(appData.items)) appData.items = [];
                appData.searchQuery = '';
            } else {
                saveData();
            }
            renderApp();
            setupDragAndDrop();
        };

        function saveData() {
            localStorage.setItem('purebase64_data', JSON.stringify(appData));
            triggerCounterPulse();
        }

        function triggerCounterPulse() {
            const counter = document.getElementById('global-counter');
            if(counter) {
                counter.classList.add('pulse');
                setTimeout(() => counter.classList.remove('pulse'), 300);
            }
        }

        // --- MODALES Y NAVEGACIÓN ---
        function openModal(modalId) {
            document.getElementById('main-view').classList.add('backgrounded');
            document.getElementById(modalId).classList.add('active');
            activeModalsStack.push(modalId);
            window.history.pushState({ modalId: modalId }, "");
        }

        function closeActiveModal(modalId) {
            if (activeModalsStack.includes(modalId)) {
                window.history.back();
            }
        }

        function closeActiveModalOnOverlay(event) {
            if (event.target.classList.contains('modal-overlay')) {
                const activeModalId = activeModalsStack[activeModalsStack.length - 1];
                if (activeModalId) closeActiveModal(activeModalId);
            }
        }

        window.addEventListener('popstate', () => {
            if (activeModalsStack.length > 0) {
                const topModalId = activeModalsStack.pop();
                document.getElementById(topModalId).classList.remove('active');
                
                const mediaElements = document.querySelectorAll('#viewer-preview-container audio, #viewer-preview-container video');
                mediaElements.forEach(media => media.pause());

                if (activeModalsStack.length === 0) {
                    document.getElementById('main-view').classList.remove('backgrounded');
                }
            }
        });

        // --- MANEJO DE ARCHIVOS ASÍNCRONO ---
        function setupDragAndDrop() {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('file-input');

            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });
            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });
            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
                fileInput.value = ''; // Limpiar input para permitir subir el mismo archivo de nuevo
            });
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                const tempId = 'upload-' + Date.now() + Math.random().toString(36).substring(2, 7);
                const readableSize = formatBytes(file.size);
                
                // Añadir a la cola de subida y renderizar interfaz temporal
                uploadingQueue.push({ id: tempId, name: file.name, size: readableSize, progress: 0 });
                renderApp();

                const reader = new FileReader();

                // Actualizar barra de progreso
                reader.onprogress = (event) => {
                    if (event.lengthComputable) {
                        const percent = Math.round((event.loaded / event.total) * 100);
                        const progressElement = document.getElementById(`progress-fill-${tempId}`);
                        const percentText = document.getElementById(`progress-text-${tempId}`);
                        
                        if (progressElement) progressElement.style.width = percent + '%';
                        if (percentText) percentText.innerText = `Convirtiendo... ${percent}%`;
                    }
                };

                // Finalizado
                reader.onload = (event) => {
                    // Quitar de la cola de subida
                    uploadingQueue = uploadingQueue.filter(u => u.id !== tempId);
                    
                    // Guardar en items definitivos
                    appData.items.unshift({
                        id: 'item-' + Date.now() + Math.random().toString(36).substr(2, 5),
                        name: file.name,
                        size: readableSize,
                        type: file.type || 'unknown',
                        base64: event.target.result,
                        timestamp: Date.now()
                    });
                    
                    saveData();
                    renderApp();
                };

                reader.readAsDataURL(file);
            });
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function deleteItem(itemId) {
            appData.items = appData.items.filter(i => i.id !== itemId);
            saveData();
            renderApp();
        }

        // --- BUSCADOR ---
        function handleSearch() {
            appData.searchQuery = document.getElementById('search-input').value.toLowerCase();
            document.getElementById('search-clear-btn').style.display = appData.searchQuery ? 'flex' : 'none';
            renderItemsOnly();
        }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            appData.searchQuery = '';
            document.getElementById('search-clear-btn').style.display = 'none';
            renderItemsOnly();
        }

        // --- VISOR Y TOAST ---
        let currentViewingBase64 = '';
        
        function getIconForFileType(type) {
            if(type.startsWith('video/')) return 'video';
            if(type.startsWith('audio/')) return 'music';
            if(type.includes('pdf')) return 'file-text';
            if(type.includes('zip') || type.includes('rar') || type.includes('tar') || type.includes('gzip')) return 'file-archive';
            if(type.includes('text') || type.includes('document')) return 'file-text';
            return 'file';
        }

        function viewItemDetails(itemId) {
            const item = appData.items.find(i => i.id === itemId);
            if (!item) return;

            currentViewingBase64 = item.base64;
            document.getElementById('viewer-title').innerText = item.name;
            document.getElementById('base64-output').value = item.base64;

            const previewContainer = document.getElementById('viewer-preview-container');
            if (item.type.startsWith('image/')) {
                previewContainer.innerHTML = `<img src="${item.base64}" alt="${item.name}">`;
            } else if (item.type.startsWith('video/')) {
                previewContainer.innerHTML = `<video src="${item.base64}" controls autoplay></video>`;
            } else if (item.type.startsWith('audio/')) {
                previewContainer.innerHTML = `<audio src="${item.base64}" controls autoplay></audio>`;
            } else {
                const icon = getIconForFileType(item.type);
                previewContainer.innerHTML = `
                    <i data-lucide="${icon}" size="48" style="color: var(--text-muted); margin-bottom: 12px;"></i>
                    <span style="font-size: 13px; color: var(--text-muted);">Formato: ${item.type || 'Archivo desconocido'}</span>
                `;
            }

            openModal('viewer-modal');
            lucide.createIcons();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function copyBase64Content() {
            const textarea = document.getElementById('base64-output');
            textarea.select();
            navigator.clipboard.writeText(currentViewingBase64).then(() => {
                showToast(); // Llamada a la nueva notificación elegante
            });
        }

        // --- RENDERIZADO ---
        function renderApp() {
            renderItemsOnly();
            const counter = document.getElementById('global-counter');
            counter.innerText = `${appData.items.length} ${appData.items.length === 1 ? 'elemento' : 'elementos'}`;
        }

        function renderItemsOnly() {
            const container = document.getElementById('items-container');
            let html = '';

            // 1. Renderizar items en cola de subida (Loading state)
            uploadingQueue.forEach(item => {
                html += `
                    <div class="item-card" style="border-color: var(--accent-blue);">
                        <div class="item-preview">
                            <i data-lucide="loader-2" size="24" class="icon-spin"></i>
                        </div>
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-meta" id="progress-text-${item.id}">Procesando... 0%</div>
                            <div class="progress-track">
                                <div class="progress-fill" id="progress-fill-${item.id}"></div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // 2. Renderizar items guardados
            let filtered = [...appData.items];
            if (appData.searchQuery) {
                filtered = filtered.filter(item => item.name.toLowerCase().includes(appData.searchQuery));
            }
            filtered.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            if (filtered.length === 0 && uploadingQueue.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <i data-lucide="file-box" size="40" style="color: rgba(255,255,255,0.2);"></i>
                        <p style="margin-top:8px;">No hay archivos procesados todavía</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            filtered.forEach(item => {
                let previewHtml = '';
                if (item.type.startsWith('image/')) {
                    previewHtml = `<img class="item-preview" src="${item.base64}" alt="" style="cursor: pointer;">`;
                } else {
                    const iconName = getIconForFileType(item.type);
                    previewHtml = `
                        <div class="item-preview" style="cursor: pointer;">
                            <i data-lucide="${iconName}" size="24" style="color: var(--text-muted);"></i>
                        </div>
                    `;
                }

                html += `
                    <div class="item-card">
                        <div onclick="viewItemDetails('${item.id}')" style="display:contents;">
                            ${previewHtml}
                        </div>
                        <div class="item-info" onclick="viewItemDetails('${item.id}')" style="cursor: pointer;">
                            <div class="item-name">${item.name}</div>
                            <div class="item-meta">${item.size} • Base64</div>
                        </div>
                        <div class="item-actions">
                            <button class="action-btn" onclick="viewItemDetails('${item.id}')" title="Ver y Copiar">
                                <i data-lucide="code" size="15"></i>
                            </button>
                            <button class="action-btn danger" onclick="deleteItem('${item.id}')" title="Eliminar">
                                <i data-lucide="trash-2" size="15"></i>
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            lucide.createIcons(); // Recargar iconos después de modificar el DOM
        }
    </script>
</body>
</html>
