<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Contador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Paleta Cromática Orgánica y Oscura */
            --bg: #000000;
            --surface: #121212;
            --surface-hover: #1c1c1e;
            
            /* Configuración Neo-Glass Pure */
            --glass: rgba(15, 15, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --blur-val: 30px;

            /* Jerarquía Textual */
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;

            /* Estados y Acentos de Sistema */
            --accent-danger: #FF453A;
            --accent-success: #34C759;

            /* Físicas de Animación Progresivas */
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            touch-action: none; /* Previene scroll y pull-to-refresh */
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 900px;
            margin: 0 auto;
            padding: env(safe-area-inset-top) 24px calc(env(safe-area-inset-bottom) + 16px) 24px;
            transition: transform 0.5s var(--bezier), filter 0.5s var(--bezier);
        }

        .app-container.backgrounded {
            transform: scale(0.96);
            filter: blur(10px);
            pointer-events: none;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0 10px 0;
            border-bottom: 1px solid var(--glass-border);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-icon-badge {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0) 100%), var(--surface);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .app-title-block h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border-radius: 24px;
            margin-top: 16px;
        }

        /* Extiende la caja casi hasta los bordes del viewport */
        .main-content.wide-edge {
            width: calc(100% + 48px);
            margin-left: -24px;
            margin-right: -24px;
            border-radius: 20px;
            padding: 12px 20px;
        }

        .counter-display-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Permite que los clicks pasen al main-content */
            z-index: 2;
        }

        .counter-value {
            font-size: clamp(120px, 25dvh, 250px);
            font-weight: 200;
            letter-spacing: -4px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            transition: transform 0.1s var(--spring), color 0.3s var(--bezier);
            will-change: transform;
            text-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Mini-historial derecho */
        .mini-history {
            position: absolute;
            top: 12%;
            right: 12px;
            width: 140px;
            max-height: 76%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            opacity: 0.75;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.6);
            transition: opacity 0.25s var(--bezier), transform 0.25s var(--bezier);
            z-index: 3;
        }

        .mini-history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.9);
            padding: 6px 8px;
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            transform: translateY(-8px);
            opacity: 0;
            animation: slideDownIn 300ms ease forwards;
        }

        .mini-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex: 0 0 8px;
        }

        .mini-dot.up { background: var(--accent-success); }
        .mini-dot.down { background: var(--accent-danger); }

        @keyframes slideDownIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mini-history-item.mini-fade-out {
            opacity: 0 !important;
            transform: translateY(-6px) !important;
            transition: opacity 300ms var(--bezier), transform 300ms var(--bezier);
        }

        .counter-value.bump-up {
            transform: scale(1.08);
            color: var(--accent-success);
        }
        
        .counter-value.bump-down {
            transform: scale(0.92);
            color: var(--accent-danger);
        }

        /* Ondas de toque (Ripples) */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(8);
                opacity: 0;
            }
        }

        /* Overlay de Mantener Presionado */
        .hold-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--glass-border);
            padding: 24px 32px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s var(--bezier), transform 0.3s var(--bezier);
            z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        .hold-overlay.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .hold-ring {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            --hold-ring-color: var(--text-main);
            --hold-ring-progress: 0%;
            background: conic-gradient(var(--hold-ring-color) var(--hold-ring-progress), transparent 0%) !important;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hold-ring::before {
            content: '';
            position: absolute;
            inset: 4px;
            background: #18181a;
            border-radius: 50%;
            z-index: 1;
        }

        .hold-ring i {
            position: relative;
            z-index: 2;
            color: var(--text-main);
        }

        .hold-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            max-width: 180px;
            line-height: 1.4;
        }

        /* Modales */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s var(--bezier);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-sheet {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: var(--surface);
            border-top: 1px solid var(--glass-border);
            border-radius: 24px 24px 0 0;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s var(--bezier);
        }

        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px;
            border-bottom: 1px solid var(--glass-border);
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .close-modal-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            cursor: pointer;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
            padding-bottom: calc(env(safe-area-inset-bottom) + 24px);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .input-control {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s var(--bezier);
            font-variant-numeric: tabular-nums;
        }

        .input-control:focus {
            border-color: rgba(255,255,255,0.2);
        }

        .action-btn {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s var(--bezier), transform 0.1s var(--bezier);
        }

        .action-btn:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .action-btn.danger {
            background: rgba(255, 69, 58, 0.1);
            color: var(--accent-danger);
            border: 1px solid rgba(255, 69, 58, 0.2);
        }

        /* Historial */
        .history-section {
            margin-top: 32px;
            border-top: 1px solid var(--glass-border);
            padding-top: 24px;
        }

        .history-section h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            color: var(--text-muted);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 12px;
        }

        .history-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .history-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history-icon.up {
            background: rgba(52, 199, 89, 0.1);
            color: var(--accent-success);
        }

        .history-icon.down {
            background: rgba(255, 69, 58, 0.1);
            color: var(--accent-danger);
        }
        
        .history-icon.reset {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
        }

        .history-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .history-action {
            font-size: 14px;
            font-weight: 500;
        }

        .history-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .history-result {
            font-size: 16px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        @media (min-width: 600px) {
            .app-container {
                padding-top: 40px;
            }
            .modal-sheet {
                border-radius: 24px;
                height: auto;
                max-height: 85vh;
                margin-bottom: 24px;
            }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="app-container" id="main-view">
        <header>
            <div class="header-left">
                <div class="app-icon-badge">
                    <i data-lucide="activity" size="20" style="color: var(--text-main);"></i>
                </div>
                <div class="app-title-block">
                    <h1>Neo-Counter</h1>
                </div>
            </div>
        </header>

        <main class="main-content wide-edge" id="touch-surface">
            <div class="counter-display-container">
                <div class="counter-value" id="counter-num">0</div>
            </div>
            <aside id="mini-history" class="mini-history" aria-hidden="false"></aside>
        </main>
    </div>

    <div id="hold-overlay" class="hold-overlay">
        <div class="hold-ring" id="hold-progress">
            <i data-lucide="settings" size="20"></i>
        </div>
        <div class="hold-text">Mantén presionado para acceder a ajustes</div>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-sheet">
            <div class="modal-header">
                <h2>Ajustes Globales</h2>
                <button class="close-modal-btn" onclick="closeActiveModal('settings-modal')">
                    <i data-lucide="x" size="16"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="settings-grid">
                    <div class="form-group full-width">
                        <label for="edit-total-input">Editar Valor Actual</label>
                        <input type="number" id="edit-total-input" class="input-control" value="0">
                    </div>
                    <div class="form-group">
                        <label for="step-up-input">Suma por Tap (Arriba)</label>
                        <input type="number" id="step-up-input" class="input-control" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label for="step-down-input">Resta por Tap (Abajo)</label>
                        <input type="number" id="step-down-input" class="input-control" value="1" min="1">
                    </div>
                </div>

                <button class="action-btn danger" id="reset-counter-btn">
                    <i data-lucide="rotate-ccw" size="18"></i> Reiniciar Contador a Cero
                </button>

                <div class="history-section">
                    <h3>Historial Reciente</h3>
                    <div class="history-list" id="history-container">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ESTADO REACTIVO CENTRALIZADO ---
        let appData = {
            count: 0,
            stepUp: 1,
            stepDown: 1,
            history: [] // { id, type: 'up'|'down'|'reset'|'edit', amount: number, result: number, time: timestamp }
        };

        // --- SISTEMA DE MODALES (HISTORY API) ---
        let activeModalsStack = [];

        window.onload = () => {
            const localData = localStorage.getItem("neo_counter_pure_data");
            if (localData) {
                try {
                    appData = JSON.parse(localData);
                } catch(e) {
                    saveData();
                }
            } else {
                saveData();
            }
            
            lucide.createIcons();
            setupInteractions();
            renderApp();
            syncSettingsForm();

            // Poblado inicial del mini-historial (últimos 10), con pequeño stagger
            const recent = (appData.history || []).slice(0, 10).reverse();
            recent.forEach((it, idx) => {
                setTimeout(() => addMiniHistoryEntry(it), idx * 80);
            });
        };

        function saveData() {
            localStorage.setItem("neo_counter_pure_data", JSON.stringify(appData));
        }

        function renderApp() {
            // Actualizar vista principal
            document.getElementById('counter-num').innerText = appData.count;

            // Renderizar Historial
            const historyContainer = document.getElementById('history-container');
            historyContainer.innerHTML = '';

            if (appData.history.length === 0) {
                historyContainer.innerHTML = '<div style="color: var(--text-muted); font-size: 14px; text-align: center; padding: 20px;">No hay actividad reciente.</div>';
            } else {
                appData.history.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'history-item';
                    
                    let icon, iconClass, actionText;
                    if (item.type === 'up') {
                        icon = 'arrow-up'; iconClass = 'up'; actionText = `Sumó ${item.amount}`;
                    } else if (item.type === 'down') {
                        icon = 'arrow-down'; iconClass = 'down'; actionText = `Restó ${item.amount}`;
                    } else if (item.type === 'reset') {
                        icon = 'rotate-ccw'; iconClass = 'reset'; actionText = 'Reinicio';
                    } else {
                        icon = 'edit-2'; iconClass = 'reset'; actionText = 'Edición manual';
                    }

                    const date = new Date(item.time);
                    const timeString = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;

                    el.innerHTML = `
                        <div class="history-item-left">
                            <div class="history-icon ${iconClass}">
                                <i data-lucide="${icon}" size="16"></i>
                            </div>
                            <div class="history-details">
                                <span class="history-action">${actionText}</span>
                                <span class="history-time">${timeString}</span>
                            </div>
                        </div>
                        <div class="history-result">${item.result}</div>
                    `;
                    historyContainer.appendChild(el);
                });
                lucide.createIcons();
            }

        }

        function logHistory(type, amount, result) {
            const item = {
                id: Date.now(),
                type,
                amount,
                result,
                time: Date.now()
            };
            appData.history.unshift(item);
            // Mantener solo los últimos 20 registros
            if (appData.history.length > 20) {
                appData.history.pop();
            }
            return item;
        }

        // Añade una entrada al mini-historial (con timer individual de 10s)
        function addMiniHistoryEntry(item) {
            const mini = document.getElementById('mini-history');
            if (!mini) return;

            // Crear elemento
            const el = document.createElement('div');
            el.className = 'mini-history-item';
            el.dataset.id = item.id;

            // Icono + o - (lucide)
            const iconName = item.type === 'up' ? 'plus' : (item.type === 'down' ? 'minus' : (item.type === 'reset' ? 'rotate-ccw' : 'edit-2'));
            const color = item.type === 'up' ? 'var(--accent-success)' : (item.type === 'down' ? 'var(--accent-danger)' : 'rgba(255,255,255,0.9)');

            el.innerHTML = `
                <i data-lucide="${iconName}" class="mini-icon"></i>
                <span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.amount !== 0 ? (item.type === 'up' ? '+' : (item.type === 'down' ? '-' : '')) + item.amount : ''} ${item.result}</span>
            `;

            // Insertar al inicio
            mini.prepend(el);

            // Limitar cantidad visible a 10
            while (mini.children.length > 10) {
                mini.removeChild(mini.lastChild);
            }

            // Convertir iconos y aplicar color al svg generado
            lucide.createIcons();
            const svg = el.querySelector('svg');
            if (svg) svg.style.color = color;

            // Forzar reflow para que la animación de entrada funcione
            void el.offsetWidth;

            // Timer individual para desaparecer
            const timeoutId = setTimeout(() => {
                el.classList.add('mini-fade-out');
                // eliminar después de transición
                setTimeout(() => {
                    if (el.parentNode) el.parentNode.removeChild(el);
                }, 350);
            }, 10000);

            // Guardar timer por si se necesita cancelar más tarde
            el.dataset.timer = timeoutId;
        }

        // --- MANEJO DE MODALES ---
        function openModal(modalId) {
            document.getElementById('main-view').classList.add('backgrounded');
            document.getElementById(modalId).classList.add('active');
            syncSettingsForm();
            activeModalsStack.push(modalId);
            window.history.pushState({ modalId: modalId }, "");
        }

        function closeActiveModal(modalId) {
            if (activeModalsStack.includes(modalId)) {
                window.history.back();
            }
        }

        window.addEventListener('popstate', () => {
            if (activeModalsStack.length > 0) {
                const topModalId = activeModalsStack.pop();
                document.getElementById(topModalId).classList.remove('active');
                if (activeModalsStack.length === 0) {
                    document.getElementById('main-view').classList.remove('backgrounded');
                }
                renderApp(); // Redibuja al cerrar ajustes para reflejar cambios manuales
            }
        });

        // --- MOTOR HÁPTICO ---
        function triggerVibration(type = "light") {
            if (!navigator.vibrate) return;
            if (type === "light") navigator.vibrate(15);
            else if (type === "medium") navigator.vibrate(30);
            else if (type === "heavy") navigator.vibrate([40, 60, 40]);
        }

        // --- MOTOR DE AUDIO (Generador de tonos) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(frequency, duration) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

            oscillator.start(now);
            oscillator.stop(now + duration + 0.02);
        }

        // --- LÓGICA DE INTERACCIÓN (TAP Y HOLD) ---
        function setupInteractions() {
            const surface = document.getElementById('touch-surface');
            
            let pointerDownTime = 0;
            let holdInitTimeout = null;
            let fillInterval = null;
            let isFilling = false;
            
            surface.addEventListener('pointerdown', (e) => {
                // Ignorar clicks derechos o multiples toques simultaneos
                if (e.button === 2 || !e.isPrimary) return;
                
                pointerDownTime = Date.now();
                isFilling = false;
                
                // Iniciar contador de pulsación larga (500ms para mostrar UI)
                holdInitTimeout = setTimeout(() => {
                    isFilling = true;
                    startHoldAnimation();
                    triggerVibration("medium");
                }, 500);
            });

            const endInteraction = (e) => {
                clearTimeout(holdInitTimeout);
                
                if (isFilling) {
                    // Estaba en proceso de mantener presionado
                    clearInterval(fillInterval);
                    hideHoldAnimation();
                    isFilling = false;
                } else {
                    // Fue un tap rápido (< 500ms)
                    const duration = Date.now() - pointerDownTime;
                    if (duration < 500 && pointerDownTime > 0) {
                        processTap(e);
                    }
                }
                pointerDownTime = 0;
            };

            surface.addEventListener('pointerup', endInteraction);
            surface.addEventListener('pointercancel', endInteraction);
            surface.addEventListener('pointerleave', endInteraction);

            // Teclado (Accesibilidad)
            window.addEventListener('keydown', (e) => {
                if (document.activeElement.tagName === 'INPUT') return;
                if (e.code === 'Space' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    executeMutation('up');
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    executeMutation('down');
                }
            });

            // Ajustes Formulario Eventos
            document.getElementById('edit-total-input').addEventListener('change', (e) => {
                appData.count = parseInt(e.target.value) || 0;
                const histItem = logHistory('edit', 0, appData.count);
                saveData();
                renderApp();
                addMiniHistoryEntry(histItem);
            });

            document.getElementById('step-up-input').addEventListener('change', (e) => {
                appData.stepUp = Math.max(1, parseInt(e.target.value) || 1);
                saveData();
            });

            document.getElementById('step-down-input').addEventListener('change', (e) => {
                appData.stepDown = Math.max(1, parseInt(e.target.value) || 1);
                saveData();
            });

            document.getElementById('reset-counter-btn').addEventListener('click', () => {
                appData.count = 0;
                const histItem = logHistory('reset', 0, 0);
                saveData();
                syncSettingsForm();
                renderApp();
                triggerVibration("heavy");
                addMiniHistoryEntry(histItem);
            });
        }

        function processTap(e) {
            const surface = document.getElementById('touch-surface');
            const rect = surface.getBoundingClientRect();
            
            // Compatibilidad con Mouse y Touch
            const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY) || rect.top;
            const y = clientY - rect.top;
            const percentY = y / rect.height;

            if (percentY <= 0.75) {
                executeMutation('up', e);
            } else {
                executeMutation('down', e);
            }
        }

        function executeMutation(direction, e = null) {
            const counterEl = document.getElementById('counter-num');
            counterEl.classList.remove('bump-up', 'bump-down');
            void counterEl.offsetWidth; // Reflow

            if (direction === 'up') {
                appData.count += appData.stepUp;
                const histItem = logHistory('up', appData.stepUp, appData.count);
                counterEl.classList.add('bump-up');
                // Sonido agudo y vibración corta
                try { playTone(800, 0.15); } catch (err) {}
                if (navigator.vibrate) navigator.vibrate(30);
                if (e) createVisualRipple(e, 'rgba(52, 199, 89, 0.25)'); // Verde
                addMiniHistoryEntry(histItem);
            } else {
                appData.count -= appData.stepDown;
                const histItem = logHistory('down', appData.stepDown, appData.count);
                counterEl.classList.add('bump-down');
                // Sonido grave y patrón de vibración doble
                try { playTone(300, 0.2); } catch (err) {}
                if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
                if (e) createVisualRipple(e, 'rgba(255, 69, 58, 0.25)'); // Rojo
                addMiniHistoryEntry(histItem);
            }

            saveData();
            renderApp();
        }

        function createVisualRipple(e, color) {
            const surface = document.getElementById('touch-surface');
            const rect = surface.getBoundingClientRect();
            const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX) || (rect.left + rect.width/2);
            const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY) || (rect.top + rect.height/2);
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            // Asegurar tamaño suficiente para cubrir la pantalla
            const size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${x - size/2}px`;
            ripple.style.top = `${y - size/2}px`;
            ripple.style.background = `radial-gradient(circle, ${color} 0%, transparent 70%)`;
            
            surface.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // --- ANIMACIÓN DE MANTENER PRESIONADO ---
        let holdProgressInterval;

        function startHoldAnimation() {
            const overlay = document.getElementById('hold-overlay');
            const progressRing = document.getElementById('hold-progress');
            
            overlay.classList.add('active');
            
            const startTime = Date.now();
            const duration = 2000; // 2 segundos llenando
            
            holdProgressInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const percent = Math.min(100, (elapsed / duration) * 100);
                
                progressRing.style.setProperty('--hold-ring-progress', `${percent}%`);
                
                if (percent >= 100) {
                    clearInterval(holdProgressInterval);
                    hideHoldAnimation();
                    triggerVibration("heavy");
                    openModal('settings-modal');
                }
            }, 16);
        }

        function hideHoldAnimation() {
            const overlay = document.getElementById('hold-overlay');
            const progressRing = document.getElementById('hold-progress');
            
            clearInterval(holdProgressInterval);
            overlay.classList.remove('active');
            
            // Resetear anillo después de la transición de opacidad
            setTimeout(() => {
                progressRing.style.setProperty('--hold-ring-progress', '0%');
            }, 300);
        }

        function syncSettingsForm() {
            document.getElementById('edit-total-input').value = appData.count;
            document.getElementById('step-up-input').value = appData.stepUp;
            document.getElementById('step-down-input').value = appData.stepDown;
        }

    </script>
</body>
</html>
