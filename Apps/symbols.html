<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SГӯmbolos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Paleta CromГЎtica OrgГЎnica y Oscura */
            --bg: #000000;
            --surface: #121212;
            --surface-hover: #1c1c1e;
            
            /* ConfiguraciГіn Neo-Glass Pure */
            --glass: rgba(15, 15, 15, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --blur-val: 30px;

            /* JerarquГӯa Textual */
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;

            /* Estados y Acentos de Sistema */
            --accent-danger: #FF453A;
            --accent-success: #34C759;

            /* FГӯsicas de AnimaciГіn Progresivas */
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100dvh;
            overflow: hidden;
        }

        /* Contenedor Principal */
        .app-container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 24px calc(env(safe-area-inset-bottom) + 16px) 24px;
            max-width: 900px;
            margin: 0 auto;
            transition: transform 0.4s var(--bezier), filter 0.4s var(--bezier);
        }

        .app-container.backgrounded {
            transform: scale(0.96);
            filter: blur(8px);
            pointer-events: none;
        }

        /* Cabecera Limpia */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 12px 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-icon-badge {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0) 80%);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .counter-badge {
            font-size: 13px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            margin-left: 6px;
            transition: transform 0.2s var(--spring);
        }
        
        .counter-badge.pulse {
            transform: scale(1.15);
            color: var(--text-main);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(var(--blur-val));
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.2s var(--bezier), transform 0.2s var(--spring);
        }

        .btn-icon:hover {
            background: var(--surface-hover);
        }

        .btn-icon:active {
            transform: scale(0.92);
        }

        /* NavegaciГіn de pГӯldoras */
        .folders-scroll-area {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px 0 16px 0;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            flex-shrink: 0;
        }
        .folders-scroll-area::-webkit-scrollbar { display: none; }

        .pill {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s var(--bezier);
            backdrop-filter: blur(var(--blur-val));
        }

        .pill:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .pill.active {
            background: var(--text-main);
            color: var(--bg);
            border-color: var(--text-main);
            transform: scale(1.02);
        }

        /* Contenido Principal */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 90px;
            scrollbar-width: none;
        }
        .main-content::-webkit-scrollbar { display: none; }

        .section-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            margin: 16px 0 12px 0;
            letter-spacing: 0.3px;
        }

        /* Layout Grid Adaptativo SГӯmbolos */
        .symbols-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(56px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
        }

        .symbol-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--text-main);
            cursor: pointer;
            backdrop-filter: blur(var(--blur-val));
            transition: transform 0.2s var(--spring), background 0.2s var(--bezier), border-color 0.2s var(--bezier);
            user-select: none;
        }

        .symbol-item:hover {
            background: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .symbol-item:active {
            transform: scale(0.9);
        }

        /* CategorГӯas en vista global */
        .category-group {
            margin-bottom: 24px;
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .category-header h3 {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .view-toggle-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .view-toggle {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.25s var(--bezier);
            min-width: 94px;
            text-align: center;
        }

        .view-toggle.active {
            background: var(--text-main);
            color: var(--bg);
            border-color: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .pill-icon,
        .category-icon {
            margin-right: 8px;
            vertical-align: middle;
            opacity: 0.85;
        }

        .discover-section {
            margin-bottom: 22px;
            animation: fadeUp 0.4s var(--spring);
        }

        .category-group {
            margin-bottom: 24px;
            animation: fadeUp 0.35s var(--spring);
            will-change: transform, opacity;
            transition: transform 0.25s var(--spring), opacity 0.25s var(--bezier);
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            opacity: 0.98;
        }

        .category-header strong,
        .category-header h3 {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .discover-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.3s var(--spring), border-color 0.3s var(--bezier), box-shadow 0.3s var(--bezier), background 0.3s var(--bezier);
        }

        .discover-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.18);
            box-shadow: 0 18px 35px rgba(0,0,0,0.18);
            background: rgba(255,255,255,0.06);
        }

        .view-toggle,
        .pill,
        .btn-icon,
        .btn-submit,
        .trash-row,
        .symbol-item {
            transition: all 0.25s var(--spring);
        }

        .symbol-item:hover {
            background: var(--surface-hover);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 8px 22px rgba(0,0,0,0.22);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .discover-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .discover-title {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.25px;
        }

        .discover-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }

        .discover-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .discover-card h4 {
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .discover-preview {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 8px;
        }

        .discover-preview .symbol-preview-item {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            height: 34px;
            display: grid;
            place-items: center;
            font-size: 16px;
            color: var(--text-main);
        }

        .discover-card button {
            margin-top: auto;
            border: 1px solid var(--glass-border);
            background: transparent;
            color: var(--text-main);
            border-radius: 999px;
            padding: 10px 14px;
            cursor: pointer;
            transition: background 0.2s var(--bezier), transform 0.2s var(--spring);
            font-size: 13px;
            font-weight: 600;
        }

        .discover-card button:hover {
            background: rgba(255,255,255,0.06);
        }

        .favorite-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 12px;
            color: #FFCB47;
            pointer-events: none;
        }

        .symbol-item {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--text-main);
            cursor: pointer;
            backdrop-filter: blur(var(--blur-val));
            transition: transform 0.2s var(--spring), background 0.2s var(--bezier), border-color 0.2s var(--bezier);
            user-select: none;
        }

        body.dense-view .symbols-grid {
            grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
            gap: 8px;
        }

        body.dense-view .symbol-item {
            height: 48px;
            font-size: 18px;
            border-radius: 12px;
        }

        body.dense-view .discover-preview {
            gap: 6px;
        }

        /* NotificaciГіn Toast Copiado */
        .toast {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 20px);
            left: 50%;
            transform: translate(-50%, -30px);
            background: rgba(255, 255, 255, 0.95);
            color: #000000;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s var(--spring), opacity 0.3s var(--bezier);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.active {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        /* Modales Estilo Sistema */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            z-index: 500;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-sheet {
            width: 100%;
            max-width: 550px;
            background: rgba(20, 20, 20, 0.85);
            border-top: 1px solid var(--glass-border);
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
            border-radius: 24px 24px 0 0;
            backdrop-filter: blur(40px);
            padding: 24px;
            padding-bottom: calc(env(safe-area-inset-bottom) + 30px);
            transform: translateY(100%);
            transition: transform 0.4s var(--bezier);
            pointer-events: auto;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }

        .modal-overlay.active .modal-sheet {
            transform: translateY(0);
        }

        .modal-overlay.active {
            pointer-events: auto;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        /* Form Estructura */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            transition: border-color 0.2s var(--bezier), background 0.2s var(--bezier);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Shake & Error Validation */
        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .error-shake {
            animation: errorShake 0.3s var(--bezier);
            border-color: var(--accent-danger) !important;
        }

        /* Previsualizador reactivo */
        .asset-preview {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--glass-border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .preview-box {
            font-size: 28px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-caption {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn-submit {
            width: 100%;
            background: var(--text-main);
            color: var(--bg);
            border: none;
            border-radius: 14px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s var(--bezier), transform 0.2s var(--spring);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Lista de elementos en papelera */
        .trash-list {
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .trash-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
        }

        .trash-char {
            font-size: 18px;
        }

        .trash-actions {
            display: flex;
            gap: 8px;
        }

        .btn-text-action {
            background: transparent;
            border: none;
            color: var(--accent-success);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .btn-text-action.danger {
            color: var(--accent-danger);
        }

        /* Layouts DinГЎmicos via Media Queries */
        @media(min-width: 600px) {
            .symbols-grid {
                grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
                gap: 12px;
            }
            .symbol-item {
                height: 64px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="main-view">
        <header>
            <div class="header-left">
                <div class="app-icon-badge">
                    <i data-lucide="layers" size="20" style="color: var(--text-main);"></i>
                </div>
                <div>
                    <h1 style="display: flex; align-items: center;">
                        SГӯmbolos
                        <span class="counter-badge" id="global-count">0</span>
                    </h1>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="open-trash-btn" title="Papelera de reciclaje">
                    <i data-lucide="trash-2" size="18"></i>
                </button>
                <button class="btn-icon" id="open-add-btn" title="AГұadir SГӯmbolo Personalizado">
                    <i data-lucide="plus" size="18"></i>
                </button>
            </div>
        </header>

        <div class="view-toggle-group" id="view-toggle-group">
            <button class="view-toggle active" data-density="normal">Actual</button>
            <button class="view-toggle" data-density="dense">Densa</button>
        </div>

        <div class="folders-scroll-area" id="categories-pills"></div>

        <main class="main-content" id="symbols-content-area"></main>
    </div>

    <div class="toast" id="toast-notification">
        <i data-lucide="check" size="16" style="color: #000;"></i>
        <span id="toast-text">Copiado al portapapeles</span>
    </div>

    <div class="modal-overlay" id="modal-add">
        <div class="modal-sheet">
            <div class="modal-header">
                <div class="modal-title">AГұadir SГӯmbolo</div>
                <button class="btn-icon" onclick="closeActiveModal('modal-add')">
                    <i data-lucide="x" size="18"></i>
                </button>
            </div>
            <div class="form-group">
                <label class="form-label">SГӯmbolo / CarГЎcter Гҡnico</label>
                <input type="text" class="form-input" id="input-char" maxlength="4" placeholder="Ej. вңҰ">
            </div>
            <div class="form-group">
                <label class="form-label">Etiqueta / Nombre Descriptivo</label>
                <input type="text" class="form-input" id="input-name" placeholder="Ej. Estrella Brillante">
            </div>
            <div class="form-group">
                <label class="form-label">CategorГӯa Asignada</label>
                <select class="form-input" id="input-category" style="background: rgba(30,30,30,0.9); border: 1px solid var(--glass-border); color: var(--text-main);">
                    <option value="custom">Personalizados</option>
                    <option value="popular">Populares</option>
                    <option value="chess">Ajedrez</option>
                    <option value="music">MГәsica</option>
                    <option value="weather">Tiempo</option>
                    <option value="business">Negocios</option>
                    <option value="objects">Objetos</option>
                    <option value="tech">TГ©cnicos</option>
                    <option value="monochrome">MonocromГЎticos</option>
                    <option value="arrows">Flechas</option>
                </select>
            </div>
            <div class="asset-preview">
                <div class="preview-box" id="live-preview-char">-</div>
                <div class="preview-caption" id="live-preview-name">PrevisualizaciГіn en tiempo real</div>
            </div>
            <button class="btn-submit" id="save-symbol-btn">Guardar en ColecciГіn</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-trash">
        <div class="modal-sheet">
            <div class="modal-header">
                <div class="modal-title">Papelera Logic</div>
                <button class="btn-icon" onclick="closeActiveModal('modal-trash')">
                    <i data-lucide="x" size="18"></i>
                </button>
            </div>
            <div class="trash-list" id="trash-items-container"></div>
            <button class="btn-submit" id="empty-trash-btn" style="background: transparent; border: 1px solid var(--accent-danger); color: var(--accent-danger);">
                Vaciar Papelera por Completo
            </button>
        </div>
    </div>

    <script>
        const INITIAL_CATEGORIES = {
            "recents": "Usados recientemente",
            "popular": "SГӯmbolos Populares",
            "chess": "SГӯmbolos De Ajedrez",
            "music": "Music Note SГӯmbolos",
            "weather": "SГӯmbolos De Tiempo",
            "business": "SГӯmbolos De Negocios",
            "objects": "SГӯmbolos De Objetos",
            "tech": "SГӯmbolos TГ©cnicos",
            "monochrome": "Emoji MonocromГЎtico",
            "miscellaneous": "SГӯmbolos Varios",
            "menu": "MenГә",
            "zodiac": "SГӯmbolos Del Zodiaco",
            "trademark": "SГӯmbolo De Marca",
            "cards": "SГӯmbolos De Los Palos De La Baraja",
            "dice": "SГӯmbolos De Dados",
            "units": "SГӯmbolos De Unidad",
            "numeric": "SГӯmbolos NumГ©ricos",
            "punctuation": "Signos De PuntuaciГіn",
            "parentheses": "SГӯmbolo ParГ©ntesis",
            "quotes": "Comillas",
            "paragraph": "Marca De PГЎrrafo",
            "confidential": "SГӯmbolos De Texto Confidenciales",
            "people": "Personas Y Actividades",
            "smiley": "SГӯmbolos De Cara Y Smiley",
            "eyes": "SГӯmbolos De Ojos",
            "gender": "SГӯmbolos De GГ©nero",
            "heart": "SГӯmbolos Del CorazГіn",
            "hand": "SГӯmbolos De Mano",

            if (typeof Intl !== 'undefined' && Intl.Segmenter) {
                return [...new Intl.Segmenter('es', { granularity: 'grapheme' }).segment(value)].map(part => part.segment);
            }
            return Array.from(value);
        }

            charsArray.forEach((character, index) => {

        // Sistema de Persistencia e InicializaciГіn
        function loadOrCreateData() {
            const local = localStorage.getItem('puresymbols_pro_state');
            if (local) {
                try {
                    appData = JSON.parse(local);
                    if (!appData.recents) appData.recents = [];
                    if (!Array.isArray(appData.items)) appData.items = [...INITIAL_SYMBOLS];
                    if (!Array.isArray(appData.trash)) appData.trash = [];
                    appData.items = appData.items.map(item => ({ favorite: false, ...item }));
                } catch(e) {
                    resetToFactory();
                }
            } else {
                resetToFactory();
            }
        }

        function resetToFactory() {
            appData.items = [...INITIAL_SYMBOLS];
            appData.trash = [];
            appData.recents = [];
            saveData();
        }

        function saveData() {
            localStorage.setItem('puresymbols_pro_state', JSON.stringify(appData));

            renderPills();
            renderGrid();
            updateGlobalCounter();
            lucide.createIcons();

        function renderPills() {
            const container = document.getElementById('categories-pills');
            container.innerHTML = '';

            // PГӯldora Global
            const allPill = document.createElement('div');
            allPill.className = `pill ${currentActiveCategory === 'all' ? 'active' : ''}`;
            allPill.textContent = 'Todos los SГӯmbolos';
            allPill.onclick = () => { currentActiveCategory = 'all'; renderApp(); };
            container.appendChild(allPill);

            const favoritesCount = appData.items.filter(i => i.favorite).length;
            if (favoritesCount > 0 || currentActiveCategory === 'favorites') {
                const favPill = document.createElement('div');
                favPill.className = `pill ${currentActiveCategory === 'favorites' ? 'active' : ''}`;

                container.appendChild(favPill);

            // Resto de pГӯldoras configuradas
            for (const [key, label] of Object.entries(INITIAL_CATEGORIES)) {
                if (key === 'recents' && appData.recents.length === 0) continue;

                const pill = document.createElement('div');
                pill.className = `pill ${currentActiveCategory === key ? 'active' : ''}`;
                pill.innerHTML = `<i data-lucide="${getCategoryIcon(key)}" class="pill-icon" size="14"></i>${label} (${count})`;
                pill.onclick = () => { currentActiveCategory = key; renderApp(); };
                container.appendChild(pill);
            }
        }

        function renderGrid() {
            const mainContainer = document.getElementById('symbols-content-area');
            mainContainer.innerHTML = '';

            if (currentActiveCategory === 'all') {
                renderDiscoverSection(mainContainer);
            }

            if (currentActiveCategory === 'recents') {
                createCategorySection(mainContainer, 'recents', INITIAL_CATEGORIES['recents'], appData.recents);
                return;
            }

            if (currentActiveCategory === 'favorites') {
                const favorites = appData.items.filter(i => i.favorite);
                createCategorySection(mainContainer, 'favorites', 'Favoritos', favorites);
                return;
            }

            if (currentActiveCategory !== 'all') {
                const categoryItems = appData.items.filter(i => i.cat === currentActiveCategory);
                createCategorySection(mainContainer, currentActiveCategory, INITIAL_CATEGORIES[currentActiveCategory], categoryItems);
                return;
            }

            if (appData.recents.length > 0) {
                createCategorySection(mainContainer, 'recents', INITIAL_CATEGORIES['recents'], appData.recents);
            }

            for (const [catKey, catLabel] of Object.entries(INITIAL_CATEGORIES)) {
                if (catKey === 'recents') continue;
                const catItems = appData.items.filter(i => i.cat === catKey);
                if (catItems.length > 0) {
                    createCategorySection(mainContainer, catKey, catLabel, catItems);
                }
            }
        }

        function renderDiscoverSection(targetContainer) {
            const section = document.createElement('section');
            section.className = 'discover-section';

            const header = document.createElement('div');
            header.className = 'discover-header';
            header.innerHTML = `
                <div>
                    <div class="discover-title">Descubrir en Homescreen</div>
                    <div class="discover-subtitle">Explora categorГӯas destacadas y expande tu colecciГіn</div>
                </div>
            `;
            section.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'discover-grid';

            DISCOVER_CATEGORIES.forEach(catKey => {
                const items = appData.items.filter(i => i.cat === catKey).slice(0, 10);
                if (!items.length) return;

                const card = document.createElement('div');
                card.className = 'discover-card';
                card.innerHTML = `
                    <h4>${INITIAL_CATEGORIES[catKey] || catKey}</h4>
                `;

                const preview = document.createElement('div');
                preview.className = 'discover-preview';
                items.slice(0, 5).forEach(item => {
                    const previewItem = document.createElement('div');
                    previewItem.className = 'symbol-preview-item';
                    previewItem.textContent = item.char;
                    preview.appendChild(previewItem);
                });
                card.appendChild(preview);

                const button = document.createElement('button');
                button.textContent = 'Explorar mГЎs';
                button.onclick = () => {
                    currentActiveCategory = catKey;
                    renderApp();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                card.appendChild(button);
                grid.appendChild(card);
            });

            section.appendChild(grid);
            targetContainer.appendChild(section);
        }

        function createCategorySection(targetContainer, catKey, label, itemsList) {
            const group = document.createElement('div');
            group.className = 'category-group';

            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerHTML = `
                <h3><i data-lucide="${getCategoryIcon(catKey)}" class="category-icon" size="18"></i>${label}</h3>
            `;
            group.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'symbols-grid';

            itemsList.forEach(item => {
                const node = document.createElement('div');
                node.className = 'symbol-item';
                node.title = item.name;

                const charSpan = document.createElement('span');
                charSpan.textContent = item.char;
                node.appendChild(charSpan);

                if (item.favorite) {
                    const favoriteMark = document.createElement('span');
                    favoriteMark.className = 'favorite-indicator';
                    favoriteMark.textContent = 'вҳ…';
                    node.appendChild(favoriteMark);
                }

                let holdTimer = null;
                let wasHeld = false;

                node.onpointerdown = () => {
                    wasHeld = false;
                    holdTimer = setTimeout(() => {
                        wasHeld = true;
                        toggleFavorite(item);
                    }, 550);
                };

                node.onpointerup = () => {
                    clearTimeout(holdTimer);
                    if (!wasHeld) {
                        handleSymbolCopy(item);
                    }
                };

                node.onpointerleave = node.onpointercancel = () => {
                    clearTimeout(holdTimer);
                };

                node.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (catKey !== 'recents') moveSymbolToTrash(item);
                };

                grid.appendChild(node);
            });

            group.appendChild(grid);
            targetContainer.appendChild(group);
        }

        function handleSymbolCopy(item) {
            navigator.clipboard.writeText(item.char).then(() => {
                triggerToast(`Copiado: ${item.char}`);
                registerRecentUse(item);
            }).catch(() => {
                // Fallback clГЎsico si es necesario
                const el = document.createElement('textarea');
                el.value = item.char;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                triggerToast(`Copiado: ${item.char}`);
                registerRecentUse(item);
            });
        }

        function registerRecentUse(item) {
            // El sistema recoge y reorganiza automГЎticamente los caracteres de uso mГЎs reciente
            appData.recents = appData.recents.filter(r => r.char !== item.char);
            appData.recents.unshift(item);
            if (appData.recents.length > 24) appData.recents.pop(); // Limite HigiГ©nico
            saveData();
            renderApp();
        }

        function moveSymbolToTrash(item) {
            appData.items = appData.items.filter(i => !(i.char === item.char && i.cat === item.cat));
            appData.recents = appData.recents.filter(r => !(r.char === item.char && r.cat === item.cat));
            appData.trash.push(item);
            saveData();
            renderApp();
            triggerToast('SГӯmbolo movido a la papelera.');
        }

        function updateGlobalCounter() {
            const badge = document.getElementById('global-count');
            badge.textContent = appData.items.length;
            badge.classList.add('pulse');
            setTimeout(() => badge.classList.remove('pulse'), 250);
        }

        function triggerToast(message) {
            const toast = document.getElementById('toast-notification');
            document.getElementById('toast-text').textContent = message;
            toast.className = 'toast active';
            setTimeout(() => { toast.className = 'toast'; }, 2000);
        }

        function toggleFavorite(item) {
            item.favorite = !item.favorite;
            saveData();
            renderApp();
            triggerToast(item.favorite ? 'AГұadido a favoritos' : 'Eliminado de favoritos');
        }

        function applyViewDensity(density) {
            gridDensity = density;
            if (density === 'dense') {
                document.body.classList.add('dense-view');
            } else {
                document.body.classList.remove('dense-view');
            }
            document.querySelectorAll('.view-toggle').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.density === density);
            });
        }

        document.querySelectorAll('.view-toggle').forEach(btn => {
            btn.onclick = () => applyViewDensity(btn.dataset.density);
        });

        // Modales e Interacciones Avanzadas
        function openModal(id) {
            document.getElementById('main-view').classList.add('backgrounded');
            document.getElementById(id).classList.add('active');
            if (id === 'modal-trash') renderTrashView();
        }

        function closeActiveModal(id) {
            document.getElementById('main-view').classList.remove('backgrounded');
            document.getElementById(id).classList.remove('active');
        }

        document.getElementById('open-add-btn').onclick = () => openModal('modal-add');
        document.getElementById('open-trash-btn').onclick = () => openModal('modal-trash');

        // Formulario Reactivo SГӯmbolos Nuevos
        const inputChar = document.getElementById('input-char');
        const inputName = document.getElementById('input-name');
        const liveChar = document.getElementById('live-preview-char');
        const liveName = document.getElementById('live-preview-name');

        inputChar.oninput = (e) => { liveChar.textContent = e.target.value || '-'; };
        inputName.oninput = (e) => { liveName.textContent = e.target.value || 'PrevisualizaciГіn en tiempo real'; };

        document.getElementById('save-symbol-btn').onclick = () => {
            const charVal = inputChar.value.trim();
            const nameVal = inputName.value.trim();
            const catVal = document.getElementById('input-category').value;

            let hasError = false;
            if (!charVal) { applyShake(inputChar); hasError = true; }
            if (!nameVal) { applyShake(inputName); hasError = true; }
            if (hasError) return;

            appData.items.push({ char: charVal, name: nameVal, cat: catVal, favorite: false });
            saveData();
            renderApp();

            inputChar.value = '';
            inputName.value = '';
            liveChar.textContent = '-';
            liveName.textContent = 'PrevisualizaciГіn en tiempo real';
            closeActiveModal('modal-add');
            triggerToast('SГӯmbolo personalizado aГұadido.');
        };

        function renderTrashView() {
            const container = document.getElementById('trash-items-container');
            container.innerHTML = '';
            if (appData.trash.length === 0) {
                container.innerHTML = '<div style="color: var(--text-muted); font-size:14px; text-align:center; padding: 20px;">La papelera estГЎ vacГӯa</div>';
                return;
            }
            appData.trash.forEach((item, idx) => {
                const row = document.createElement('div');
                row.className = 'trash-row';
                row.innerHTML = `
                    <span class="trash-char">${item.char}</span>
                    <div class="trash-actions">
                        <button class="btn-text-action" onclick="restoreFromTrash(${idx})">Restaurar</button>
                        <button class="btn-text-action danger" onclick="purgeFromTrash(${idx})">Eliminar</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        window.restoreFromTrash = (idx) => {
            const item = appData.trash.splice(idx, 1)[0];
            appData.items.push(item);
            saveData();
            renderApp();
            renderTrashView();
            triggerToast('SГӯmbolo restaurado.');
        };

        window.purgeFromTrash = (idx) => {
            appData.trash.splice(idx, 1);
            saveData();
            renderTrashView();
            triggerToast('Eliminado permanentemente.');
        };

        document.getElementById('empty-trash-btn').onclick = () => {
            appData.trash = [];
            saveData();
            renderTrashView();
            closeActiveModal('modal-trash');
            triggerToast('Papelera vaciada por completo.');
        };

        function applyShake(element) {
            element.classList.add('error-shake');
            setTimeout(() => { element.classList.remove('error-shake'); }, 300);
        }

        // InicializaciГіn General
        loadOrCreateData();
        applyViewDensity(gridDensity);
        renderApp();
    </script>
</body>
</html>
