<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mod Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      /* Paleta Cromática Orgánica y Oscura */
      --bg: #000000;
      --surface: #121212;
      --surface-hover: #1c1c1e;
      
      /* Configuración Neo-Glass Pure */
      --glass: rgba(15, 15, 15, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --blur-val: 30px;

      /* Jerarquía Textual */
      --text-main: #FFFFFF;
      --text-muted: #8E8E93;

      /* Estados y Acentos de Sistema */
      --accent-danger: #FF453A;
      --accent-warning: #FF9F0A;
      --accent-success: #34C759;
      --accent-purple: #BF5AF2;
      --accent-cyan: #64D2FF;
      
      /* Físicas de Animación Progresivas */
      --bezier: cubic-bezier(0.16, 1, 0.3, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
    }

    .app-container {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) 24px calc(env(safe-area-inset-bottom) + 16px) 24px;
      transition: transform 0.5s var(--bezier), filter 0.5s var(--bezier);
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .app-container.backgrounded {
      transform: scale(0.96);
      filter: blur(5px);
      pointer-events: none;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0 16px 0;
      border-bottom: 1px solid var(--glass-border);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .app-icon-badge {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: radial-gradient(circle at center, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0) 100%);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      transition: transform 0.3s var(--spring);
    }

    .toolbox {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s var(--bezier), color 0.3s var(--bezier);
    }

    .btn-icon:hover {
      background: var(--surface-hover);
      color: var(--text-main);
    }
    
    .btn-icon.accent-cyan:hover {
      background: rgba(100, 210, 255, 0.15);
      color: var(--accent-cyan);
    }

    .btn-icon.danger:hover {
      background: rgba(255, 69, 58, 0.1);
      color: var(--accent-danger);
    }

    .compatibility-banner {
      margin: 16px 0;
      padding: 16px;
      border-radius: 16px;
      background: var(--surface);
      border: 1px solid var(--glass-border);
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      transition: all 0.3s var(--bezier);
    }

    .compatibility-banner.clickable {
      cursor: pointer;
    }

    .compatibility-banner.clickable:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: var(--surface-hover);
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 100px;
      scrollbar-width: none;
    }
    .main-content::-webkit-scrollbar { display: none; }

    .added-mods-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 600px) {
      .added-mods-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .mod-card {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: cardAppear 0.4s var(--bezier) both;
      transition: border-color 0.3s var(--bezier), background 0.3s var(--bezier);
    }

    .mod-card:hover {
      border-color: rgba(255,255,255,0.15);
      background: var(--surface-hover);
    }

    .mod-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-right: 32px;
      flex-wrap: wrap;
    }

    .mod-card-title {
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }

    /* BADGES DE SALUD/COMPATIBILIDAD */
    .mod-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 8px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .badge-danger {
      background: rgba(255, 69, 58, 0.12);
      color: var(--accent-danger);
      border: 1px solid rgba(255, 69, 58, 0.25);
    }
    .badge-warning {
      background: rgba(255, 159, 10, 0.12);
      color: var(--accent-warning);
      border: 1px solid rgba(255, 159, 10, 0.25);
    }
    .badge-success {
      background: rgba(52, 199, 89, 0.12);
      color: var(--accent-success);
      border: 1px solid rgba(52, 199, 89, 0.25);
    }

    .versions-clamp {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: all 0.3s var(--bezier);
    }

    .mod-card.expanded .versions-clamp {
      display: block;
      overflow: visible;
      -webkit-line-clamp: unset;
    }

    .btn-toggle-expand {
      background: transparent;
      border: none;
      color: var(--accent-cyan);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      width: fit-content;
      margin-top: auto;
    }

    .card-remove-btn {
      position: absolute;
      top: 14px;
      right: 14px;
    }

    /* BOTÓN DE ACCIÓN FIJO EN LA ESQUINA INFERIOR DERECHA (FAB ESTABLE) */
    .fab-fixed-btn {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 24px);
      right: 24px;
      z-index: 90;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--text-main);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
      transition: transform 0.3s var(--spring), background-color 0.3s var(--bezier);
    }

    .fab-fixed-btn:hover {
      transform: scale(1.06);
      background: #f0f0f0;
    }

    .fab-fixed-btn:active {
      transform: scale(0.95);
    }

    /* MODALES MÓVILES / DESKTOP */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--bezier);
    }

    @media (min-width: 600px) {
      .modal-overlay {
        align-items: center;
        justify-content: center;
      }
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-sheet {
      width: 100%;
      background: var(--surface);
      border-top: 1px solid var(--glass-border);
      border-radius: 24px 24px 0 0;
      max-height: 85dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.4s var(--bezier);
    }

    @media (min-width: 600px) {
      .modal-sheet {
        width: 550px;
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        max-height: 75dvh;
        transform: translateY(30px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      }
    }

    .modal-overlay.active .modal-sheet {
      transform: translateY(0);
    }

    .modal-header {
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--glass-border);
    }

    .modal-title {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
      scrollbar-width: none;
    }
    .modal-body::-webkit-scrollbar { display: none; }

    /* SEGMENTED CONTROL */
    .segmented-control {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--glass-border);
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .segment-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 10px 5px;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
      transition: all 0.2s var(--bezier);
    }

    .segment-btn.active {
      background: var(--surface-hover);
      color: var(--text-main);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
      animation: cardAppear 0.3s var(--bezier);
    }

    /* CAMPOS DE FORMULARIO */
    .input-wrapper {
      margin-bottom: 16px;
      position: relative;
    }

    .input-field {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px 16px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.3s var(--bezier), box-shadow 0.3s var(--bezier);
    }

    .input-field:focus {
      border-color: rgba(255,255,255,0.25);
    }

    textarea.input-field {
      resize: vertical;
      min-height: 120px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 10px;
      margin-bottom: 16px;
    }

    /* CONTENEDOR DE PÍLDORAS */
    .folders-scroll-area {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 16px 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .folders-scroll-area::-webkit-scrollbar { display: none; }

    .version-pill {
      background: var(--bg);
      border: 1px solid var(--glass-border);
      padding: 8px 16px;
      border-radius: 100px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s var(--bezier);
    }

    .version-pill input {
      display: none;
    }

    .version-pill.checked {
      border-color: var(--accent-cyan);
      background: rgba(100, 210, 255, 0.05);
      color: var(--accent-cyan);
    }

    .btn-action {
      width: 100%;
      background: var(--text-main);
      color: var(--bg);
      font-weight: 600;
      padding: 16px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      transition: transform 0.2s var(--bezier), opacity 0.2s var(--bezier);
    }

    .btn-action:active:not(:disabled) {
      transform: scale(0.98);
    }
    
    .btn-action:disabled {
      cursor: not-allowed;
    }

    /* LISTA DE VERSIONES EN POPUP COMPLETO */
    .popup-versions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 4px 0;
    }

    .popup-version-group {
      background: var(--bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 16px;
    }

    .popup-group-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .popup-version-sublist {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-left: 16px;
      border-left: 1px solid var(--glass-border);
    }

    .popup-version-item {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .popup-independent-item {
      background: var(--bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-main);
    }

    /* RESULTADOS DE API */
    #modrinthResults {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .api-result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s var(--bezier);
    }

    .api-result-item:hover {
      background: var(--surface-hover);
      border-color: var(--accent-purple);
    }

    .api-result-item img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      object-fit: cover;
      background: #000;
    }

    .api-result-info h4 {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .api-result-info p {
      font-size: 0.78rem;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .status-info {
      text-align: center;
      padding: 24px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    
    /* BOTTLENECK ANALYSIS STYLES */
    .bottleneck-scenario {
      background: var(--bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      transition: border-color 0.3s ease;
    }
    
    .bottleneck-scenario:hover {
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    .scenario-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .scenario-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent-cyan);
    }
    
    .scenario-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--surface-hover);
      padding: 4px 8px;
      border-radius: 6px;
    }
    
    .sacrifices-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .sacrifice-tag {
      background: rgba(255, 69, 58, 0.1);
      color: var(--accent-danger);
      border: 1px solid rgba(255, 69, 58, 0.2);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* ANIMACIONES */
    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .error-shake {
      animation: shake 0.3s linear;
      border-color: var(--accent-danger) !important;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }
  </style>
</head>
<body>

  <div class="app-container" id="main-view">
    <header>
      <div class="header-left">
        <div class="app-icon-badge">
          <i data-lucide="layers" size="20" style="color: var(--text-main);"></i>
        </div>
        <div>
          <h1>Mod Checker</h1>
          <p class="subtitle" id="globalCounter">0 mods guardados</p>
        </div>
      </div>
      <div class="toolbox">
        <button class="btn-icon accent-cyan" onclick="openModal('bottleneck-modal')" title="Análisis de Actualización (Cuellos de botella)">
          <i data-lucide="git-branch" size="18"></i>
        </button>
        <button class="btn-icon" onclick="exportData()" title="Exportar Copia"><i data-lucide="download" size="18"></i></button>
        <button class="btn-icon" onclick="triggerImport()" title="Importar Copia"><i data-lucide="upload" size="18"></i></button>
        <button class="btn-icon danger" onclick="clearMatrix()" title="Eliminar Todo"><i data-lucide="trash-2" size="18"></i></button>
      </div>
    </header>

    <div class="compatibility-banner" id="compatibilityBox">
      Actualizando lista...
    </div>

    <main class="main-content">
      <div class="added-mods-grid" id="modList"></div>
    </main>
  </div>

  <button class="fab-fixed-btn" onclick="openModal('add-modal')" title="Añadir Mod">
    <i data-lucide="plus" size="24"></i>
  </button>

  <!-- MODAL AÑADIR MOD -->
  <div class="modal-overlay" id="add-modal" onclick="closeActiveModalOnOverlay(event)">
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">Añadir Mod</span>
        <button class="btn-icon" onclick="closeActiveModal('add-modal')"><i data-lucide="x" size="18"></i></button>
      </div>
      <div class="modal-body">
        <div class="segmented-control">
          <button class="segment-btn active" id="tab-btn-modrinth" onclick="switchTab('modrinth')">
            <i data-lucide="search" size="14"></i> Buscar
          </button>
          <button class="segment-btn" id="tab-btn-manual" onclick="switchTab('manual')">
            <i data-lucide="edit-3" size="14"></i> Manual
          </button>
          <button class="segment-btn" id="tab-btn-markdown" onclick="switchTab('markdown')">
            <i data-lucide="list" size="14"></i> Importar MD
          </button>
        </div>

        <div class="tab-panel active" id="panel-modrinth">
          <div class="search-row">
            <input type="text" id="modrinthQuery" class="input-field" placeholder="Escribe el nombre del mod..." onkeydown="if(event.key === 'Enter') queryModrinth()"/>
            <select id="modrinthLoader" class="input-field">
              <option value="fabric">Fabric</option>
              <option value="forge">Forge</option>
            </select>
          </div>
          <button class="btn-action" style="background: var(--accent-purple); color: #fff;" onclick="queryModrinth()">
            Buscar en el repositorio
          </button>
          <div id="modrinthResults"></div>
        </div>

        <div class="tab-panel" id="panel-manual">
          <div class="input-wrapper" id="manualNameWrapper">
            <input type="text" id="manualModName" class="input-field" placeholder="Nombre del mod..." autocomplete="off" />
          </div>
          <div class="input-wrapper">
            <input type="text" id="versionFilter" class="input-field" placeholder="Filtrar por versión..." oninput="filterPills()" />
          </div>
          <div class="folders-scroll-area" id="versionCheckboxes"></div>
          <button class="btn-action" onclick="commitManualMod()">Guardar mod</button>
        </div>

        <!-- PANEL DE IMPORTACIÓN MARKDOWN -->
        <div class="tab-panel" id="panel-markdown">
          <div class="input-wrapper">
            <textarea id="markdownInput" class="input-field" placeholder="Pega aquí tu lista de mods en formato markdown...&#10;Ej: [Axiom](https://modrinth.com/mod/axiom)"></textarea>
          </div>
          <div class="input-wrapper">
            <select id="markdownLoader" class="input-field">
              <option value="fabric">Importar como: Fabric</option>
              <option value="forge">Importar como: Forge</option>
            </select>
          </div>
          <button class="btn-action" style="background: var(--accent-success); color: #fff;" onclick="importMarkdown()">
            Importar desde Lista
          </button>
          <div id="markdownStatus" class="status-info" style="margin-top: 10px; padding: 12px 0;"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- MODAL VERSIONES COMUNES -->
  <div class="modal-overlay" id="versions-modal" onclick="closeActiveModalOnOverlay(event)">
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">Versiones Compatibles</span>
        <button class="btn-icon" onclick="closeActiveModal('versions-modal')"><i data-lucide="x" size="18"></i></button>
      </div>
      <div class="modal-body" id="popupVersionsBody">
        </div>
    </div>
  </div>
  
  <!-- MODAL ANÁLISIS DE CUELLO DE BOTELLA -->
  <div class="modal-overlay" id="bottleneck-modal" onclick="closeActiveModalOnOverlay(event)">
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">Análisis de Actualización</span>
        <button class="btn-icon" onclick="closeActiveModal('bottleneck-modal')"><i data-lucide="x" size="18"></i></button>
      </div>
      <div class="modal-body" id="bottleneckBody">
        <!-- Renderizado dinámico -->
      </div>
    </div>
  </div>

  <input type="file" id="hiddenImport" accept=".json" style="display:none" />

  <script>
    let appData = { mods: [] };
    let mcVersionsList = [];
    let activeModalsStack = [];
    let lastCalculatedCommonSet = [];

    window.onload = async () => {
      const stored = localStorage.getItem('neo_matrix_mods');
      if (stored) {
        appData = JSON.parse(stored);
      } else {
        appData.mods = [
          { name: "Sodium", versions: ["1.21", "1.20.4", "1.20.1"] },
          { name: "Lithium", versions: ["1.21", "1.20.4", "1.19.4"] }
        ];
        saveData();
      }
      await fetchVersionsSpectrum();
      renderApp();
      lucide.createIcons();
    };

    function saveData() {
      localStorage.setItem('neo_matrix_mods', JSON.stringify(appData));
    }

    async function fetchVersionsSpectrum() {
      try {
        const cached = localStorage.getItem("mc_version_cache");
        if (cached) {
          mcVersionsList = JSON.parse(cached);
          return;
        }
        const res = await fetch("https://piston-meta.mojang.com/mc/game/version_manifest_v2.json");
        const data = await res.json();
        mcVersionsList = data.versions.filter(v => v.type === "release").map(v => v.id);
        localStorage.setItem("mc_version_cache", JSON.stringify(mcVersionsList));
      } catch (e) {
        mcVersionsList = ["1.21", "1.20.4", "1.20.1", "1.19.4", "1.18.2"];
      }
    }

    function renderApp() {
      const listContainer = document.getElementById('modList');
      listContainer.innerHTML = '';

      appData.mods.forEach((mod, index) => {
        const card = document.createElement('div');
        card.className = 'mod-card';
        const requiresCollapse = mod.versions.length > 8;
        
        // INDICADOR DE COMPATIBILIDAD (SEMÁFORO)
        let badgeHTML = '';
        if (mod.versions.length <= 3) {
          badgeHTML = `<span class="mod-badge badge-danger" title="Solo soporta ${mod.versions.length} versiones"><i data-lucide="alert-triangle" size="12"></i> Crítico</span>`;
        } else if (mod.versions.length <= 10) {
          badgeHTML = `<span class="mod-badge badge-warning" title="Soporta ${mod.versions.length} versiones"><i data-lucide="shield-alert" size="12"></i> Moderado</span>`;
        } else {
          badgeHTML = `<span class="mod-badge badge-success" title="Soporta ${mod.versions.length} versiones"><i data-lucide="shield-check" size="12"></i> Flexible</span>`;
        }

        card.innerHTML = `
          <div class="mod-card-header">
            <span class="mod-card-title">${mod.name}</span>
            ${badgeHTML}
          </div>
          <div class="versions-clamp">${mod.versions.join(', ')}</div>
          ${requiresCollapse ? `
            <button class="btn-toggle-expand" onclick="toggleCard(this)">
              <i data-lucide="chevron-down" size="12"></i> Ver todas las versiones (${mod.versions.length})
            </button>
          ` : ''}
          <button class="btn-icon danger card-remove-btn" onclick="removeMod(${index})">
            <i data-lucide="x" size="14"></i>
          </button>
        `;
        listContainer.appendChild(card);
      });

      updateMetrics();
      lucide.createIcons();
    }

    function updateMetrics() {
      const counter = document.getElementById('globalCounter');
      const banner = document.getElementById('compatibilityBox');
      
      counter.innerText = `${appData.mods.length} mod${appData.mods.length === 1 ? '' : 's'} guardados`;
      counter.style.transform = 'scale(1.05)';
      setTimeout(() => counter.style.transform = 'scale(1)', 150);

      if (appData.mods.length === 0) {
        banner.innerHTML = `<span style="color: var(--text-muted)">No hay mods registrados todavía.</span>`;
        banner.classList.remove('clickable');
        banner.onclick = null;
        lastCalculatedCommonSet = [];
        return;
      }

      let commonSet = appData.mods[0].versions;
      for (let i = 1; i < appData.mods.length; i++) {
        commonSet = commonSet.filter(v => appData.mods[i].versions.includes(v));
      }

      lastCalculatedCommonSet = commonSet;

      if (commonSet.length === 0) {
        banner.innerHTML = `<span style="color: var(--accent-danger)">⚠️ Sin versiones comunes. <a style="color:var(--accent-cyan);text-decoration:underline;margin-left:8px;" onclick="event.stopPropagation(); openModal('bottleneck-modal')">Ver Cuellos de Botella</a></span>`;
        banner.classList.remove('clickable');
        banner.onclick = null;
      } else {
        const hasMore = commonSet.length > 5;
        banner.innerHTML = `<span style="color: var(--accent-success)">✅ Versiones compatibles comunes: ${commonSet.slice(0, 5).join(', ')}${hasMore ? '...' : ''}</span>`;
        if (hasMore) {
          banner.classList.add('clickable');
          banner.onclick = () => openModal('versions-modal');
        } else {
          banner.classList.remove('clickable');
          banner.onclick = null;
        }
      }
    }

    function toggleCard(btn) {
      const card = btn.closest('.mod-card');
      const isExpanded = card.classList.toggle('expanded');
      btn.innerHTML = isExpanded 
        ? `<i data-lucide="chevron-up" size="12"></i> Contraer vista` 
        : `<i data-lucide="chevron-down" size="12"></i> Ver todas las versiones`;
      lucide.createIcons();
    }

    function removeMod(index) {
      appData.mods.splice(index, 1);
      saveData();
      renderApp();
    }

    function openModal(modalId) {
      document.getElementById('main-view').classList.add('backgrounded');
      document.getElementById(modalId).classList.add('active');
      
      if (modalId === 'add-modal') {
        buildVersionPills();
      } else if (modalId === 'versions-modal') {
        buildPopupVersionsView();
      } else if (modalId === 'bottleneck-modal') {
        buildBottleneckView();
      }
      
      activeModalsStack.push(modalId);
      window.history.pushState({ modalId: modalId }, "");
    }

    function closeActiveModal(modalId) {
      if (activeModalsStack.includes(modalId)) {
        window.history.back();
      }
    }

    function closeActiveModalOnOverlay(e) {
      if (e.target.classList.contains('modal-overlay')) {
        const topModalId = activeModalsStack[activeModalsStack.length - 1];
        if (topModalId) closeActiveModal(topModalId);
      }
    }

    window.addEventListener('popstate', () => {
      if (activeModalsStack.length > 0) {
        const topModalId = activeModalsStack.pop();
        document.getElementById(topModalId).classList.remove('active');
        if (activeModalsStack.length === 0) {
          document.getElementById('main-view').classList.remove('backgrounded');
        }
      }
    });

    /* ESTRUCTURACIÓN JERÁRQUICA E INDEPENDIENTE DE VERSIONES */
    function buildPopupVersionsView() {
      const container = document.getElementById('popupVersionsBody');
      container.innerHTML = '';

      const groups = {};
      const independent = [];

      lastCalculatedCommonSet.forEach(v => {
        const match = v.match(/^(\d+\.\d+)(\.\d+)?$/);
        if (match) {
          const parent = match[1];
          if (!groups[parent]) groups[parent] = [];
          groups[parent].push(v);
        } else {
          independent.push(v);
        }
      });

      const listWrapper = document.createElement('div');
      listWrapper.className = 'popup-versions-list';

      Object.keys(groups).forEach(parent => {
        const groupEl = document.createElement('div');
        groupEl.className = 'popup-version-group';

        const sortedSubversions = groups[parent].sort((a, b) => b.localeCompare(a, undefined, { numeric: true }));

        groupEl.innerHTML = `
          <div class="popup-group-title">
            <i data-lucide="folder" size="16" style="color: var(--accent-cyan)"></i> - ${parent}
          </div>
          <div class="popup-version-sublist">
            ${sortedSubversions.map(sv => `<div class="popup-version-item">- ${sv}</div>`).join('')}
          </div>
        `;
        listWrapper.appendChild(groupEl);
      });

      independent.forEach(iv => {
        const indEl = document.createElement('div');
        indEl.className = 'popup-independent-item';
        indEl.innerText = `- ${iv}`;
        listWrapper.appendChild(indEl);
      });

      container.appendChild(listWrapper);
      lucide.createIcons();
    }
    
    /* VISTA DE ANÁLISIS DE CUELLO DE BOTELLA */
    function buildBottleneckView() {
      const container = document.getElementById('bottleneckBody');
      container.innerHTML = '';
      
      if (appData.mods.length === 0) {
        container.innerHTML = '<div class="status-info">Añade mods primero para analizarlos.</div>';
        return;
      }

      let allVersions = new Set();
      appData.mods.forEach(m => m.versions.forEach(v => allVersions.add(v)));
      
      let analysis = [];
      allVersions.forEach(v => {
        let missingMods = [];
        appData.mods.forEach(m => {
          if (!m.versions.includes(v)) {
            missingMods.push(m.name);
          }
        });
        analysis.push({ version: v, missing: missingMods });
      });
      
      // Filtrar versiones que ya son soportadas por todos (no son cuello de botella)
      // Y opcionalmente evitar versiones donde falta casi todo (ej. si faltan 90 de 100 mods, no es un escenario útil)
      analysis = analysis.filter(a => a.missing.length > 0 && a.missing.length < (appData.mods.length * 0.8));
      
      analysis.sort((a, b) => {
        if (a.missing.length !== b.missing.length) return a.missing.length - b.missing.length;
        return b.version.localeCompare(a.version, undefined, { numeric: true });
      });
      
      const topScenarios = analysis.slice(0, 15); // Los mejores 15 escenarios
      
      if (topScenarios.length === 0) {
        container.innerHTML = '<div class="status-info" style="color:var(--accent-success)">¡Increíble! O todos tus mods son perfectamente compatibles o el pack es muy asimétrico.</div>';
        return;
      }
      
      const infoText = document.createElement('p');
      infoText.className = 'status-info';
      infoText.style.paddingTop = '0';
      infoText.style.textAlign = 'left';
      infoText.innerText = 'Si quieres cambiar a una de estas versiones, tendrías que eliminar (sacrificar) los mods listados:';
      container.appendChild(infoText);
      
      topScenarios.forEach(scen => {
        const card = document.createElement('div');
        card.className = 'bottleneck-scenario';
        
        let tagsHTML = scen.missing.map(m => `<span class="sacrifice-tag"><i data-lucide="trash-2" size="12"></i> ${m}</span>`).join('');
        
        card.innerHTML = `
          <div class="scenario-header">
            <span class="scenario-title">Versión ${scen.version}</span>
            <span class="scenario-subtitle">Faltan ${scen.missing.length} mod${scen.missing.length > 1 ? 's' : ''}</span>
          </div>
          <div class="sacrifices-list">
            ${tagsHTML}
          </div>
        `;
        container.appendChild(card);
      });
      
      lucide.createIcons();
    }

    function switchTab(tab) {
      document.querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      
      document.getElementById(`tab-btn-${tab}`).classList.add('active');
      document.getElementById(`panel-${tab}`).classList.add('active');
    }

    function buildVersionPills() {
      const container = document.getElementById('versionCheckboxes');
      container.innerHTML = mcVersionsList.map(v => `
        <label class="version-pill" data-v="${v}">
          <input type="checkbox" value="${v}" onchange="togglePillStyle(this)" /> ${v}
        </label>
      `).join('');
    }

    function togglePillStyle(input) {
      input.closest('.version-pill').classList.toggle('checked', input.checked);
    }

    function filterPills() {
      const query = document.getElementById('versionFilter').value.toLowerCase();
      document.querySelectorAll('.version-pill').forEach(pill => {
        const version = pill.getAttribute('data-v');
        pill.style.display = version.includes(query) ? '' : 'none';
      });
    }

    function triggerShake(elementId) {
      const el = document.getElementById(elementId);
      el.classList.add('error-shake');
      setTimeout(() => el.classList.remove('error-shake'), 300);
    }

    function commitManualMod() {
      const nameInput = document.getElementById('manualModName');
      const name = nameInput.value.trim();
      const checkedInputs = Array.from(document.querySelectorAll('#versionCheckboxes input:checked')).map(i => i.value);

      if (!name) {
        triggerShake('manualModName');
        return;
      }
      if (checkedInputs.length === 0) {
        triggerShake('versionCheckboxes');
        return;
      }

      appData.mods.push({ name, versions: checkedInputs });
      saveData();
      renderApp();
      
      nameInput.value = '';
      document.getElementById('versionFilter').value = '';
      closeActiveModal('add-modal');
    }

    /* BÚSQUEDA NORMALIZADA EN API DE MODRINTH */
    async function queryModrinth() {
      const query = document.getElementById('modrinthQuery').value.trim();
      const loader = document.getElementById('modrinthLoader').value;
      const resContainer = document.getElementById('modrinthResults');

      if (!query) {
        triggerShake('modrinthQuery');
        return;
      }

      resContainer.innerHTML = '<div class="status-info">Buscando coincidencias...</div>';

      try {
        const facets = encodeURIComponent(JSON.stringify([["project_type:mod"], [`categories:${loader}`]]));
        const response = await fetch(`https://api.modrinth.com/v2/search?query=${query}&facets=${facets}&limit=8`);
        const data = await response.json();

        if (!data.hits || data.hits.length === 0) {
          resContainer.innerHTML = '<div class="status-info">No se encontraron resultados para esta búsqueda.</div>';
          return;
        }

        resContainer.innerHTML = '';
        data.hits.forEach(hit => {
          const item = document.createElement('div');
          item.className = 'api-result-item';
          item.innerHTML = `
            <img src="${hit.icon_url || 'https://modrinth.com/default-icon.svg'}" alt="Icon" />
            <div class="api-result-info">
              <h4>${hit.title}</h4>
              <p>${hit.description || 'Sin descripción disponible.'}</p>
            </div>
          `;
          item.onclick = () => injectModrinthTarget(hit.project_id, hit.title, loader);
          resContainer.appendChild(item);
        });
      } catch (err) {
        resContainer.innerHTML = '<div class="status-info" style="color:var(--accent-danger)">Error de conexión con el servidor de Modrinth.</div>';
      }
    }

    async function injectModrinthTarget(projectId, title, loader) {
      const resContainer = document.getElementById('modrinthResults');
      resContainer.innerHTML = '<div class="status-info">Obteniendo el listado de versiones...</div>';
      
      try {
        const res = await fetch(`https://api.modrinth.com/v2/project/${projectId}/version`);
        const versions = await res.json();
        const targeted = versions.filter(v => v.loaders.includes(loader));
        const cleanVersions = [...new Set(targeted.flatMap(v => v.game_versions))];

        if (cleanVersions.length) {
          // Evitar duplicados
          if (!appData.mods.some(m => m.name === title)) {
            appData.mods.push({ name: title, versions: cleanVersions });
            saveData();
            renderApp();
          }
          document.getElementById('modrinthQuery').value = '';
          resContainer.innerHTML = '';
          closeActiveModal('add-modal');
        } else {
          alert('Este mod no tiene versiones disponibles para el cargador seleccionado.');
          resContainer.innerHTML = '';
        }
      } catch (e) {
        alert('Hubo un error al descargar los datos del mod.');
      }
    }

    /* IMPORTACIÓN MASIVA DESDE MARKDOWN */
    async function importMarkdown() {
      const text = document.getElementById('markdownInput').value.trim();
      const loader = document.getElementById('markdownLoader').value;
      const statusBox = document.getElementById('markdownStatus');
      const btn = document.querySelector('#panel-markdown .btn-action');

      if (!text) {
        triggerShake('markdownInput');
        return;
      }

      // Extrae todos los enlaces con formato [Nombre del mod](https://modrinth.com/mod/slug)
      const regex = /\[(.*?)\]\((https:\/\/modrinth\.com\/mod\/([^)]+))\)/g;
      let match;
      const modsToImport = [];

      while ((match = regex.exec(text)) !== null) {
        modsToImport.push({
          name: match[1],
          slug: match[3]
        });
      }

      if (modsToImport.length === 0) {
        statusBox.innerHTML = '<span style="color:var(--accent-danger)">No se encontraron enlaces válidos de Modrinth en el texto.</span>';
        triggerShake('markdownInput');
        return;
      }

      btn.disabled = true;
      btn.style.opacity = '0.5';

      let successCount = 0;
      let failCount = 0;

      for (let i = 0; i < modsToImport.length; i++) {
        const mod = modsToImport[i];
        statusBox.innerText = `Consultando API (${i + 1}/${modsToImport.length}): ${mod.name}...`;

        try {
          const res = await fetch(`https://api.modrinth.com/v2/project/${mod.slug}/version`);
          if (res.ok) {
            const versions = await res.json();
            const targeted = versions.filter(v => v.loaders.includes(loader));
            const cleanVersions = [...new Set(targeted.flatMap(v => v.game_versions))];

            if (cleanVersions.length > 0) {
              if (!appData.mods.some(m => m.name === mod.name)) {
                appData.mods.push({ name: mod.name, versions: cleanVersions });
                successCount++;
              }
            } else {
              failCount++;
            }
          } else {
            failCount++;
          }
        } catch (e) {
          failCount++;
        }
      }

      saveData();
      renderApp();

      statusBox.innerHTML = `<span style="color:var(--accent-success)">¡Completado! ${successCount} mods añadidos exitosamente. (${failCount} omitidos)</span>`;

      setTimeout(() => {
        document.getElementById('markdownInput').value = '';
        statusBox.innerText = '';
        btn.disabled = false;
        btn.style.opacity = '1';
        closeActiveModal('add-modal');
      }, 3000);
    }

    /* OPERACIONES DE MANIFESTACIÓN JSON */
    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData, null, 2));
      const anchor = document.createElement('a');
      anchor.setAttribute("href", dataStr);
      anchor.setAttribute("download", "mod_checker_backup.json");
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
    }

    function triggerImport() {
      document.getElementById('hiddenImport').click();
    }

    document.getElementById('hiddenImport').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const parsed = JSON.parse(evt.target.result);
          if (parsed && Array.isArray(parsed.mods)) {
            appData = parsed;
            saveData();
            renderApp();
          } else {
            alert('El archivo no tiene el formato correcto.');
          }
        } catch (err) {
          alert('Error al leer el archivo JSON.');
        }
      };
      reader.readAsText(file);
    };

    function clearMatrix() {
      if (confirm('¿Quieres eliminar de forma definitiva la lista de mods actual?')) {
        appData.mods = [];
        saveData();
        renderApp();
      }
    }
  </script>
