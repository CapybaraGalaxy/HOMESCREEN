<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homescreen NEO - GP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #121212; /* Negro claro por defecto */
            --text-main: #ffffff;
            --text-muted: #888888;
            --glass: rgba(15, 15, 15, 0.281);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bezier: cubic-bezier(0.16, 1, 0.3, 1);
            --blur-val: 30px;
        }

        body.no-blur { --blur-val: 0px; }
        body.no-blur .overlay, body.no-blur .search-panel, body.no-blur .settings-panel, body.no-blur .tool-card, body.no-blur .local-chip { 
            backdrop-filter: none !important; background: #111 !important; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.4s var(--bezier);
        }

        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s var(--bezier);
        }
        body.bg-active #bgCanvas { opacity: 0.6; }

        /* --- ESTILOS DEL CHIP LOCAL --- */
        .local-chip {
            position: fixed;
            top: 25px;
            left: 25px;
            background: var(--glass);
            backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.85rem;
            display: none; /* Oculto por defecto */
            align-items: center;
            gap: 10px;
            z-index: 100;
            transition: all 0.3s var(--bezier);
            animation: fadeInItem 0.6s var(--bezier);
        }
        .local-chip:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        .local-chip i { opacity: 0.7; }
        .local-chip strong { font-weight: 500; }
        .local-chip span { color: var(--text-muted); }

        /* --- NUEVO: ESTILO DE LA VERSIÓN --- */
        .version-tag {
            position: fixed;
            bottom: 15px;
            left: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.4;
            z-index: 50;
            pointer-events: none;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header {
            margin-top: 10vh;
            margin-bottom: 5vh;
            text-align: center;
            animation: slideUp 0.8s var(--bezier);
        }
        .clock { font-size: 6rem; font-weight: 200; letter-spacing: -3px; line-height: 1; animation: clockScale 1.2s var(--bezier); }
        .date { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 4px; color: var(--text-muted); margin-top: 10px; }

        .scroll-wrapper {
            width: 100%;
            max-height: 52vh; 
            overflow-y: auto;
            display: flex;
            justify-content: center;
            scrollbar-width: none; 
            -ms-overflow-style: none;  
        }
        .scroll-wrapper::-webkit-scrollbar {
            display: none; 
        }

        .tools-container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            transition: transform 0.5s var(--bezier);
        }
        
        .tools-container.list-mode { 
            flex-direction: column; 
            align-items: center; 
            flex-wrap: nowrap; 
            margin-top: auto;
            margin-bottom: auto;
            padding-top: 10px;
            padding-bottom: 20px;
        }
        .tools-container.list-mode .tool-card { width: 100%; max-width: 500px; justify-content: flex-start; }

        .tool-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 24px;
            background: var(--glass);
            backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.4s var(--bezier);
            animation: fadeInItem 0.6s var(--bezier) both;
            flex-shrink: 0; 
        }
        .tool-card:hover { background: #fff; color: #000; transform: translateY(-4px); }
        .tool-card:active { transform: scale(0.96); }
        
        .tool-card i, .tool-card svg { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px; 
            height: 18px;
            flex-shrink: 0;
        }

        .error-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 30px;
            background: rgba(255, 59, 48, 0.15);
            backdrop-filter: blur(var(--blur-val));
            border: 1px solid rgba(255, 59, 48, 0.3);
            border-radius: 20px;
            color: #ff453a;
            max-width: 450px;
            text-align: center;
            animation: fadeInItem 0.5s var(--bezier) both;
            z-index: 999;
        }
        .error-card span { font-size: 0.95rem; font-weight: 400; line-height: 1.4; }
        .error-card small { color: rgba(255, 255, 255, 0.6); font-family: monospace; font-size: 0.8rem; margin-top: 5px; display: block; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 6px; }

        .search-wrapper {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .search-panel {
            width: 160px; height: 48px;
            background: var(--glass);
            backdrop-filter: blur(var(--blur-val));
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.5s var(--bezier);
            overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .search-panel.expanded {
            width: 90%; max-width: 500px; height: 400px;
            border-radius: 28px; transform: translateY(-15vh);
        }

        .search-header { display: flex; align-items: center; justify-content: center; padding: 0 20px; min-height: 48px; cursor: pointer; }
        .search-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: 'Outfit'; font-size: 1.1rem; display: none; padding: 10px 0; }
        .search-panel.expanded .search-input { display: block; }
        .search-panel.expanded .search-header { justify-content: flex-start; }
        .search-panel.expanded .chip-placeholder { display: none; }

        .chip-placeholder { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .results-area { padding: 10px; overflow-y: auto; opacity: 0; flex: 1; transition: opacity 0.3s; }
        .search-panel.expanded .results-area { opacity: 1; transition-delay: 0.2s; }

        .result-item { display: flex; align-items: center; padding: 14px 18px; border-radius: 20px; text-decoration: none; color: var(--text-main); margin-bottom: 5px; transition: 0.3s; }
        .result-item:hover { background: rgba(255,255,255,0.08); transform: translateX(8px); }

        .settings-btn { position: fixed; bottom: 25px; right: 25px; background: var(--glass); border: 1px solid var(--glass-border); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 110; transition: 0.3s; }
        .settings-panel { position: fixed; bottom: 85px; right: 25px; width: 280px; background: var(--glass); backdrop-filter: blur(var(--blur-val)); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; transform: scale(0.9) translateY(20px); opacity: 0; pointer-events: none; transition: all 0.4s var(--bezier); z-index: 110; }
        .settings-panel.active { transform: scale(1) translateY(0); opacity: 1; pointer-events: auto; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Ocultamos el ajuste del chip por defecto, se activa en JS si es local */
        #settingLocalChip { display: none; }

        .switch { width: 40px; height: 22px; background: #333; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .switch::after { content:''; position:absolute; width:18px; height:18px; background:#fff; border-radius:50%; top:2px; left:2px; transition:0.3s var(--bezier); }
        .switch.on { background: #34C759; }
        .switch.on::after { transform: translateX(18px); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); opacity: 0; pointer-events: none; transition: 0.5s; z-index: 90; }
        .overlay.active { opacity: 1; pointer-events: auto; }

        @keyframes fadeInItem { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes clockScale { from { transform: scale(1.15); opacity: 0; filter: blur(10px); } to { transform: scale(1); opacity: 1; filter: blur(0); } }
    </style>
    
    <script>
        window.hasHubError = false;
        function showHtmlError(message) {
            window.hasHubError = true;
            document.addEventListener("DOMContentLoaded", () => {
                const gridContainer = document.getElementById('toolsGrid');
                if (gridContainer) {
                    gridContainer.innerHTML = `
                        <div class="error-card">
                            <i data-lucide="alert-triangle" style="width: 28px; height: 28px;"></i>
                            <span>Se ha detectado un error de sintaxis al cargar tus aplicaciones. Revisar comas o corchetes.</span>
                            <small>${message}</small>
                        </div>
                    `;
                    if (window.lucide) lucide.createIcons();
                }
            });
        }
        window.onerror = function(msg, url, line) {
            showHtmlError(`${msg} (Línea ${line})`);
            return false;
        };
    </script>
</head>
<body id="mainBody">

    <canvas id="bgCanvas"></canvas>
    <div class="overlay" id="overlay"></div>

    <a href="https://capybaragalaxy.github.io/HOMESCREEN/" class="local-chip" id="localChip">
        <i data-lucide="monitor-smartphone" style="width: 16px;"></i>
        <div><strong>VERSIÓN LOCAL</strong> <span>· Ir a web</span></div>
    </a>

    <div class="version-tag">v0.5</div>

    <div class="ui-layer">
        <header class="header">
            <div class="clock" id="clock">00:00</div>
            <div class="date" id="date">--</div>
        </header>
        <div class="scroll-wrapper">
            <div class="tools-container" id="toolsGrid"></div>
        </div>
    </div>

    <script>
        const tools = [
            { name: 'Progreso', icon: 'Loader2', url: 'Apps/progreso.html' },
            { name: 'Galería de iconos', icon: 'GalleryHorizontal', url: 'Apps/icontest.html' },
            { name: 'Calculadora de dinero', icon: 'Coins', url: 'Apps/dinero.html' },
            { name: 'Mod compatibility checker', icon: 'ListCheck', url: 'Apps/modchecker.html' },
            { name: 'CraftPalette', icon: 'Command', url: 'Apps/craftpalette.html' },
            { name: 'Calculadora tiempo de descarga', icon: 'Download', url: 'Apps/calculadora-descarga.html' },
            { name: 'Medidas', icon: 'RulerDimensionLine', url: 'Apps/medidas.html' },
            { name: 'Neo GameCenter', icon: 'Gamepad2', url: 'games.html' },
        ];
    </script>

    <div class="search-wrapper">
        <div class="search-panel" id="searchPanel">
            <div class="search-header" id="trigger">
                <div class="chip-placeholder">
                    <i data-lucide="search" style="width: 16px;"></i>
                    <span>Buscar <small style="opacity:0.5; margin-left:5px;">Ctrl+K</small></span>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="¿Qué buscas?" autocomplete="off">
            </div>
            <div class="results-area" id="resultsArea"></div>
        </div>
    </div>

    <div class="settings-btn" id="setBtn"><i data-lucide="settings" style="width: 20px;"></i></div>
    <div class="settings-panel" id="setPanel">
        <h3 style="margin: 0 0 20px 0; font-weight: 500;">Ajustes</h3>
        <div class="setting-item"><span>Fondo Animado</span><div class="switch" id="toggleBg"></div></div>
        <div class="setting-item"><span>Fondo Negro</span><div class="switch" id="toggleDarkBg"></div></div>
        <div class="setting-item"><span>Modo Lista</span><div class="switch" id="toggleList"></div></div>
        <div class="setting-item"><span>Desactivar Blur</span><div class="switch" id="toggleBlur"></div></div>
        
        <div class="setting-item" id="settingLocalChip"><span>Ocultar Aviso Local</span><div class="switch" id="toggleLocalChip"></div></div>
    </div>

    <script>
        const body = document.getElementById('mainBody');
        const grid = document.getElementById('toolsGrid');
        const searchInput = document.getElementById('searchInput');
        const searchPanel = document.getElementById('searchPanel');
        const overlay = document.getElementById('overlay');
        const setPanel = document.getElementById('setPanel');

        function toggleSearch(open) {
            if(window.hasHubError) return;
            if(open) {
                searchPanel.classList.add('expanded');
                overlay.classList.add('active');
                history.pushState({ searchOpen: true }, "");
                setTimeout(() => searchInput.focus(), 200);
                renderResults("");
            } else {
                searchPanel.classList.remove('expanded');
                overlay.classList.remove('active');
                searchInput.value = "";
                if (history.state && history.state.searchOpen) {
                    history.back();
                }
            }
        }

        window.addEventListener('popstate', () => {
            searchPanel.classList.remove('expanded');
            overlay.classList.remove('active');
            if(setPanel) setPanel.classList.remove('active');
        });

        document.getElementById('trigger').onclick = () => toggleSearch(true);
        overlay.onclick = () => toggleSearch(false);
        searchInput.oninput = (e) => renderResults(e.target.value);

        function renderResults(val) {
            if(window.hasHubError) return;
            const filtered = tools.filter(t => t.name.toLowerCase().includes(val.toLowerCase()));
            document.getElementById('resultsArea').innerHTML = filtered.map((t, i) => `
                <a href="${t.url}" class="result-item" style="animation: fadeInItem 0.4s var(--bezier) both ${i * 0.03}s">
                    <i data-lucide="${t.icon}" style="margin-right:15px; width:18px; opacity:0.6;"></i>
                    <span>${t.name}</span>
                </a>
            `).join('');
            lucide.createIcons();
        }

        window.onkeydown = (e) => {
            if((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); toggleSearch(true); }
            if(e.key === 'Escape') toggleSearch(false);
        };

        let particles = [], animationId, canvas = document.getElementById('bgCanvas'), ctx = canvas.getContext('2d');
        function initParticles() {
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; createParticles(); });
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            createParticles(); animate();
        }
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 2; this.speedX = Math.random() * 0.4 - 0.2; this.speedY = Math.random() * 0.4 - 0.2; }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.x > canvas.width) this.x = 0; if (this.y > canvas.height) this.y = 0; }
            draw() { ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        function createParticles() { particles = []; for (let i = 0; i < 80; i++) particles.push(new Particle()); }
        function animate() {
            if(!body.classList.contains('bg-active')) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            connect();
            animationId = requestAnimationFrame(animate);
        }
        function connect() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dist = Math.sqrt((particles[a].x - particles[b].x)**2 + (particles[a].y - particles[b].y)**2);
                    if (dist < 150) {
                        ctx.strokeStyle = `rgba(255,255,255,${(1 - dist/150) * 0.1})`;
                        ctx.beginPath(); ctx.moveTo(particles[a].x, particles[a].y); ctx.lineTo(particles[b].x, particles[b].y); ctx.stroke();
                    }
                }
            }
        }

        function updateClock() {
            const n = new Date();
            document.getElementById('clock').innerText = n.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = n.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});
        }
        setInterval(updateClock, 1000);

        function setBgColor(isDark) {
            if (isDark) {
                document.documentElement.style.setProperty('--bg', '#121212');
            } else {
                document.documentElement.style.setProperty('--bg', '#ffffff00');
            }
        }

        function init() {
            updateClock();
            if(window.hasHubError) return;

            grid.innerHTML = tools.map((t, i) => `<a href="${t.url}" class="tool-card" style="animation-delay: ${i * 0.05}s"><i data-lucide="${t.icon}"></i><span>${t.name}</span></a>`).join('');
            lucide.createIcons();
            
            const sList = document.getElementById('toggleList');
            const sBlur = document.getElementById('toggleBlur');
            const sBg = document.getElementById('toggleBg');
            const sDarkBg = document.getElementById('toggleDarkBg');
            
            // Lógica de detección de entorno Local / Web
            const esLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const localChip = document.getElementById('localChip');
            const settingLocalChip = document.getElementById('settingLocalChip');
            const sLocalChip = document.getElementById('toggleLocalChip');

            if (esLocal) {
                if(settingLocalChip) settingLocalChip.style.display = 'flex';
                
                const hideChip = localStorage.getItem('hideLocalChip') === 'true';
                if (hideChip) {
                    if(sLocalChip) sLocalChip.classList.add('on');
                } else {
                    if(localChip) localChip.style.display = 'flex';
                }

                if(sLocalChip) {
                    sLocalChip.onclick = () => {
                        const act = sLocalChip.classList.toggle('on');
                        localStorage.setItem('hideLocalChip', act);
                        if(act) {
                            localChip.style.display = 'none';
                        } else {
                            localChip.style.display = 'flex';
                        }
                    };
                }
            } else {
                if(localChip) localChip.style.display = 'none';
                if(settingLocalChip) settingLocalChip.style.display = 'none';
            }
            
            if(localStorage.getItem('list') === 'true') { grid.classList.add('list-mode'); if(sList) sList.classList.add('on'); }
            if(localStorage.getItem('noblur') === 'true') { body.classList.add('no-blur'); if(sBlur) sBlur.classList.add('on'); }
            
            const isDarkActive = localStorage.getItem('darkbg') !== 'false';
            const isBgActive = localStorage.getItem('bg') === 'true';

            setBgColor(isDarkActive);
            if(isDarkActive && sDarkBg) sDarkBg.classList.add('on');

            if(isBgActive) { 
                body.classList.add('bg-active'); 
                if(sBg) sBg.classList.add('on'); 
                initParticles(); 
            }

            const setBtn = document.getElementById('setBtn');
            if(setBtn) {
                setBtn.onclick = (e) => { e.stopPropagation(); setPanel.classList.toggle('active'); };
            }
            
            document.addEventListener('click', (e) => { if(setPanel && !setPanel.contains(e.target)) setPanel.classList.remove('active'); });

            if(sList) sList.onclick = () => { localStorage.setItem('list', grid.classList.toggle('list-mode')); sList.classList.toggle('on'); };
            if(sBlur) sBlur.onclick = () => { localStorage.setItem('noblur', body.classList.toggle('no-blur')); sBlur.classList.toggle('on'); };
            
            if(sBg) sBg.onclick = () => { 
                const act = body.classList.toggle('bg-active'); 
                sBg.classList.toggle('on'); 
                localStorage.setItem('bg', act);
                
                if(act) {
                    initParticles();
                } else {
                    cancelAnimationFrame(animationId);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            };

            if(sDarkBg) sDarkBg.onclick = () => {
                const act = sDarkBg.classList.toggle('on');
                localStorage.setItem('darkbg', act);
                setBgColor(act);
            };
        }

        window.onload = init;
    </script>
</body>
</html>
